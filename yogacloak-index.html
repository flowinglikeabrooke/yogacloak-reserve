<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yogacloak — first drop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1F2421; --bas:#2E3633; --sgd:#4A5A52; --sage:#7C8C82;
    --clay:#9A8E86; --fog:#C4C9C5; --bone:#ECEAE3; --paper:#F4F3EE;
    --rulel:rgba(236,234,227,0.12);
    --r-pill:100px; --r:20px; --r-lg:32px;
  }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  html { font-family:'Hanken Grotesk',sans-serif; -webkit-font-smoothing:antialiased; }

  body {
    background: var(--ink);
    color: var(--bone);
    line-height: 1.618;
    min-height: 100svh;
    position: relative;
    overflow-x: hidden;
  }

  /* Brand guide glows — sage top-right, clay bottom-left */
  .glow-1 {
    position: fixed; top:-150px; right:-110px;
    width:540px; height:540px;
    background: radial-gradient(circle, rgba(124,140,130,0.22), transparent 64%);
    pointer-events:none; z-index:0;
  }
  .glow-2 {
    position: fixed; bottom:-190px; left:-120px;
    width:480px; height:480px;
    background: radial-gradient(circle, rgba(154,142,134,0.12), transparent 66%);
    pointer-events:none; z-index:0;
  }

  .page {
    min-height: 100svh;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 40px 52px 48px;
    position: relative; z-index: 1;
  }

  /* Top */
  .top { display:flex; justify-content:space-between; align-items:center; }
  .wordmark { font-size:17px; font-weight:300; letter-spacing:-.02em; text-transform:lowercase; color:var(--bone); }
  .wordmark span { font-weight:800; }
  .top-tag { font-size:9px; letter-spacing:.4em; text-transform:uppercase; color:rgba(124,140,130,0.6); }

  /* Center */
  .center { padding: 0; }
  .eyebrow { font-size:9px; letter-spacing:.46em; text-transform:uppercase; color:var(--sage); margin-bottom:24px; opacity:.75; }

  .headline {
    font-size: clamp(64px, 10vw, 130px);
    font-weight:300; letter-spacing:-.045em; line-height:.87;
    text-transform:lowercase; color:var(--bone); margin-bottom:52px;
  }
  .headline strong { font-weight:800; display:block; }

  .actions { display:flex; align-items:center; gap:0; }

  .reserve-btn {
    display:inline-flex; align-items:center; gap:12px;
    background:var(--bone); color:var(--ink);
    font-family:'Hanken Grotesk',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    text-decoration:none; border-radius:var(--r-pill); padding:16px 32px;
    transition:background .18s;
  }
  .reserve-btn:hover { background:var(--fog); }

  .learn-btn {
    display:inline-flex; align-items:center; gap:8px;
    font-size:10px; letter-spacing:.2em; text-transform:uppercase;
    color:rgba(236,234,227,0.4);
    background:none; border:none; border-bottom:1px solid rgba(236,234,227,0.1);
    padding:2px 0; margin-left:24px;
    font-family:'Hanken Grotesk',sans-serif; cursor:pointer;
    transition:color .18s, border-color .18s;
  }
  .learn-btn:hover { color:rgba(236,234,227,0.75); border-color:rgba(236,234,227,0.25); }

  /* Bottom — dot grid availability */
  .bottom { display:flex; justify-content:space-between; align-items:flex-end; }
  .avail-group { display:flex; gap:44px; }

  .avail-label {
    font-size:8px; letter-spacing:.36em; text-transform:uppercase;
    color:rgba(124,140,130,0.55); margin-bottom:10px;
  }

  /* 10 dots = 10% of stock each. Filled = available, hollow = taken */
  .dot-row { display:flex; gap:5px; }
  .dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--sage); opacity:.65;
    transition:opacity .5s, background .5s;
  }
  .dot.gone { background:rgba(236,234,227,0.1); opacity:1; }

  .avail-caption {
    font-size:10px; color:rgba(154,142,134,0.45); margin-top:8px;
    letter-spacing:.02em;
  }

  .site-url {
    font-size:8px; letter-spacing:.34em; text-transform:uppercase;
    color:rgba(124,140,130,0.28);
  }

  /* Learn more overlay */
  .learn-panel {
    display:none;
    position:fixed; inset:0; z-index:20;
    background:var(--paper); color:var(--ink);
    overflow-y:auto; padding:64px 52px 80px;
  }
  .learn-panel.open { display:block; animation:fadeUp .3s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .learn-close {
    position:absolute; top:36px; right:52px;
    font-size:9px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--clay); background:none; border:none; cursor:pointer;
    font-family:'Hanken Grotesk',sans-serif;
    display:flex; align-items:center; gap:8px;
  }
  .learn-inner { max-width:680px; margin:0 auto; padding-top:16px; }
  .learn-eyebrow { font-size:9px; letter-spacing:.42em; text-transform:uppercase; color:var(--sage); margin-bottom:28px; }
  .learn-headline {
    font-size:clamp(28px,4vw,50px); font-weight:800; letter-spacing:-.03em;
    text-transform:lowercase; line-height:1.05; color:var(--ink); margin-bottom:56px;
  }

  .product-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .product-tile { border-radius:var(--r-lg); overflow:hidden; border:1px solid rgba(31,36,33,0.08); }
  .tile-head { background:var(--ink); color:var(--bone); padding:26px 26px 20px; }
  .tile-tag { font-size:8px; letter-spacing:.36em; text-transform:uppercase; color:var(--sage); margin-bottom:7px; }
  .tile-name { font-size:24px; font-weight:800; text-transform:lowercase; letter-spacing:-.025em; }
  .tile-price { font-size:13px; color:rgba(196,201,197,0.5); margin-top:5px; }
  .tile-foot { background:var(--bone); padding:16px 26px; }
  .tile-note {
    font-size:9px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--sgd); border:1px solid rgba(74,90,82,0.25);
    border-radius:100px; padding:5px 12px; display:inline-block;
  }

  .learn-cta {
    display:inline-flex; align-items:center; gap:10px;
    background:var(--ink); color:var(--bone);
    font-family:'Hanken Grotesk',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    text-decoration:none; border-radius:var(--r-pill); padding:15px 28px;
    margin-top:48px; transition:background .18s;
  }
  .learn-cta:hover { background:var(--bas); }

  @media(max-width:600px){
    .page { padding:28px 28px 36px; }
    .bottom { flex-direction:column; gap:28px; align-items:flex-start; }
    .learn-panel { padding:48px 28px 64px; }
    .learn-close { right:28px; top:18px; }
    .product-grid { grid-template-columns:1fr; }
  }
  @media(prefers-reduced-motion:reduce){ *{ transition:none!important; animation:none!important; } }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="page">

  <div class="top">
    <div class="wordmark">yoga<span>cloak</span></div>

  </div>

  <div class="center">
    <div class="eyebrow">Coming soon</div>
    <h1 class="headline">for after<strong>class.</strong></h1>
    <div class="actions">
      <a href="yogacloak-reserve-page.html" class="reserve-btn">
        Get yours
        <svg width="12" height="9" viewBox="0 0 14 10" fill="none">
          <path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <button class="learn-btn" onclick="document.getElementById('learn').classList.add('open')">
        Learn more
      </button>
    </div>
  </div>



</div>

<!-- Learn more overlay -->
<div class="learn-panel" id="learn">
  <button class="learn-close" onclick="document.getElementById('learn').classList.remove('open')">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    Close
  </button>
  <div class="learn-inner">
    <div class="learn-eyebrow">What it is</div>
    <h2 class="learn-headline">handles the sweat.<br>folds into your bag.</h2>
    <div class="product-grid">
      <div class="product-tile">
        <div class="tile-head">
          <div class="tile-tag">For the drive</div>
          <div class="tile-name">the cloak</div>
          <div class="tile-price">$98</div>
        </div>
        <div class="tile-foot">
          <div class="tile-note">$20 deposit · XS–M or L–XL</div>
        </div>
      </div>
      <div class="product-tile">
        <div class="tile-head">
          <div class="tile-tag">For the walk</div>
          <div class="tile-name">the wrap</div>
          <div class="tile-price">$68</div>
        </div>
        <div class="tile-foot">
          <div class="tile-note">$15 deposit · one size</div>
        </div>
      </div>
    </div>
    <a href="yogacloak-reserve-page.html" class="learn-cta">
      Get yours

      <svg width="12" height="9" viewBox="0 0 14 10" fill="none">
        <path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</div>

<script>
const API = "https://yogacloak-reserve.vercel.app";
const TOTAL = 100;

function paintDots(containerId, captionId, remaining) {
  const dots = document.querySelectorAll(`#${containerId} .dot`);
  // Each dot = 10% of stock. Mark from right how many are gone.
  const taken = Math.round((TOTAL - remaining) / TOTAL * 10);
  dots.forEach((d, i) => {
    d.classList.toggle("gone", i >= (10 - taken));
  });
  document.getElementById(captionId).textContent = `${remaining} of ${TOTAL} left`;
}

(async () => {
  try {
    const r = await fetch(`${API}/api/availability`);
    if (!r.ok) return;
    const d = await r.json();
    if (d.cloak != null) paintDots("cloak-dots", "cloak-caption", d.cloak);
    if (d.wrap  != null) paintDots("wrap-dots",  "wrap-caption",  d.wrap);
  } catch {}
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yogacloak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style
  :root {
    --ink:#1F2421; --sage:#7C8C82; --clay:#9A8E86;
    --fog:#C4C9C5; --bone:#ECEAE3;
  }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  html { font-family:'Hanken Grotesk',sans-serif; -webkit-font-smoothing:antialiased; }
  body {
    background:var(--ink); color:var(--bone);
    min-height:100svh; overflow-x:hidden;
  }

  .glow-1 { position:fixed; top:-150px; right:-110px; width:540px; height:540px; background:radial-gradient(circle,rgba(124,140,130,0.2),transparent 64%); pointer-events:none; z-index:0; }
  .glow-2 { position:fixed; bottom:-190px; left:-120px; width:480px; height:480px; background:radial-gradient(circle,rgba(154,142,134,0.1),transparent 66%); pointer-events:none; z-index:0; }

  .page {
    position:relative; z-index:1;
    min-height:100svh;
    display:flex; flex-direction:column;
    justify-content:space-between;
    padding:40px 48px 52px;
  }

  /* top */
  .wordmark { font-size:15px; font-weight:300; letter-spacing:-.02em; text-transform:lowercase; color:var(--bone); }
  .wordmark span { font-weight:800; }

  /* center */
  .center {}
  .soon { font-size:9px; letter-spacing:.46em; text-transform:uppercase; color:rgba(124,140,130,0.5); margin-bottom:20px; }
  .headline {
    font-size:clamp(64px,11vw,140px);
    font-weight:300; letter-spacing:-.045em; line-height:.87;
    text-transform:lowercase; color:var(--bone);
    margin-bottom:52px;
  }
  .headline strong { font-weight:800; display:block; }

  .cta-row { display:flex; align-items:center; gap:28px; }

  .btn {
    display:inline-flex; align-items:center; gap:10px;
    background:var(--bone); color:var(--ink);
    font-family:'Hanken Grotesk',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    text-decoration:none; border-radius:100px; padding:15px 28px;
    transition:background .18s;
  }
  .btn:hover { background:var(--fog); }

  .learn {
    font-size:10px; letter-spacing:.14em;
    color:rgba(196,201,197,0.35);
    background:none; border:none; cursor:pointer;
    font-family:'Hanken Grotesk',sans-serif;
    text-decoration:underline; text-underline-offset:4px;
    text-decoration-color:rgba(196,201,197,0.15);
    transition:color .18s;
  }
  .learn:hover { color:rgba(196,201,197,0.65); }

  /* bottom */
  .bottom { display:flex; align-items:flex-end; justify-content:space-between; }
  .tagline { font-size:10px; color:rgba(124,140,130,0.35); letter-spacing:.06em; }

  /* learn panel */
  .panel {
    display:none;
    position:fixed; inset:0; z-index:20;
    background:var(--ink); overflow-y:auto;
  }
  .panel.open { display:block; animation:up .28s ease; }
  @keyframes up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .panel-nav {
    display:flex; justify-content:space-between; align-items:center;
    padding:36px 48px;
  }
  .close-btn {
    font-size:9px; letter-spacing:.28em; text-transform:uppercase;
    color:rgba(124,140,130,0.45); background:none; border:none; cursor:pointer;
    font-family:'Hanken Grotesk',sans-serif; transition:color .18s;
  }
  .close-btn:hover { color:var(--sage); }

  /* hero photo */
  .hero {
    width:100%; height:55vh; min-height:300px; max-height:500px;
    position:relative; overflow:hidden;
  }
  .hero img { width:100%; height:100%; object-fit:cover; object-position:center 15%; filter:brightness(.8); }
  .hero-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,transparent 40%,rgba(31,36,33,0.75) 100%); }
  .hero-text { position:absolute; bottom:40px; left:48px; }
  .hero-eyebrow { font-size:9px; letter-spacing:.4em; text-transform:uppercase; color:rgba(196,201,197,0.5); margin-bottom:8px; }
  .hero-title { font-size:clamp(28px,4vw,46px); font-weight:800; letter-spacing:-.04em; text-transform:lowercase; color:var(--bone); line-height:.95; }

  /* panel body */
  .panel-body { max-width:560px; margin:0 auto; padding:52px 48px 80px; }

  .panel-intro { font-size:15px; color:rgba(196,201,197,0.45); line-height:1.8; font-weight:300; margin-bottom:52px; }

  /* product cards */
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:48px; }

  .card { border:1px solid rgba(236,234,227,0.09); border-radius:22px; overflow:hidden; cursor:pointer; transition:border-color .2s; }
  .card:hover { border-color:rgba(124,140,130,0.3); }
  .card.open { border-color:rgba(124,140,130,0.4); }

  .card-top { padding:22px 22px 18px; }
  .card-eyebrow { font-size:8px; letter-spacing:.32em; text-transform:uppercase; color:rgba(124,140,130,0.5); margin-bottom:6px; }
  .card-name { font-size:22px; font-weight:800; text-transform:lowercase; letter-spacing:-.025em; color:var(--bone); }
  .card-price { font-size:12px; color:rgba(196,201,197,0.3); margin-top:4px; }
  .card-chevron { float:right; margin-top:-28px; color:rgba(124,140,130,0.35); transition:transform .3s; }
  .card.open .card-chevron { transform:rotate(180deg); }

  .card-expand { max-height:0; overflow:hidden; transition:max-height .5s cubic-bezier(0.4,0,0.2,1); }
  .card.open .card-expand { max-height:600px; }
  .card-img { width:100%; aspect-ratio:3/4; object-fit:cover; object-position:center top; display:block; }
  .card-info { padding:16px 22px 20px; border-top:1px solid rgba(236,234,227,0.07); }
  .card-desc { font-size:11px; color:rgba(196,201,197,0.4); line-height:1.75; margin-bottom:14px; }
  .card-avail { font-size:11px; color:rgba(124,140,130,0.55); margin-bottom:10px; }
  .card-avail strong { font-size:20px; font-weight:800; letter-spacing:-.03em; color:var(--bone); }
  .card-note { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:rgba(124,140,130,0.5); border:1px solid rgba(124,140,130,0.18); border-radius:100px; padding:4px 11px; display:inline-block; }

  .panel-cta {
    display:inline-flex; align-items:center; gap:10px;
    background:var(--bone); color:var(--ink);
    font-family:'Hanken Grotesk',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    text-decoration:none; border-radius:100px; padding:15px 28px;
    transition:background .18s;
  }
  .panel-cta:hover { background:var(--fog); }

  .contact { margin-top:40px; padding-top:28px; border-top:1px solid rgba(236,234,227,0.07); display:flex; justify-content:space-between; align-items:center; }
  .contact-lbl { font-size:9px; letter-spacing:.32em; text-transform:uppercase; color:rgba(124,140,130,0.35); }
  .contact-email { font-size:13px; color:rgba(196,201,197,0.4); text-decoration:none; transition:color .18s; }
  .contact-email:hover { color:var(--bone); }

  @media(max-width:600px){
    .page { padding:28px 28px 40px; }
    .panel-nav { padding:28px; }
    .hero-text { left:28px; bottom:28px; }
    .panel-body { padding:40px 28px 64px; }
    .cards { grid-template-columns:1fr; }
    .cta-row { flex-direction:column; align-items:flex-start; gap:16px; }
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="page">
  <div class="wordmark">yoga<span>cloak</span></div>

  <div class="center">
    <div class="soon">coming soon</div>
    <h1 class="headline">for after<strong>class.</strong></h1>
    <div class="cta-row">
      <a href="yogacloak-reserve-page.html" class="btn">
        Get yours
        <svg width="11" height="8" viewBox="0 0 14 10" fill="none"><path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <button class="learn" onclick="document.getElementById('panel').classList.add('open');document.body.style.overflow='hidden'">
        learn more
      </button>
    </div>
  </div>

  <div class="bottom">
    <div class="tagline">for after class</div>
  </div>
</div>

<!-- learn panel -->
<div class="panel" id="panel">
  <div class="panel-nav">
    <div class="wordmark">yoga<span>cloak</span></div>
    <button class="close-btn" onclick="document.getElementById('panel').classList.remove('open');document.body.style.overflow=''">close</button>
  </div>

  <div class="hero">
    <img src="https://raw.githubusercontent.com/flowinglikeabrooke/yogacloak-reserve/main/lifestyle.png" alt="">
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <div class="hero-eyebrow">for after class</div>
      <div class="hero-title">you're not ready<br>for real clothes yet.</div>
    </div>
  </div>

  <div class="panel-body">
    <p class="panel-intro">YogaCloak is the thing you put on to get home. Matte microfiber. Folds into your bag. Two vibes — for the drive and for the walk.</p>

    <div class="cards">
      <div class="card open" id="card-cloak" onclick="toggleCard('cloak')">
        <div class="card-top">
          <div class="card-eyebrow">the drive home</div>
          <div class="card-name">the cloak</div>
          <div class="card-price">$98</div>
          <div class="card-chevron">
            <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="card-expand">
          <img class="card-img" src="https://raw.githubusercontent.com/flowinglikeabrooke/yogacloak-reserve/main/CLOAK%20STILL.png" alt="the cloak">
          <div class="card-info">
            <p class="card-desc">Hooded open-front drape. Falls long, closes with two hidden snaps. ~300 GSM recycled microfiber, matte graphite.</p>
            <div class="card-avail"><strong id="cloak-n">100</strong> of 100 left</div>
            <div class="card-note">$20 deposit · XS–M or L–XL</div>
          </div>
        </div>
      </div>

      <div class="card open" id="card-wrap" onclick="toggleCard('wrap')">
        <div class="card-top">
          <div class="card-eyebrow">the walk home</div>
          <div class="card-name">the wrap</div>
          <div class="card-price">$68</div>
          <div class="card-chevron">
            <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="card-expand">
          <img class="card-img" src="https://raw.githubusercontent.com/flowinglikeabrooke/yogacloak-reserve/main/WRAP%20STILL.png" alt="the wrap">
          <div class="card-info">
            <p class="card-desc">Oversized drape with one hidden snap. Lighter than the cloak. Packs down small. ~200 GSM, same matte graphite.</p>
            <div class="card-avail"><strong id="wrap-n">100</strong> of 100 left</div>
            <div class="card-note">$15 deposit · one size</div>
          </div>
        </div>
      </div>
    </div>

    <a href="yogacloak-reserve-page.html" class="panel-cta">
      Get yours
      <svg width="11" height="8" viewBox="0 0 14 10" fill="none"><path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

    <div class="contact">
      <div class="contact-lbl">questions</div>
      <a href="mailto:hello@yogacloak.com" class="contact-email">hello@yogacloak.com</a>
    </div>
  </div>
</div>

<script>
function toggleCard(w) {
  document.getElementById(`card-${w}`).classList.toggle("open");
}


(async () => {
  try {
    const r = await fetch("https://yogacloak-reserve.vercel.app/api/availability");
    if (!r.ok) return;
    const d = await r.json();
    if (d.cloak != null) document.getElementById("cloak-n").textContent = d.cloak;
    if (d.wrap  != null) document.getElementById("wrap-n").textContent  = d.wrap;
  } catch {}
})();
</script>
</body>
</html>

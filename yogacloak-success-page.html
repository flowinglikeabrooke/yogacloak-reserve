<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yogacloak — reserve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #1F2421; --sage: #7C8C82; --clay: #9A8E86; --fog: #C4C9C5; --bone: #ECEAE3; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-family: 'Hanken Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: var(--ink); color: var(--bone); min-height: 100svh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .glow-1 { position: fixed; top: -150px; right: -110px; width: 540px; height: 540px; background: radial-gradient(circle, rgba(124,140,130,0.2), transparent 64%); pointer-events: none; z-index: 0; }
    .glow-2 { position: fixed; bottom: -190px; left: -120px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(154,142,134,0.1), transparent 66%); pointer-events: none; z-index: 0; }
    .wrap { position: relative; z-index: 1; max-width: 640px; text-align: center; }
    .check { width: 100px; height: 100px; margin: 0 auto 3rem; border: 2.5px solid var(--bone); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: var(--bone); }
    h1 { font-size: 2.8rem; line-height: 1.2; margin-bottom: 0.5rem; font-weight: 500; letter-spacing: -0.02em; }
    .product { font-size: 2rem; color: var(--sage); font-weight: 400; margin-bottom: 2.5rem; }
    .message { font-size: 1rem; line-height: 1.6; color: var(--fog); margin-bottom: 3rem; }
    .divider { height: 1px; background: var(--fog); margin: 4rem 0; }
    .coming-label { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fog); margin-bottom: 1rem; }
    .year { font-size: 4.5rem; font-weight: 300; color: var(--bone); letter-spacing: -0.05em; }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="wrap">
    <div class="check">✓</div>
    <h1>you reserved</h1>
    <div class="product" id="product">the cloak</div>
    <div class="message">A confirmation email is on its way with your reservation details.</div>
    <div class="divider"></div>
    <div class="coming-label">coming</div>
    <div class="year">2027</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || 'cloak';
    const productEl = document.getElementById('product');
    if (product === 'both') {
      productEl.textContent = 'the cloak + the wrap';
    } else if (product === 'wrap') {
      productEl.textContent = 'the wrap';
    } else {
      productEl.textContent = 'the cloak';
    }
  </script>
</body>
</html>

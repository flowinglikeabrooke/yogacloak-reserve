<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub · yogacloak</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1E2320;--ink-2:#252b27;--panel:#151618;--panel2:#1a1d1b;--bone:#fbf8f0;--sage:#7C8C82;--clay:#9A8E86;--fog:#C4C9C5;--gold:#d8c7a2;--rose:#d4948d;--blue:#9aadb9;--line:rgba(251,248,240,.09);--muted:rgba(251,248,240,.58);--soft:rgba(251,248,240,.06);--cream:251,248,240;--shadow:0 34px 90px -48px rgba(0,0,0,.72)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--ink);color:var(--bone);font-family:Helvetica,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;padding:0;overflow-x:hidden}
a{color:inherit}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.45}
.shell{max-width:1480px;margin:0 auto;padding:24px 34px 42px}
.top{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr);gap:22px;align-items:end;margin:84px 0 20px}
.hero{padding:0 0 12px;background:transparent;border:0;box-shadow:none}
.ops-panel,.panel{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;box-shadow:var(--shadow)}
.ops-panel{padding:20px}
.ops-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.utility-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.utility-btn{background:transparent;color:rgba(var(--cream),.54);border:1px solid rgba(var(--cream),.12);border-radius:999px;padding:8px 11px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;transition:color .18s ease,border-color .18s ease,background .18s ease}
.utility-btn:hover{color:var(--bone);border-color:rgba(var(--cream),.28);background:rgba(var(--cream),.04)}
.hub-state{border-top:1px solid rgba(var(--cream),.07);margin-top:14px;padding-top:12px;display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:rgba(var(--cream),.48);line-height:1.45}
.wordmark{font-size:28px;letter-spacing:-.02em;text-decoration:none;display:inline-flex;align-items:center;gap:0}.wordmark strong{font-weight:700}.wordmark span{font-weight:400}
.eyebrow{display:block;margin:20px 0 12px;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(var(--cream),.46);font-weight:700}
h1{font-family:'Hanken Grotesk',sans-serif;font-size:clamp(42px,5.8vw,76px);font-weight:500;letter-spacing:-.04em;line-height:1.02;max-width:820px}
h1 em{font-style:italic;font-weight:300;color:rgba(var(--cream),.66)}
.sub{font-family:'Hanken Grotesk',sans-serif;color:rgba(var(--cream),.6);font-size:15px;line-height:1.7;margin-top:18px;max-width:680px;font-style:italic;font-weight:300}
.panel{padding:18px;margin-bottom:14px}
.login{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
label{display:flex;flex-direction:column;gap:7px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.46);font-weight:700}
input,select,textarea{width:100%;background:rgba(0,0,0,.18);border:1px solid rgba(var(--cream),.14);color:var(--bone);border-radius:8px;padding:12px 13px;outline:none;transition:border-color .16s ease,background .16s ease}
input:focus,select:focus,textarea:focus{border-color:rgba(215,184,114,.58);background:rgba(0,0,0,.25)}
textarea{min-height:92px;resize:vertical;line-height:1.45}
select option{background:#151719;color:var(--bone)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--bone);color:var(--ink);border-radius:999px;padding:12px 17px;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 10px 24px rgba(0,0,0,.18);transition:transform .16s ease,border-color .16s ease,background .16s ease}
.btn:hover{transform:translateY(-1px)}
.btn.quiet{background:rgba(var(--cream),.035);color:rgba(var(--cream),.76);border:1px solid rgba(var(--cream),.16);box-shadow:none}
.btn.warn{background:#d4948d;color:#1e2320}
.tabs{display:flex;gap:6px;overflow:auto;padding:12px 34px;margin:0 -34px 18px;position:sticky;top:0;background:rgba(30,35,32,.94);border-top:1px solid rgba(var(--cream),.06);border-bottom:1px solid rgba(var(--cream),.08);border-radius:0;backdrop-filter:blur(14px);z-index:3;box-shadow:0 18px 44px rgba(0,0,0,.18)}
.tab{background:transparent;color:rgba(var(--cream),.58);border:1px solid transparent;border-radius:999px;padding:10px 13px;font-size:12px;font-weight:700;white-space:nowrap}
.tab:hover{color:var(--bone);background:rgba(var(--cream),.045)}
.tab.active{background:var(--bone);color:var(--ink);box-shadow:0 10px 30px -18px rgba(0,0,0,.62)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:#151618;border:1px solid rgba(var(--cream),.08);border-radius:8px;padding:18px;min-height:108px;box-shadow:0 20px 60px -42px rgba(0,0,0,.8)}
.card:nth-child(3n+1){border-top-color:rgba(148,161,135,.52)}
.card:nth-child(3n+2){border-top-color:rgba(215,184,114,.48)}
.card:nth-child(3n+3){border-top-color:rgba(145,169,189,.42)}
.card span{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:700}
.card strong{display:block;font-family:'Hanken Grotesk',sans-serif;font-size:36px;font-weight:500;letter-spacing:-.035em;margin-top:12px}
.card small{display:block;margin-top:8px;color:rgba(var(--cream),.42);line-height:1.35}
.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:4px 0 14px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:10px}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(var(--cream),.12);border-radius:999px;padding:7px 10px;font-size:11px;color:rgba(var(--cream),.66);background:rgba(var(--cream),.035)}
.pill strong{color:var(--bone)}
.table-wrap{overflow:auto;border-radius:8px;border:1px solid rgba(var(--cream),.08);background:#111314}
table{width:100%;border-collapse:collapse;min-width:960px}
th,td{text-align:left;border-bottom:1px solid rgba(var(--cream),.07);padding:14px 14px;font-size:12px;vertical-align:top}
th{font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.44);font-weight:700;background:rgba(var(--cream),.035);position:sticky;top:0}
td{color:rgba(var(--cream),.72);line-height:1.4}
tbody tr{transition:background .14s ease}
tbody tr:hover{background:rgba(var(--cream),.025)}
tr:last-child td{border-bottom:0}
.muted{color:rgba(var(--cream),.42)}
.ok{color:#a9b997}.error{color:var(--rose)}.money{color:var(--gold)}.link{color:#d7e1cd;text-decoration:none;border-bottom:1px solid rgba(215,225,205,.38);cursor:pointer;font-weight:700}
.link:hover{border-bottom-color:#d7e1cd}
.status{display:inline-block;border:1px solid rgba(var(--cream),.13);border-radius:999px;padding:5px 8px;color:rgba(var(--cream),.78);white-space:nowrap}
.ready{border-color:rgba(154,170,136,.38);color:#9aaa88}.needs{border-color:rgba(219,186,123,.35);color:#dbba7b}.waiting{border-color:rgba(138,164,192,.35);color:#9bb6ce}.blocked{border-color:rgba(212,148,141,.35);color:#d4948d}.charged{color:rgba(var(--cream),.55)}
.notice{border:1px solid rgba(var(--cream),.12);border-radius:8px;padding:15px 16px;background:rgba(var(--cream),.04);color:rgba(var(--cream),.68);line-height:1.5;margin-bottom:14px}
.notice strong{color:var(--bone)}
.notice.warn{border-color:rgba(212,148,141,.28);background:rgba(212,148,141,.08)}
.notice.good{border-color:rgba(154,170,136,.28);background:rgba(154,170,136,.08)}
.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}
.mini{border:1px solid rgba(var(--cream),.105);border-radius:8px;padding:13px;background:rgba(0,0,0,.16)}
.mini span{display:block;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:700}
.mini strong{display:block;margin-top:8px;font-size:17px}
.setup-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
.setup-card{border:1px solid rgba(var(--cream),.105);border-radius:8px;padding:15px;background:rgba(var(--cream),.028)}
.setup-card strong{display:block;font-size:15px;margin:8px 0}
.setup-card p{color:rgba(var(--cream),.5);font-size:12px;line-height:1.45}
.health{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:700;border:1px solid rgba(var(--cream),.12);color:rgba(var(--cream),.72)}
.health.good{color:#9aaa88;border-color:rgba(154,170,136,.35)}
.health.warn{color:#dbba7b;border-color:rgba(219,186,123,.35)}
.health.bad{color:#d4948d;border-color:rgba(212,148,141,.35)}
.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(500px,620px);gap:16px}
.detail{position:sticky;top:92px;align-self:start;max-height:calc(100vh - 110px);overflow:auto;background:var(--bone);color:var(--ink);border-color:rgba(30,35,32,.12);box-shadow:0 40px 90px -46px rgba(0,0,0,.72)}
.customer-page{position:static;max-height:none;overflow:visible;margin-top:12px}
.customer-page .profile-head{border-bottom-color:rgba(30,35,32,.1)}
.customer-page-shell{max-width:1180px;margin:0 auto}
.detail .section-title,.detail .timeline-item strong{color:var(--ink)}
.detail .muted,.detail p{color:rgba(30,35,32,.58)}
.detail label{color:rgba(30,35,32,.55)}
.detail input,.detail select,.detail textarea{background:rgba(30,35,32,.045);border:1.5px solid rgba(30,35,32,.12);color:var(--ink)}
.detail input:focus,.detail select:focus,.detail textarea:focus{border-color:var(--sage);background:rgba(124,140,130,.06)}
.detail select option{background:var(--bone);color:var(--ink)}
.detail .btn{background:var(--ink);color:var(--bone)}
.detail .btn.quiet{background:transparent;color:rgba(30,35,32,.72);border-color:rgba(30,35,32,.18)}
.detail .pill{border-color:rgba(30,35,32,.14);background:rgba(30,35,32,.04);color:rgba(30,35,32,.62)}
.detail .pill strong{color:var(--ink)}
.detail .table-wrap{background:rgba(30,35,32,.035);border-color:rgba(30,35,32,.1)}
.detail th{background:rgba(30,35,32,.045);color:rgba(30,35,32,.48)}
.detail td{color:rgba(30,35,32,.68);border-bottom-color:rgba(30,35,32,.08)}
.detail tbody tr:hover{background:rgba(30,35,32,.035)}
.detail .notice{background:rgba(30,35,32,.04);border-color:rgba(30,35,32,.12);color:rgba(30,35,32,.66)}
.detail .notice strong{color:var(--ink)}
.detail .notice.warn{background:rgba(124,140,130,.08);border-color:rgba(124,140,130,.28)}
.detail .health.good{color:#4f684f;border-color:rgba(79,104,79,.28)}
.detail .health.warn{color:#736b50;border-color:rgba(115,107,80,.28)}
.detail .link{color:var(--ink);border-bottom-color:rgba(30,35,32,.22)}
.detail-block{border:1px solid rgba(30,35,32,.09);border-radius:8px;padding:14px;margin-top:14px;background:rgba(30,35,32,.025)}
.detail-block .section-title{font-size:18px;margin-bottom:10px}
.crm-tools{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.crm-tool{border:1px solid rgba(30,35,32,.1);border-radius:8px;padding:12px;background:rgba(30,35,32,.03)}
.crm-tool strong{display:block;font-size:14px;color:var(--ink);margin-bottom:5px}
.crm-tool p{font-size:12px;line-height:1.4;margin-bottom:10px}
.crm-tool.danger{background:rgba(212,148,141,.08);border-color:rgba(130,68,64,.16)}
.automation-studio{display:grid;grid-template-columns:280px minmax(0,1fr);gap:14px;align-items:start}
.automation-rail,.automation-builder{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:14px}
.automation-rail h3,.automation-builder h3{font-size:16px;margin-bottom:8px}
.automation-rail p,.automation-builder p{font-size:12px;line-height:1.45;color:rgba(var(--cream),.52)}
.automation-preset{width:100%;display:block;text-align:left;background:rgba(var(--cream),.035);border:1px solid rgba(var(--cream),.08);border-radius:8px;color:rgba(var(--cream),.72);padding:12px;margin-top:8px;box-shadow:none}
.automation-preset strong{display:block;color:var(--bone);font-size:13px;margin-bottom:4px}
.automation-preset span{display:block;font-size:11px;line-height:1.35;color:rgba(var(--cream),.48)}
.automation-preset:hover{background:rgba(var(--cream),.06);transform:translateY(-1px)}
.automation-builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.automation-palette{display:grid;gap:8px;margin-top:8px}
.automation-choice{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid rgba(var(--cream),.1);border-radius:8px;background:rgba(var(--cream),.035);padding:12px}
.automation-choice strong{color:var(--bone);font-size:13px}
.automation-choice span{font-size:11px;color:rgba(var(--cream),.5)}
.automation-plus{min-width:36px;height:36px;border-radius:999px;padding:0;font-size:20px;line-height:1}
.automation-settings-layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:14px;align-items:start}
.automation-list{display:grid;gap:8px}
.automation-list button{width:100%;text-align:left;display:block;background:rgba(var(--cream),.035);border:1px solid rgba(var(--cream),.08);border-radius:8px;color:rgba(var(--cream),.68);padding:13px;box-shadow:none}
.automation-list button.active{background:var(--bone);color:var(--ink);border-color:var(--bone)}
.automation-list strong{display:block;font-size:13px;color:inherit}
.automation-list span{display:block;margin-top:4px;font-size:11px;color:inherit;opacity:.7;line-height:1.35}
.automation-board{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px}
.automation-card{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:18px;box-shadow:0 20px 60px -42px rgba(0,0,0,.8)}
.automation-card header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.automation-card h3{font-size:18px;font-weight:600;letter-spacing:-.02em;line-height:1.15}
.automation-card p{color:rgba(var(--cream),.5);font-size:12px;line-height:1.45;margin-top:6px}
.automation-card label{margin-top:10px}
.automation-card textarea{min-height:128px}
.automation-flow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:12px 0}
.automation-flow div{border:1px solid rgba(var(--cream),.1);border-radius:8px;padding:10px;background:rgba(var(--cream),.035)}
.automation-flow span{display:block;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.automation-flow strong{display:block;margin-top:6px;font-size:14px;line-height:1.18}
.toggle-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0}
.toggle-row input[type=checkbox]{width:auto;accent-color:#d8c7a2}
.check-row{display:flex;flex-direction:row;align-items:center;gap:9px;margin-top:10px;font-size:11px;letter-spacing:0;text-transform:none;color:rgba(30,35,32,.66)}
.check-row input[type=checkbox]{width:auto;accent-color:var(--sage)}
.field-help{display:block;margin-top:6px;font-size:11px;letter-spacing:0;text-transform:none;color:rgba(30,35,32,.5);font-weight:400;line-height:1.35}
.hub-toolbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.hub-toolbar .muted{max-width:560px}
.hub-lenses{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.lens-btn{border:1px solid rgba(var(--cream),.12);border-radius:999px;background:rgba(var(--cream),.035);color:rgba(var(--cream),.62);padding:10px 13px;font-size:10px;letter-spacing:.11em;text-transform:uppercase;font-weight:800;box-shadow:none}
.lens-btn:hover{transform:translateY(-1px);border-color:rgba(var(--cream),.22);background:rgba(var(--cream),.07)}
.lens-btn.active{background:var(--bone);color:var(--ink);border-color:var(--bone);box-shadow:0 18px 45px -34px rgba(251,248,240,.8)}
.hub-card-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.hub-card-grid .card{min-height:118px;display:flex;flex-direction:column;justify-content:space-between}
.hub-card-grid .card strong{font-size:38px;letter-spacing:0}
.hub-card-grid .card small{color:rgba(var(--cream),.48);font-size:12px;line-height:1.35}
.hub-card-grid .card.is-hot{border-color:rgba(212,148,141,.28);background:linear-gradient(145deg,rgba(212,148,141,.12),rgba(var(--cream),.03))}
.hub-work-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px}
.automation-card .meta{margin-top:12px}
.automation-log-body{white-space:pre-wrap;max-width:420px}
.id-line{display:block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;color:rgba(30,35,32,.52);word-break:break-all;margin-top:4px}
.record-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.record-grid label:first-child,.record-grid label:last-child{grid-column:1/-1}
.customer-picker{position:relative;grid-column:1/-1}
.typeahead-results{position:absolute;left:0;right:0;top:100%;z-index:8;margin-top:6px;background:#101211;border:1px solid rgba(var(--cream),.14);border-radius:8px;box-shadow:0 24px 60px -36px rgba(0,0,0,.92);overflow:hidden}
.typeahead-option{width:100%;display:flex;justify-content:space-between;gap:12px;text-align:left;background:transparent;color:rgba(var(--cream),.78);border-bottom:1px solid rgba(var(--cream),.07);border-radius:0;padding:12px 13px;box-shadow:none}
.typeahead-option:hover{background:rgba(var(--cream),.055);transform:none}
.typeahead-option:last-child{border-bottom:0}
.typeahead-option strong{display:block;color:var(--bone);font-size:13px}
.typeahead-option span{display:block;color:rgba(var(--cream),.52);font-size:11px;line-height:1.35;margin-top:3px}
.typeahead-option em{font-style:normal;color:rgba(var(--cream),.42);font-size:10px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.selected-customer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px;border:1px solid rgba(154,170,136,.3);border-radius:8px;background:rgba(154,170,136,.09);padding:10px 11px;color:rgba(var(--cream),.78);font-size:12px;letter-spacing:0;text-transform:none}
.selected-customer strong{color:var(--bone)}
.selected-customer button{background:transparent;color:rgba(var(--cream),.6);border:1px solid rgba(var(--cream),.14);border-radius:999px;padding:5px 8px;font-size:10px}
.record-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px}
.record-actions .muted{font-size:12px;line-height:1.35}
.detail .table-wrap{margin-top:8px}
.detail table{min-width:620px}
.btn.small{padding:8px 10px;font-size:10.5px}
.btn.danger{background:#d4948d;color:#1e2320}
.detail .btn.danger{background:#d4948d;color:#1e2320}
.profile-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(var(--cream),.08);padding-bottom:14px;margin-bottom:12px}
.profile-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.profile-overview{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-top:12px}
.profile-stat{border:1px solid rgba(30,35,32,.1);border-radius:8px;padding:12px;background:rgba(30,35,32,.035);min-height:74px}
.profile-stat span{display:block;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(30,35,32,.48);font-weight:700}
.profile-stat strong{display:block;margin-top:8px;font-size:18px;line-height:1.15;letter-spacing:-.02em}
.profile-hubs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-top:12px}
.profile-hub{border:1px solid rgba(30,35,32,.1);border-radius:8px;padding:12px;background:#fffaf0;min-height:104px}
.profile-hub span{display:block;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(30,35,32,.48);font-weight:800}
.profile-hub strong{display:block;margin-top:8px;font-size:20px;line-height:1.08;letter-spacing:-.025em;color:var(--ink)}
.profile-hub p{margin-top:7px;font-size:12px;line-height:1.35}
.next-action{border:1px solid rgba(124,140,130,.28);border-radius:8px;padding:15px;margin-top:12px;background:rgba(124,140,130,.1)}
.next-action span{display:block;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(30,35,32,.5);font-weight:800}
.next-action strong{display:block;margin-top:7px;font-size:20px;letter-spacing:-.02em}
.next-action p{margin-top:5px;line-height:1.45}
.next-action .actions{margin-top:12px}
.profile-columns{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.quick-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
.quick-actions .btn{padding:10px 12px;font-size:11px}
.timeline-list{display:grid;gap:8px;margin-top:10px}
.timeline-item{border-left:2px solid rgba(124,140,130,.58);padding:9px 10px 9px 12px;color:rgba(30,35,32,.68);font-size:12px;line-height:1.45;background:rgba(30,35,32,.025);border-radius:0 8px 8px 0}
.timeline-item strong{display:block;color:var(--ink);font-size:13px;margin-bottom:2px}
.timeline-item span{display:block;color:rgba(30,35,32,.46);font-size:11px}
.timeline-item .status{margin-top:6px;color:rgba(30,35,32,.58);border-color:rgba(30,35,32,.14)}
.hide{display:none!important}
.select-cell{width:42px}.select-cell input{width:auto}
.empty{padding:28px;color:rgba(var(--cream),.48);text-align:center}
.section-title{font-size:22px;font-weight:500;letter-spacing:-.02em;margin-bottom:12px}
@media(max-width:980px){.shell{padding:20px}.top,.login,.split{display:block;margin-top:64px}.login>*{margin-bottom:10px}.grid,.setup-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.detail{position:static;max-height:none;overflow:visible}.btn{width:100%}.actions{width:100%}.actions .btn{flex:1}.utility-btn{width:auto}.ops-panel{margin-top:12px}.tabs{margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px}}
@media(max-width:620px){.shell{padding:16px}.grid,.quick-actions,.profile-overview,.profile-hubs,.profile-columns,.record-grid,.automation-board{grid-template-columns:1fr}.record-grid label:first-child,.record-grid label:last-child{grid-column:auto}h1{font-size:38px}.tabs{margin-left:-16px;margin-right:-16px;padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<main id="main-content" class="shell">
<div class="top">
<div class="hero">
<a href="/" class="wordmark"><span>yoga</span><strong>cloak</strong></a>
<span class="eyebrow">Private admin hub</span>
<h1><span id="heroRoleLabel">Owner</span> <em>command</em> center.</h1>
<p class="sub">A private retail CRM for the first drop: client profiles, inquiries, reservations, messages, follow-ups, and owner-only money tools in one calm place.</p>
</div>
<aside class="ops-panel">
<div class="ops-head">
<div class="section-title">Command center</div>
<div class="utility-actions">
<button class="utility-btn" id="loadBtn">Update</button>
<button class="utility-btn" id="logoutBtn">Log out</button>
</div>
</div>
<div id="heroStatus" class="notice">Update the hub to refresh live data.</div>
<div class="mini-grid">
<div class="mini"><span>Current tab</span><strong id="currentTabLabel">Today</strong></div>
<div class="mini"><span>Session</span><strong id="sessionUserLabel">Private</strong></div>
</div>
<div class="hub-state"><span id="statusText">Ready.</span><span id="storageText"></span></div>
</aside>
</div>

<nav class="tabs" aria-label="Admin sections">
<button class="tab active" data-tab="today">Today</button>
<button class="tab" data-tab="tasks">Tasks</button>
<button class="tab" data-tab="customers">Customers</button>
<button class="tab" data-tab="inquiries">Inquiries</button>
<button class="tab" data-tab="reservations">Reservations</button>
<button class="tab" data-tab="payments">Payments</button>
<button class="tab" data-tab="communications">Comms</button>
<button class="tab" data-tab="automations">Automations</button>
<button class="tab" data-tab="finals">Final Balances</button>
<button class="tab" data-tab="accounting">Accounting</button>
<button class="tab" data-tab="duplicates">Duplicates</button>
<button class="tab" data-tab="settings">Settings</button>
</nav>

<section id="today" class="view"></section>
<section id="tasks" class="view hide"></section>
<section id="customers" class="view hide"></section>
<section id="inquiries" class="view hide"></section>
<section id="reservations" class="view hide"></section>
<section id="payments" class="view hide"></section>
<section id="communications" class="view hide"></section>
<section id="automations" class="view hide"></section>
<section id="finals" class="view hide"></section>
<section id="accounting" class="view hide"></section>
<section id="duplicates" class="view hide"></section>
<section id="settings" class="view hide"></section>
</main>

<script>
var statusText=document.getElementById('statusText');
var storageText=document.getElementById('storageText');
var heroStatus=document.getElementById('heroStatus');
var currentTabLabel=document.getElementById('currentTabLabel');
var csrfToken='__ADMIN_CSRF_TOKEN__';
var adminUserRaw='__ADMIN_USER_JSON__';
var adminUser=adminUserRaw.indexOf('__ADMIN_USER_JSON__')===0?{name:'Preview',role:'founder',email:''}:JSON.parse(adminUserRaw);
if(!adminUser||typeof adminUser!=='object'||Array.isArray(adminUser)){adminUser={name:'Preview',role:'founder',email:''}}
var directFilePreview=location.protocol==='file:'||csrfToken==='__ADMIN_CSRF_TOKEN__';
var activeTab='today';
var state={dashboard:null,tasks:null,taskFilter:'active',customers:[],customerDetail:null,inquiries:[],reservations:[],payments:[],communications:null,automations:null,activeAutomationKey:null,accounting:null,duplicates:[],selected:new Set(),batchResults:null,noticeResults:null,rawSyncResults:null,finalBalanceSafety:null,finalBalanceSummary:null,finalBalanceMeta:null,batchBusy:false};
var taskCustomerSearchTimer=null;
var ownerOnlyTabs=new Set(['reservations','payments','finals','accounting']);
var founderOnlyTabs=new Set(['automations','duplicates','settings']);
function isFounder(){return adminUser&&adminUser.role==='founder'}
function isOwner(){return adminUser&&['founder','owner'].includes(adminUser.role)}
function canOpenTab(tab){if(isFounder())return true;if(founderOnlyTabs.has(tab))return false;return isOwner()||!ownerOnlyTabs.has(tab)}
function applyRoleUi(){
document.getElementById('sessionUserLabel').textContent=(adminUser.name||'Team')+' · '+formatStatus(adminUser.role||'staff');
document.getElementById('heroRoleLabel').textContent=isFounder()?'Founder':(isOwner()?'Owner':'Team');
document.querySelectorAll('.tab').forEach(function(btn){
var locked=!canOpenTab(btn.dataset.tab);
btn.classList.toggle('hide',locked);
btn.setAttribute('aria-hidden',locked?'true':'false');
});
}
document.getElementById('loadBtn').addEventListener('click',loadCurrent);
document.getElementById('logoutBtn').addEventListener('click',async function(){await fetch('/api/admin-logout',{method:'POST'});location.reload()});
document.querySelectorAll('.tab').forEach(function(btn){btn.addEventListener('click',function(){setTab(btn.dataset.tab)})});

function esc(value){return String(value||'').replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]})}
function money(value){return '$'+Number(value||0).toFixed(0)}
function date(value){return value?String(value).slice(0,10):''}
function endpoint(path){return fetch(path,{credentials:'same-origin'}).then(async function(res){var data=await res.json().catch(function(){return {}});if(res.status===401){location.reload();throw new Error('Admin session expired.')}if(!res.ok)throw new Error(data.error||'Could not load');return data})}
function post(path,body){return fetch(path,{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','x-csrf-token':csrfToken},body:JSON.stringify(body)}).then(async function(res){var data=await res.json().catch(function(){return {}});if(res.status===401){location.reload();throw new Error('Admin session expired.')}if(!res.ok&&res.status!==207)throw new Error(data.error||'Request failed');return data})}
function setBusy(text){statusText.textContent=text}
function readyClass(group){if(group==='Ready to Charge')return 'ready';if(group==='Needs Notice')return 'needs';if(group==='Waiting Period')return 'waiting';if(group==='Already Charged')return 'charged';return 'blocked'}
function tabLabel(tab){return ({today:'Today',tasks:'Tasks',customers:'Customers',inquiries:'Inquiries',reservations:'Reservations',payments:'Payments',communications:'Comms',automations:'Automations',finals:'Final Balances',accounting:'Accounting',duplicates:'Duplicates',settings:'Settings'}[tab]||tab)}
function health(value){return value?'<span class="health good">On</span>':'<span class="health bad">Missing</span>'}
function ownerOnlyNotice(tab){return '<section class="panel"><div class="notice warn"><strong>'+esc(founderOnlyTabs.has(tab)?'Founder-only area.':'Owner-only area.')+'</strong><br>'+esc(tabLabel(tab))+' includes '+esc(founderOnlyTabs.has(tab)?'security, automation, duplicate cleanup, or destructive controls.':'money or final-balance controls.')+' Staff profiles can work customers, inquiries, tasks, notes, and messages.</div></section>'}
function renderHeroStatus(){
heroStatus.className='notice';
heroStatus.innerHTML='<strong>Command center</strong><br>Use Update to refresh this workspace. Setup warnings and security status now live in Settings.';
currentTabLabel.textContent=tabLabel(activeTab);
}

function commandCenterSettingsPanel(){
var d=state.dashboard||{};
var s=d.security_status||{};
var summary=d.summary||{};
var warnings=[];
if(d.database_error)warnings.push(d.database_error);
if(s.admin_session_secret_configured===false)warnings.push('Add ADMIN_SESSION_SECRET so admin sessions stay secure across deploys.');
if(s.supabase_configured===false)warnings.push('Airtable raw fallback is active. Connect the private CRM database when you want database-first tracking.');
if(s.stripe_mode==='live'&&!s.allow_live_final_charges)warnings.push('Stripe is live, but final-balance batch charging is locked.');
if(s.stripe_mode==='missing')warnings.push('Add Stripe keys before payment testing.');
var ready=Number(summary.ready_to_charge||0);
var needs=Number(summary.needs_notice||0);
var rawBackup=Number(summary.raw_backup_customers||0)+Number(summary.raw_backup_inquiries||0);
var className=warnings.length?'notice warn':'notice good';
var message=warnings.length?warnings[0]:'Private CRM database is connected and admin access is working.';
return '<section class="panel"><div class="section-title">Command center</div><div class="'+esc(className)+'"><strong>'+esc(message)+'</strong><div class="meta"><span class="pill">Needs notice <strong>'+esc(needs)+'</strong></span><span class="pill">Ready to charge <strong>'+esc(ready)+'</strong></span><span class="pill">Raw-only records <strong>'+esc(rawBackup)+'</strong></span><span class="pill">Stripe <strong>'+esc(s.stripe_mode||'unknown')+'</strong></span><span class="pill">Raw backup <strong>Airtable</strong></span><span class="pill">Current tab <strong>'+esc(tabLabel(activeTab))+'</strong></span><span class="pill">Session <strong>'+esc((adminUser.name||'Team')+' · '+formatStatus(adminUser.role||'staff'))+'</strong></span></div></div></section>';
}

function setTab(tab){
if(!canOpenTab(tab)){statusText.innerHTML='<span class="error">Owner access required for '+esc(tabLabel(tab))+'.</span>';return}
activeTab=tab;
currentTabLabel.textContent=tabLabel(tab);
document.querySelectorAll('.tab').forEach(function(btn){btn.classList.toggle('active',btn.dataset.tab===tab)});
document.querySelectorAll('.view').forEach(function(view){view.classList.toggle('hide',view.id!==tab)});
render();
loadCurrent();
}

async function loadCurrent(){
try{
if(directFilePreview){renderDirectFileNotice();return}
if(!canOpenTab(activeTab)){document.getElementById(activeTab).innerHTML=ownerOnlyNotice(activeTab);return}
if(activeTab==='today'){setBusy('Loading dashboard...');state.dashboard=await endpoint('/api/admin-dashboard')}
if(activeTab==='tasks'){setBusy('Loading tasks...');state.tasks=await endpoint('/api/admin-tasks?status='+encodeURIComponent(state.taskFilter||'active'))}
if(activeTab==='customers'){setBusy('Loading customers...');state.customers=(await endpoint('/api/admin-customers')).customers||[]}
if(activeTab==='inquiries'){setBusy('Loading inquiries...');state.inquiries=(await endpoint('/api/admin-inquiries')).inquiries||[]}
if(activeTab==='reservations'){setBusy('Loading reservations...');var reservationData=await endpoint('/api/admin-reservations');state.reservations=reservationData.reservations||[];state.finalBalanceSafety=reservationData.final_balance_safety||null;state.finalBalanceSummary=reservationData.final_balance_summary||null;state.finalBalanceMeta={records_available:reservationData.records_available||0,records_returned:reservationData.records_returned||0,record_limit:reservationData.record_limit||0,has_more:!!reservationData.has_more}}
if(activeTab==='payments'){setBusy('Loading payments...');state.payments=(await endpoint('/api/admin-payments')).payments||[]}
if(activeTab==='communications'){setBusy('Loading communications...');state.communications=await endpoint('/api/admin-communications')}
if(activeTab==='automations'){setBusy('Loading automations...');state.automations=await endpoint('/api/admin-automations')}
if(activeTab==='finals'){setBusy('Loading final balances...');var finalData=await endpoint('/api/admin-reservations');state.reservations=finalData.reservations||[];state.finalBalanceSafety=finalData.final_balance_safety||null;state.finalBalanceSummary=finalData.final_balance_summary||null;state.finalBalanceMeta={records_available:finalData.records_available||0,records_returned:finalData.records_returned||0,record_limit:finalData.record_limit||0,has_more:!!finalData.has_more};state.selected.clear()}
if(activeTab==='accounting'){setBusy('Loading accounting...');state.accounting=await endpoint('/api/admin-accounting')}
if(activeTab==='duplicates'){setBusy('Loading duplicates...');state.duplicates=(await endpoint('/api/admin-duplicates')).duplicates||[]}
if(activeTab==='settings'){state.dashboard=state.dashboard||await endpoint('/api/admin-dashboard')}
statusText.innerHTML='<span class="ok">Loaded '+activeTab+'.</span>';
if(state.dashboard&&state.dashboard.admin_user){adminUser=state.dashboard.admin_user;applyRoleUi()}
storageText.textContent=state.dashboard&&state.dashboard.database_error?'Private CRM needs database setup. Airtable raw fallback is still available.':(state.dashboard&&state.dashboard.database_enabled===false?'Airtable raw fallback active. Private CRM database not connected yet.':'Private CRM database connected. Airtable remains the raw backup.');
renderHeroStatus();
render();
}catch(err){statusText.innerHTML='<span class="error">'+esc(err.message)+'</span>';render()}
}

function renderDirectFileNotice(){
activeTab='today';
currentTabLabel.textContent='Disconnected preview';
document.querySelectorAll('.tab').forEach(function(btn){btn.classList.toggle('active',btn.dataset.tab==='today')});
document.querySelectorAll('.view').forEach(function(view){view.classList.toggle('hide',view.id!=='today')});
statusText.innerHTML='<span class="error">This is the raw local file preview, not the live CRM.</span>';
storageText.textContent='Open the deployed private admin page so the hub can use its secure session and live APIs.';
heroStatus.className='notice warn';
heroStatus.innerHTML='<strong>Disconnected preview.</strong><br>This page was opened from your computer files, so it cannot load customers, Airtable sync, Stripe readiness, CSRF security, or admin session data.';
document.getElementById('today').innerHTML='<section class="panel"><div class="section-title">Open the real admin hub</div><div class="notice warn"><strong>This local file will always look incomplete.</strong><br>The CRM only works through the protected server page. Use the deployed private admin URL when you want live customers, inquiries, payments, and final-balance tools.</div><div class="meta"><span class="pill">Admin session <strong>not connected</strong></span><span class="pill">CRM APIs <strong>not connected</strong></span><span class="pill">Stripe tools <strong>not connected</strong></span><span class="pill">Airtable sync <strong>not connected</strong></span></div><div class="actions" style="margin-top:16px"><a class="btn" href="https://www.yogacloak.com/yogacloak-admin.html">Open live admin hub</a><a class="btn quiet" href="https://www.yogacloak.com/api/admin-page">Open protected admin route</a></div></section>';
}

function render(){({today:renderToday,tasks:renderTasks,customers:renderCustomers,inquiries:renderInquiries,reservations:renderReservations,payments:renderPayments,communications:renderCommunications,automations:renderAutomations,finals:renderFinals,accounting:renderAccounting,duplicates:renderDuplicates,settings:renderSettings}[activeTab]||renderToday)()}

function renderCards(summary){
var items=[
['Customers',summary.customers],['New inquiries',summary.new_inquiries],['Needs notice',summary.needs_notice],['Ready to charge',summary.ready_to_charge],
['Not contacted',summary.not_contacted],['Follow-ups due',summary.follow_ups_due],['Raw backup',Number(summary.raw_backup_customers||0)+Number(summary.raw_backup_inquiries||0)],['Failed payments',summary.failed_payments]
];
return '<div class="grid">'+items.map(function(item){return '<div class="card"><span>'+esc(item[0])+'</span><strong>'+esc(item[1]===undefined?0:item[1])+'</strong></div>'}).join('')+'</div>';
}

function hubCardDefinitions(summary){
return [
{id:'customers',label:'Customers',value:summary.customers||0,note:'People in CRM'},
{id:'new_inquiries',label:'New inquiries',value:summary.new_inquiries||0,note:'Fresh site activity'},
{id:'tasks_overdue',label:'Overdue tasks',value:summary.tasks_overdue||0,note:'Needs action now'},
{id:'tasks_active',label:'Active tasks',value:summary.tasks_active||0,note:'Open owner work'},
{id:'needs_notice',label:'Needs notice',value:summary.needs_notice||0,note:'Final balance email not sent'},
{id:'ready_to_charge',label:'Ready to charge',value:summary.ready_to_charge||0,note:'Run dry run first'},
{id:'not_contacted',label:'Not contacted',value:summary.not_contacted||0,note:'Customers needing first touch'},
{id:'follow_ups_due',label:'Follow-ups due',value:summary.follow_ups_due||0,note:'Reply queue'},
{id:'failed_payments',label:'Failed payments',value:summary.failed_payments||0,note:'Payment cleanup'},
{id:'raw_backup',label:'Raw backup',value:Number(summary.raw_backup_customers||0)+Number(summary.raw_backup_inquiries||0),note:'Airtable-only records'}
];
}

function hubLens(){
var saved=localStorage.getItem('yogacloak_hub_lens');
return ['focus','sales','ops','founder'].includes(saved)?saved:'focus';
}

function hubPrefsForLens(lens){
var prefs={
focus:['new_inquiries','tasks_overdue','tasks_active','follow_ups_due','not_contacted','failed_payments'],
sales:['customers','new_inquiries','needs_notice','ready_to_charge','failed_payments','raw_backup'],
ops:['tasks_overdue','tasks_active','follow_ups_due','not_contacted','raw_backup','customers'],
founder:['customers','ready_to_charge','failed_payments','needs_notice','raw_backup','new_inquiries']
};
return new Set(prefs[lens]||prefs.focus);
}

function setHubLens(lens){
localStorage.setItem('yogacloak_hub_lens',lens);
renderToday();
}

function renderHubCards(summary){
var lens=hubLens();
var prefs=hubPrefsForLens(lens);
var cards=hubCardDefinitions(summary);
var visible=cards.filter(function(card){return prefs.has(card.id)});
if(!visible.length)visible=cards.slice(0,4);
var lenses=[['focus','Focus','What needs your attention now'],['sales','Sales','Deposits, balances, and customer movement'],['ops','Ops','Tasks, follow-ups, and cleanup'],['founder','Founder','Money, risk, and systems']];
return '<section class="panel"><div class="hub-toolbar"><div><div class="section-title">Command hub</div><p class="muted">Personalized for '+esc(adminUser.name||'you')+'. Pick the lens for how you want to work right now.</p></div><div class="hub-lenses">'+lenses.map(function(item){return '<button class="lens-btn '+(lens===item[0]?'active':'')+'" data-hub-lens="'+esc(item[0])+'" title="'+esc(item[2])+'">'+esc(item[1])+'</button>'}).join('')+'</div></div><div class="hub-card-grid">'+visible.map(function(card){var hot=Number(card.value||0)>0&&['tasks_overdue','failed_payments','ready_to_charge','new_inquiries'].includes(card.id);return '<div class="card '+(hot?'is-hot':'')+'"><span>'+esc(card.label)+'</span><strong>'+esc(card.value||0)+'</strong><small>'+esc(card.note)+'</small></div>'}).join('')+'</div></section>';
}

function renderToday(){
var root=document.getElementById('today');
var data=state.dashboard;
if(!data){root.innerHTML='<div class="empty">Load the hub to see today\'s action list.</div>';return}
var tasks=data.tasks||[];
var summary=data.summary||{};
var rawBackupCount=Number(summary.raw_backup_customers||0)+Number(summary.raw_backup_inquiries||0);
var canSyncRaw=isFounder()&&data.database_enabled!==false&&rawBackupCount>0;
var rawNotice=rawBackupCount?'<div class="notice warn"><strong>'+esc(rawBackupCount)+' Airtable-only record(s) need review.</strong><br>Airtable is the raw receipt. Sync it into the private CRM to make one organized customer profile the center of truth.'+(canSyncRaw?'<div class="actions" style="margin-top:12px"><button class="btn" id="syncRawBackupBtn">Sync raw backup</button></div>':'')+'</div>':'';
var databaseNotice=data.database_error?'<div class="notice warn"><strong>Private CRM database needs setup.</strong><br>'+esc(data.database_error)+'</div>':'';
root.innerHTML=renderHubCards(summary)+syncStatusNotice()+databaseNotice+rawNotice+rawSyncReport()+
'<section class="panel"><div class="section-title">Today\'s action list</div>'+table(['Signal','What happened','Contact','Date','Action'],tasks.map(function(row){return [esc(formatStatus(row.type)),esc(row.title),customerLink(row.customer_id,row.detail),esc(date(row.created_at)),openProfileButton(row.customer_id,'Open profile')]}),true)+'</section>'+
'<section class="panel"><div class="section-title">Recent customer timeline</div>'+table(['Signal','Contact','Details','Date','Action'],(data.recent_events||[]).map(function(row){var customerId=row.customer_id||row.customers&&row.customers.id;return [esc(row.title||row.event_type),customerLink(customerId,row.customers&&row.customers.full_name||''),esc(row.details||''),esc(date(row.occurred_at)),openProfileButton(customerId,'Open timeline')]}),true)+'</section>';
bindCustomerOpeners();
document.querySelectorAll('[data-hub-lens]').forEach(function(btn){btn.addEventListener('click',function(){setHubLens(btn.dataset.hubLens)})});
var syncBtn=document.getElementById('syncRawBackupBtn');
if(syncBtn){syncBtn.addEventListener('click',syncRawAirtable)}
}

function taskStatusOptions(value){
var options=[['open','Open'],['in_progress','In progress'],['waiting','Waiting'],['done','Done'],['archived','Archived']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function taskPriorityOptions(value){
var options=[['low','Low'],['normal','Normal'],['high','High'],['urgent','Urgent']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function taskTypeOptions(value){
var options=[['general','General'],['customer_reply','Customer reply'],['inquiry_followup','Inquiry follow-up'],['payment','Payment'],['final_balance','Final balance'],['operations','Operations'],['accounting','Accounting'],['payroll','Payroll'],['inventory','Inventory']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function dueStatus(task){
if(task.status==='done')return '<span class="status charged">Done</span>';
if(task.due_at&&Date.parse(task.due_at)<Date.now())return '<span class="status blocked">Overdue</span>';
if(task.priority==='urgent'||task.priority==='high')return '<span class="status needs">'+esc(formatStatus(task.priority))+'</span>';

async function runCustomerFinalAction(action,reservationId){
if(!reservationId){statusText.innerHTML='<span class="error">This reservation is missing its Airtable reservation ID.</span>';return}
var customerId=state.customerDetail&&state.customerDetail.customer&&state.customerDetail.customer.id;
if(action==='charge'&&!window.confirm('Charge this customer only if their final-balance notice wait has passed. The backend will still skip unsafe records.'))return;
setBusy(action==='notice'?'Sending final-balance notice...':(action==='dry_run'?'Running final-balance dry run...':'Charging final balance...'));
try{
if(action==='notice'){
await post('/api/send-final-balance-notice',{reservation_record_id:reservationId});
statusText.innerHTML='<span class="ok">Final-balance notice sent.</span>';
}else{
var data=await post('/api/batch-final-balance',{reservation_record_ids:[reservationId],dry_run:action==='dry_run'});
var s=data.summary||{};
statusText.innerHTML='<span class="'+(s.failed?'error':'ok')+'">Final balance: charged '+(s.charged||0)+', skipped '+(s.skipped||0)+', already '+(s.already_charged||0)+', failed '+(s.failed||0)+'.</span>';
}
if(customerId){state.customerDetail=await endpoint('/api/admin-customer-detail?id='+encodeURIComponent(customerId));renderCustomers()}
}catch(err){statusText.innerHTML='<span class="error">'+esc(err.message||'Final-balance action failed.')+'</span>'}
}

function tomorrowLocal(){
var d=new Date(Date.now()+24*60*60*1000);
d.setMinutes(0,0,0);
return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
}

function tagsValue(tags){

function customerStatusOptions(value){
var options=[['lead','Lead'],['prospect','Prospect'],['reserved','Reserved'],['customer','Customer'],['vip','VIP'],['closed','Closed'],['merged','Merged']];
var current=String(value||'lead');
var known=options.some(function(option){return option[0]===current});

return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===current?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');

function renderNextAction(detail,emailHref,smsHref){

var waiting=reservations.find(function(row){return row.final_balance_notice_sent_at&&!row.final_balance_payment_intent_id&&!finalBalanceReady(row)});
var hasActivity=timelineItems(detail).length>0;
var actions='';

if(c.contact_status==='needs_reply'){
actions=(emailHref?'<a class="btn quiet" href="'+esc(emailHref)+'">Reply by email</a>':'')+(smsHref?'<a class="btn quiet" href="'+esc(smsHref)+'">Reply by text</a>':'');

if(followUpDue){

if(readyToCharge){

}
if(!hasActivity){

return '<span>Next best move</span><strong>Start the relationship</strong><p>No timeline activity is linked yet.</p><div class="actions">'+actions+'</div>';

function finalBalanceReady(row){
if(!row.final_balance_notice_sent_at||row.final_balance_payment_intent_id)return false;
var noticeMs=Date.parse(row.final_balance_notice_sent_at);
if(!noticeMs)return false;
var safety=state.finalBalanceSafety||{};
var hours=Number(safety.notice_hours||24);
return (Date.now()-noticeMs)/(1000*60*60)>=hours;
}

function formatStatus(value){
return String(value||'').replace(/_/g,' ').replace(/\b\w/g,function(ch){return ch.toUpperCase()});
}

function productValues(value){
if(!value)return [];
if(Array.isArray(value))return value.filter(Boolean);
try{
var parsed=JSON.parse(value);
if(Array.isArray(parsed))return parsed.filter(Boolean);
}catch(err){}
return String(value).split(/[,+]/).map(function(item){return item.trim()}).filter(Boolean);
}

function profileProducts(detail){
var seen={};
var products=[];
function add(value){productValues(value).forEach(function(item){var key=item.toLowerCase();if(!seen[key]){seen[key]=true;products.push(item)}})}
(detail.reservations||[]).forEach(function(row){add(row.product_selection||row.product)});
(detail.inquiries||[]).forEach(function(row){add(row.product_interest)});
return products;
}

function profileOutstanding(detail){
return (detail.reservations||[]).reduce(function(sum,row){
if(row.final_balance_payment_intent_id)return sum;
if(['Cancelled','Expired','Transferred'].includes(row.status))return sum;
return sum+Number(row.final_balance_total||row.final_balance_amount||0);
},0);
}

}
function datetimeLocal(value){
if(!value)return '';
var d=new Date(value);
if(Number.isNaN(d.getTime()))return '';
return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
}

async function sendNotices(){
var rows=state.reservations.filter(function(row){return state.selected.has(row.id)&&row.notice_required});
if(!rows.length){statusText.innerHTML='<span class="error">Select at least one Needs Notice reservation.</span>';return}

var sent=0,failed=[];
var results=[];
for(var i=0;i<rows.length;i++){try{var notice=await post('/api/send-final-balance-notice',{reservation_record_id:rows[i].id});sent++;results.push({reservation_record_id:rows[i].id,status:notice.already_sent?'already_sent':'sent',amount:notice.amount||rows[i].final_balance_total||0,reason:notice.already_sent?'Notice was already sent.':''})}catch(err){failed.push(rows[i].id+': '+err.message);results.push({reservation_record_id:rows[i].id,status:'failed',amount:rows[i].final_balance_total||0,reason:err.message||'Could not send notice.'})}}
state.noticeResults={summary:{sent:sent,failed:failed.length},results:results};
await loadCurrent();
statusText.innerHTML=failed.length?'<span class="error">Sent '+sent+', failed '+failed.length+'.</span>':'<span class="ok">Sent '+sent+' notice(s).</span>';

async function runBatch(dryRun){
if(state.batchBusy){statusText.innerHTML='<span class="muted">Batch request already running.</span>';return}
var ids=Array.from(state.selected);
if(!ids.length){statusText.innerHTML='<span class="error">Select at least one reservation.</span>';return}
if(ids.length>100){statusText.innerHTML='<span class="error">Batch limit is 100 reservations. Select fewer records and try again.</span>';return}
if(!dryRun){
var readyRows=state.reservations.filter(function(row){return state.selected.has(row.id)&&row.charge_eligible&&!row.already_charged});
var readyCount=readyRows.length;
var readyAmount=readyRows.reduce(function(sum,row){return sum+Number(row.final_balance_total||0)},0);
if(!readyCount){statusText.innerHTML='<span class="error">No selected reservations are ready to charge. Run a dry run or select ready records first.</span>';return}
var safety=state.finalBalanceSafety||{};
var message='Charge final balances for '+readyCount+' ready reservation(s), totaling '+money(readyAmount)+'?\n\nSelected unsafe records will be skipped and reported. Stripe mode: '+(safety.stripe_mode||'unknown')+'. Notice wait: '+(safety.notice_hours||24)+'h.';
if(!window.confirm(message)){statusText.innerHTML='<span class="muted">Batch charge cancelled.</span>';return}
}
state.batchBusy=true;
renderFinals();
setBusy(dryRun?'Running dry run...':'Charging selected ready reservations...');
try{
var data=await post('/api/batch-final-balance',{reservation_record_ids:ids,dry_run:dryRun});
state.batchResults=data;
await loadCurrent();
var s=data.summary||{};
statusText.innerHTML='<span class="'+(s.failed?'error':'ok')+'">'+(dryRun?'Dry run':'Batch')+': charged '+(s.charged||0)+', skipped '+(s.skipped||0)+', already '+(s.already_charged||0)+', failed '+(s.failed||0)+'.</span>';
}catch(err){
statusText.innerHTML='<span class="error">'+esc(err.message||'Batch request failed.')+'</span>';
}finally{
state.batchBusy=false;
renderFinals();
}
}
async function runAutoFinalBalance(dryRun){
if(state.batchBusy){statusText.innerHTML='<span class="muted">Final-balance automation is already running.</span>';return}
var readyRows=state.reservations.filter(function(row){return row.charge_eligible&&!row.already_charged});
var readyAmount=readyRows.reduce(function(sum,row){return sum+Number(row.final_balance_total||0)},0);
if(!dryRun){
if(!readyRows.length){statusText.innerHTML='<span class="error">No emailed final-balance records are ready to charge yet.</span>';return}
var safety=state.finalBalanceSafety||{};
var message='Charge every emailed-and-ready final balance now?\\n\\nReady reservations: '+readyRows.length+'\\nEstimated total: '+money(readyAmount)+'\\nStripe mode: '+(safety.stripe_mode||'unknown')+'\\nNotice wait: '+(safety.notice_hours||24)+'h\\n\\nUnsafe records will still be skipped by the backend.';
if(!window.confirm(message)){statusText.innerHTML='<span class="muted">Automatic charge cancelled.</span>';return}
}
state.batchBusy=true;
renderFinals();
setBusy(dryRun?'Checking emailed-and-ready final balances...':'Charging emailed-and-ready final balances...');
try{
var data=await post('/api/auto-final-balance',{dry_run:dryRun,limit:100});
state.batchResults=data;
await loadCurrent();
var s=data.summary||{};
statusText.innerHTML='<span class="'+(s.failed?'error':'ok')+'">'+(dryRun?'Check':'Auto batch')+': charged '+(s.charged||0)+', skipped '+(s.skipped||0)+', already '+(s.already_charged||0)+', failed '+(s.failed||0)+'.</span>';
}catch(err){
statusText.innerHTML='<span class="error">'+esc(err.message||'Automatic final-balance batch failed.')+'</span>';
}finally{
state.batchBusy=false;
renderFinals();
}
}
function batchResultReport(){
var data=state.batchResults;
if(!data||!Array.isArray(data.results)||!data.results.length)return '';
var s=data.summary||{};
var email=data.owner_summary_email||{};
var emailStatus=email.skipped?'Skipped for dry run':(email.sent?'Sent':'Failed');
var emailClass=email.error?'error':'muted';
return '<section class="panel"><div class="bar"><div><div class="section-title">'+(data.dry_run?'Dry run results':'Batch charge results')+'</div><div class="meta"><span class="pill">Charged <strong>'+(s.charged||0)+'</strong></span><span class="pill">Skipped <strong>'+(s.skipped||0)+'</strong></span><span class="pill">Already charged <strong>'+(s.already_charged||0)+'</strong></span><span class="pill">Failed <strong>'+(s.failed||0)+'</strong></span><span class="pill">Owner email <strong>'+esc(emailStatus)+'</strong></span></div></div></div>'+
(email.error?'<p class="'+emailClass+'">Owner summary email failed: '+esc(email.error)+'</p>':'')+
table(['Reservation','Status','Code','Amount','Stripe status','Payment intent','Reason'],data.results.map(function(row){return [row.reservation_record_id,row.status,row.reason_code||'',money(row.amount||0),row.stripe_status||'',row.payment_intent_id||'',row.reason||'']}))+'</section>';
}
function noticeResultReport(){
var data=state.noticeResults;
if(!data||!Array.isArray(data.results)||!data.results.length)return '';
var s=data.summary||{};
return '<section class="panel"><div class="bar"><div><div class="section-title">Notice send results</div><div class="meta"><span class="pill">Sent <strong>'+(s.sent||0)+'</strong></span><span class="pill">Failed <strong>'+(s.failed||0)+'</strong></span></div></div></div>'+
table(['Reservation','Status','Final balance','Reason'],data.results.map(function(row){return [row.reservation_record_id,row.status,money(row.amount||0),row.reason||'']}))+'</section>';
}
function finalBalanceSafetyPanel(){
var s=state.finalBalanceSafety;
if(!s)return '';
var locked=s.stripe_mode==='live'&&!s.allow_live_final_charges;
return '<section class="panel"><div class="bar"><div><div class="section-title">Charging safety</div><div class="meta">'+
'<span class="pill">Stripe mode <strong>'+esc(s.stripe_mode||'missing')+'</strong></span>'+
'<span class="pill">Live final charges <strong>'+esc(s.allow_live_final_charges?'enabled':'locked')+'</strong></span>'+
'<span class="pill">Notice wait <strong>'+esc(s.notice_hours||24)+'h</strong></span>'+
'<span class="pill">Webhook secret <strong>'+esc(s.stripe_webhook_secret_configured?'set':'missing')+'</strong></span>'+
'</div></div></div>'+
(locked?'<p class="error">Live final-balance charges are locked until ALLOW_LIVE_FINAL_CHARGES=true.</p>':'<p class="muted">Run one Stripe test-mode reservation end to end before enabling live final charges.</p>')+
'</section>';
}
function exportAccountingCsv(){
var rows=(state.accounting&&state.accounting.payments||[]).map(function(row){return [row.occurred_at,row.customers&&row.customers.full_name||'',row.payment_type,row.amount,row.status,row.stripe_payment_intent_id]});
exportCsv('yogacloak-accounting.csv',['date','customer','type','amount','status','stripe_id'],rows);
}
function exportCsv(filename,headers,rows){
var csv=[headers].concat(rows).map(function(row){return row.map(function(cell){return '"'+String(cell||'').replace(/"/g,'""')+'"'}).join(',')}).join('\n');
var blob=new Blob([csv],{type:'text/csv'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

applyRoleUi();
if(directFilePreview){
renderDirectFileNotice();
}else{
loadCurrent();
}
</script>

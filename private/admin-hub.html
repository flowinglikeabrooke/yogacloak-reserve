function taskStatusOptions(value){
var options=[['open','Open'],['in_progress','In progress'],['waiting','Waiting'],['done','Completed'],['archived','Archived']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function taskPriorityOptions(value){
var options=[['low','Low'],['normal','Normal'],['high','High'],['urgent','Urgent']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function taskTypeOptions(value){
var options=[['general','General'],['customer_reply','Customer reply'],['inquiry_followup','Inquiry follow-up'],['payment','Payment'],['final_balance','Final balance'],['operations','Operations'],['accounting','Accounting'],['payroll','Payroll'],['inventory','Inventory']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function taskProfilePane(task){
var type=String(task&&task.task_type||task&&task.type||'').toLowerCase();
if(['payment','final_balance'].includes(type))return 'sales';
if(['customer_reply','inquiry_followup'].includes(type))return 'messages';
return 'work';
}

function dueStatus(task){
if(task.status==='done')return '<span class="status charged">Completed</span>';
if(task.status==='archived')return '<span class="status blocked">Archived</span>';
if(task.due_at&&Date.parse(task.due_at)<Date.now())return '<span class="status blocked">Overdue</span>';
if(task.priority==='urgent'||task.priority==='high')return '<span class="status needs">'+esc(formatStatus(task.priority))+'</span>';
return '<span class="status ready">'+esc(formatStatus(task.status||'open'))+'</span>';
}

function taskRows(tasks){
return (tasks||[]).map(function(task){
var customerId=task.customer_id||task.customers&&task.customers.id;
var linked=customerLink(customerId,task.customers&&task.customers.full_name||task.customer_id||'Owner task');
var context=[task.inquiries&&task.inquiries.inquiry_type,task.reservations&&task.reservations.status,task.description].filter(Boolean).join(' · ');
var inactive=['done','archived'].includes(task.status);
var pane=taskProfilePane(task);
var openLabel=paneActionLabel(pane);
var actions=inactive?'<div class="actions">'+openProfileButton(customerId,openLabel,pane)+'<button class="btn quiet small" data-task-status="'+esc(task.id)+'" data-status="open">Reopen</button></div>':'<div class="actions">'+openProfileButton(customerId,openLabel,pane)+'<button class="btn quiet small" data-task-status="'+esc(task.id)+'" data-status="in_progress">Start</button><button class="btn small" data-task-status="'+esc(task.id)+'" data-status="done">Complete</button><button class="btn quiet small" data-task-status="'+esc(task.id)+'" data-status="archived">Archive</button></div>';
return [dueStatus(task),esc(task.title)+'<br><span class="muted">'+esc(context)+'</span>',linked,esc(formatStatus(task.task_type)),esc(formatStatus(task.priority)),esc(date(task.due_at)),actions];
});
}

function renderTaskBoard(tasks){
if(!tasks||!tasks.length)return '<div class="empty">No tasks in this view.</div>';
var lanes=[
{key:'overdue',title:'Overdue',rows:[]},
{key:'customer',title:'Customer work',rows:[]},
{key:'money',title:'Money + ops',rows:[]},
{key:'owner',title:'Owner-only',rows:[]}
];
tasks.forEach(function(task){
var type=String(task.task_type||'general');
var customerId=task.customer_id||task.customers&&task.customers.id;
var inactive=['done','archived'].includes(task.status);
var overdue=task.due_at&&Date.parse(task.due_at)<Date.now()&&!inactive;
if(overdue||task.priority==='urgent')lanes[0].rows.push(task);
else if(['payment','final_balance','operations','accounting','payroll','inventory'].includes(type))lanes[2].rows.push(task);
else if(customerId||['customer_reply','inquiry_followup'].includes(type))lanes[1].rows.push(task);
else lanes[3].rows.push(task);
});
lanes=lanes.filter(function(lane){return lane.rows.length});
if(!lanes.length)return '<div class="empty">No tasks in this view.</div>';
var openLane=firstOpenLaneKey(lanes);
return '<div class="task-lanes">'+lanes.map(function(lane,index){
var open=lane.key===openLane;
return '<details class="task-lane" '+(open?'open':'')+'><summary class="task-lane-head"><div class="task-lane-title"><strong>'+esc(lane.title)+'</strong></div><span class="pill task-lane-count">'+esc(lane.rows.length)+' task'+(lane.rows.length===1?'':'s')+'</span></summary><div class="task-lane-body">'+lane.rows.map(taskCard).join('')+'</div></details>';
}).join('')+'</div>';
}

function taskStatCard(label,value,note){
return '<div class="task-stat"><span>'+esc(label)+'</span><strong>'+esc(value)+'</strong><small>'+esc(note)+'</small></div>';
}

function renderTaskCommand(stats,tasks){
var customerTasks=tasks.filter(function(task){return task.customer_id||task.customers&&task.customers.id}).length;
var ownerTasks=tasks.length-customerTasks;
var overdue=Number(stats.overdue||0);
var emptyActive=!tasks.length&&state.taskFilter==='active'&&Number(stats.done||0)>0;
var next=emptyActive?'No active tasks.':(overdue?'Clear overdue first.':'Queue is clear.');
return '<section class="task-command"><div class="task-command-main"><h2>To-Do</h2><div class="task-stat-grid">'+
taskStatCard('Overdue',overdue,'Needs action now')+
taskStatCard('Customer work',customerTasks,'Linked to profiles')+
taskStatCard('Owner work',ownerTasks,'Internal business tasks')+
taskStatCard('Completed',stats.done||0,'Saved in history')+
'</div></div><aside class="task-command-side"><div><strong>'+esc(emptyActive?'No active tasks':(overdue?'Overdue work is waiting':'Queue is under control'))+'</strong><p>'+esc(next)+'</p></div><div class="task-filters"><select id="taskFilter"><option value="active" '+(state.taskFilter==='active'?'selected':'')+'>Active</option><option value="overdue" '+(state.taskFilter==='overdue'?'selected':'')+'>Overdue</option><option value="" '+(!state.taskFilter?'selected':'')+'>All history</option><option value="done" '+(state.taskFilter==='done'?'selected':'')+'>Completed</option><option value="archived" '+(state.taskFilter==='archived'?'selected':'')+'>Archived</option></select><button class="btn quiet" id="reloadTasks">Refresh</button></div></aside></section>';
}

function taskCard(task){
var customerId=task.customer_id||task.customers&&task.customers.id;
var customerName=task.customers&&task.customers.full_name||'Owner task';
var inactive=['done','archived'].includes(task.status);
var overdue=task.due_at&&Date.parse(task.due_at)<Date.now()&&!inactive;
var hot=overdue||['urgent','high'].includes(task.priority);
var waiting=task.status==='waiting';
var pane=taskProfilePane(task);
var context=[formatStatus(task.task_type||'task'),formatStatus(task.priority||'normal'),task.due_at?'Due '+date(task.due_at):'No due date'].join(' · ');
var linked=customerId?customerLink(customerId,customerName):'<span class="muted">Owner-only task</span>';
var details=[task.inquiries&&task.inquiries.inquiry_type,task.reservations&&task.reservations.status,task.description].filter(Boolean).join(' · ');
var next=inactive?'Saved in history.':(customerId?(pane==='sales'?'Review money.':(pane==='messages'?'Reply from profile.':'Update profile.')):'Owner task.');
var openAttr=customerId?' data-open-task-customer="'+esc(customerId)+'" data-open-task-pane="'+esc(pane)+'"':'';
var openLabel=paneActionLabel(pane);
var actions=inactive?openProfileButton(customerId,openLabel,pane)+'<button class="btn quiet small" data-task-status="'+esc(task.id)+'" data-status="open">Reopen</button>':openProfileButton(customerId,openLabel,pane)+'<button class="btn quiet small" data-task-status="'+esc(task.id)+'" data-status="in_progress">Start</button><button class="btn small" data-task-status="'+esc(task.id)+'" data-status="done">Complete</button><button class="btn quiet small" data-task-status="'+esc(task.id)+'" data-status="archived">Archive</button>';
return '<article class="task-card '+(hot?'hot ':'')+(waiting?'waiting':'')+'"'+openAttr+'>'+
'<div class="task-card-main"><div class="task-card-title">'+dueStatus(task)+'<strong>'+esc(task.title||'Task')+'</strong></div>'+
'<div class="task-card-meta"><span class="pill">'+esc(context)+'</span></div>'+
'<p>'+linked+'</p>'+(details?'<p class="task-card-context">'+esc(details)+'</p>':'')+'</div>'+
'<div class="task-card-actions"><div class="task-card-owner"><span>Next</span><strong>'+esc(inactive?'History item':(customerId?openLabel:'Owner work'))+'</strong><small>'+esc(next)+'</small></div>'+actions+'</div>'+
'</article>';
}

function clearCustomerLookup(config){
var hidden=document.getElementById(config.hiddenId);
var input=document.getElementById(config.inputId);
var selected=document.getElementById(config.selectedId);
var results=document.getElementById(config.resultsId);
if(hidden)hidden.value='';
if(input){input.value='';input.focus()}
if(selected){selected.classList.add('hide');selected.innerHTML=''}
if(results)results.classList.add('hide');

function bindCustomerLookup(config){

async function updateTaskStatus(taskId,status){

if(status==='done')taskMessage='Task completed and removed from active todos. It remains in customer history.';

if(status==='open')taskMessage='Task reopened.';
statusText.innerHTML='<span class="ok">'+esc(taskMessage)+'</span>';
}catch(err){statusText.innerHTML='<span class="error">'+esc(err.message||'Could not update task.')+'</span>'}
}

setBusy('Updating customer status...');

state.customerDetail=await endpoint('/api/admin-customer-detail?id='+encodeURIComponent(customerId));

statusText.innerHTML='<span class="ok">Customer status updated.</span>';
}

try{
if(action==='notice'){
await post('/api/send-final-balance-notice',{reservation_record_id:reservationId});
statusText.innerHTML='<span class="ok">Balance email sent.</span>';
}else{
var data=await post('/api/batch-final-balance',{reservation_record_ids:[reservationId],dry_run:action==='dry_run'});
var s=data.summary||{};
statusText.innerHTML='<span class="'+(s.failed?'error':'ok')+'">Final balance: charged '+(s.charged||0)+', skipped '+(s.skipped||0)+', already '+(s.already_charged||0)+', failed '+(s.failed||0)+'.</span>';
}
if(customerId){state.customerDetail=await endpoint('/api/admin-customer-detail?id='+encodeURIComponent(customerId));renderCustomers()}
}catch(err){statusText.innerHTML='<span class="error">'+esc(err.message||'Final-balance action failed.')+'</span>'}
}

function tagsValue(tags){
if(Array.isArray(tags))return tags.join(', ');
return String(tags||'');
}

function customerStatusOptions(value){
var options=[['lead','Lead'],['prospect','Prospect'],['reserved','Reserved'],['customer','Customer'],['vip','VIP'],['closed','No follow-up'],['merged','Merged duplicate']];
var current=String(value||'lead');
var known=options.some(function(option){return option[0]===current});
if(!known&&current)options.unshift([current,formatStatus(current)]);
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===current?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}

function isRawProfile(c){
return Boolean(c&&(String(c.id||'').indexOf('airtable:')===0||c.fallback_source==='airtable_forms'));
}

function crmInquiryRows(inquiries){
return (inquiries||[]).filter(function(row){return row.id&&String(row.id).indexOf('airtable:')!==0});
}

function inquiryLabel(row){
return String(row.inquiry_type||'Lead')+' · '+String(row.product_interest||row.source_page||row.message||row.id||'').slice(0,48);
}

function inquiryOptions(inquiries){
var rows=crmInquiryRows(inquiries);
if(!rows.length)return '<option value="">No private CRM leads yet</option>';
return rows.map(function(row){return '<option value="'+esc(row.id)+'">'+esc(inquiryLabel(row))+'</option>'}).join('');
}

function customerNextMoveSummary(detail,raw){
var c=detail.customer||{};
var reservations=detail.reservations||[];
var payments=detail.payments||[];
var followUpDue=c.next_follow_up_at&&Date.parse(c.next_follow_up_at)<=Date.now();
var failedPayment=payments.find(function(row){return ['failed','requires_payment_method','requires_action'].includes(row.status)});
var moneyRisk=customerFinalBalanceRisk(detail);
var readyToCharge=reservations.find(function(row){return finalBalanceReady(row)&&reservationChargeId(row)});
var needsNotice=reservations.find(function(row){return ['Reserved','Confirmed'].includes(row.status)&&!row.final_balance_notice_sent_at&&!row.final_balance_payment_intent_id&&reservationChargeId(row)});
var waiting=reservations.find(function(row){return row.final_balance_notice_sent_at&&!row.final_balance_payment_intent_id&&!finalBalanceReady(row)});
var hasActivity=timelineItems(detail).length>0;
if(raw&&c.contact_status==='needs_reply')return {title:'Reply needed',note:'Raw backup profile, but this customer still needs a response.',pane:'messages',hot:true};
if(raw)return {title:'Organize into CRM',note:'Import this raw Airtable profile so notes, tasks, messages, and money stay together.',pane:'profile',hot:true};
if(moneyRisk&&moneyRisk.level==='blocked')return {title:'Needs payment link',note:moneyRisk.note,pane:'sales',hot:true};
if(failedPayment)return {title:'Payment needs attention',note:'Reach out before trying another charge.',pane:'sales',hot:true};
if(moneyRisk&&moneyRisk.level==='needs')return {title:'Balance pending',note:moneyRisk.note,pane:'sales',hot:false};
if(moneyRisk&&moneyRisk.level==='ready')return {title:'Final balance check',note:moneyRisk.note,pane:'sales',hot:true};
if(c.contact_status==='needs_reply')return {title:'Reply needed',note:'Open messages and answer before this gets lost.',pane:'messages',hot:true};
if(followUpDue)return {title:'Follow-up is due',note:'Due '+date(c.next_follow_up_at)+'. Reply or move the follow-up date.',pane:'work',hot:true};
if(readyToCharge)return {title:'Final balance check',note:'Run a dry run before charging the saved card.',pane:'sales',hot:true};
if(needsNotice)return {title:'Balance pending',note:'Remaining balance email can wait until you are closer to shipping.',pane:'sales',hot:false};
if(moneyRisk&&moneyRisk.level==='waiting')return {title:'Notice is active',note:moneyRisk.note,pane:'sales',hot:false};
if(waiting)return {title:'Notice is active',note:'The 24-hour wait is still protecting this charge.',pane:'sales',hot:false};
if(!hasActivity)return {title:'Start relationship',note:'Add a note, task, or first message.',pane:'work',hot:false};
if(c.contact_status==='not_contacted')return {title:'First follow-up',note:'This person has activity but has not been marked contacted.',pane:'messages',hot:true};
return {title:'Keep warm',note:'Use notes, tasks, or a message to keep the relationship moving.',pane:'work',hot:false};
}

function customerFinalBalanceRisk(detail){
if(!isOwner())return null;
var reservations=detail.reservations||[];
var open=reservations.filter(function(row){return !row.final_balance_payment_intent_id&&Number(row.final_balance_total||row.final_balance_amount||0)>0});
if(!open.length)return null;
var manual=open.find(function(row){return row.blocked_reason||!reservationChargeId(row)||!row.stripe_customer_id||!row.stripe_payment_method_id||!row.future_charge_authorized});
if(manual)return {level:'blocked',title:'Needs payment link',amount:Number(manual.final_balance_total||manual.final_balance_amount||0),pane:'sales',reservation:manual,note:'Send a secure Stripe link before collecting.'};
var needsNotice=open.find(function(row){return ['Reserved','Confirmed'].includes(row.status)&&!row.final_balance_notice_sent_at});
if(needsNotice)return {level:'needs',title:'Balance pending',amount:Number(needsNotice.final_balance_total||needsNotice.final_balance_amount||0),pane:'sales',reservation:needsNotice,routine:true,note:'Collect closer to shipment.'};
var ready=open.find(function(row){return finalBalanceReady(row)&&reservationChargeId(row)});
if(ready)return {level:'ready',title:'Ready for dry run',amount:Number(ready.final_balance_total||ready.final_balance_amount||0),pane:'sales',reservation:ready,note:'Dry run before collecting.'};
var waiting=open.find(function(row){return row.final_balance_notice_sent_at});
if(waiting)return {level:'waiting',title:'Waiting period',amount:Number(waiting.final_balance_total||waiting.final_balance_amount||0),pane:'sales',reservation:waiting,note:'24-hour wait is active.'};
return {level:'needs',title:'Open balance',amount:open.reduce(function(sum,row){return sum+Number(row.final_balance_total||row.final_balance_amount||0)},0),pane:'sales',reservation:open[0],note:'Review money.'};
}

function customerMoneyAction(detail){

if(failed)return {label:'Payment issue',value:money(failed.amount||0),note:formatStatus(failed.status),pane:'sales',hot:true};
var risk=customerFinalBalanceRisk(detail);
if(risk&&risk.level==='blocked')return {label:'Needs payment link',value:money(risk.amount),note:'Send a secure Stripe invoice or link',pane:'sales',hot:true};
if(risk&&risk.level==='needs')return {label:'Balance pending',value:money(risk.amount),note:'Collect closer to shipment',pane:'sales',hot:false};
if(risk&&risk.level==='ready')return {label:'Ready balance',value:money(risk.amount),note:'Dry run before charge',pane:'sales',hot:true};
var ready=reservations.find(function(row){return finalBalanceReady(row)&&reservationChargeId(row)});
if(ready)return {label:'Ready balance',value:money(ready.final_balance_total||ready.final_balance_amount||0),note:'Dry run before charge',pane:'sales',hot:true};
var notice=reservations.find(function(row){return ['Reserved','Confirmed'].includes(row.status)&&!row.final_balance_notice_sent_at&&!row.final_balance_payment_intent_id});
if(notice)return {label:'Balance pending',value:money(notice.final_balance_total||notice.final_balance_amount||0),note:'Collect closer to shipment',pane:'sales',hot:false};
var outstanding=profileOutstanding(detail);
if(outstanding>0)return {label:'Pending balance',value:money(outstanding),note:'Review reservation status',pane:'sales',hot:false};
return {label:'Money',value:money(sumPayments(payments)),note:'Collected so far',pane:'sales',hot:false};

return '<span>Payment</span><strong>Ready for dry run</strong><p>Check once before collecting.</p><div class="actions"><button class="btn quiet" data-final-action="dry_run" data-reservation-id="'+esc(reservationChargeId(readyToCharge))+'">Dry run</button><button class="btn" data-final-action="charge" data-reservation-id="'+esc(reservationChargeId(readyToCharge))+'">Charge</button></div>';

if(needsNotice){

function finalBalanceReady(row){
if(!row.final_balance_notice_sent_at||row.final_balance_payment_intent_id)return false;
var noticeMs=Date.parse(row.final_balance_notice_sent_at);
if(!noticeMs)return false;
var safety=state.finalBalanceSafety||{};
var hours=Number(safety.notice_hours||24);
return (Date.now()-noticeMs)/(1000*60*60)>=hours;
}

function formatStatus(value){
return String(value||'').replace(/_/g,' ').replace(/\b\w/g,function(ch){return ch.toUpperCase()});
}

function customerContactLabel(contactStatus,status){
var lifecycle=String(status||'').toLowerCase();
var value=String(contactStatus||'not_contacted').toLowerCase();
if(['archived','deleted','merged'].includes(lifecycle))return lifecycle==='merged'?'Merged duplicate':'Archived';
return ({
not_contacted:'Needs first touch',
needs_reply:'Needs reply',
emailed:'Emailed',
texted:'Texted',
spoke_to_customer:'Contacted',
waiting_on_customer:'Waiting on customer',
closed:'No follow-up'
}[value]||formatStatus(value));
}

function customerSourceLabel(row){
var source=String(row&&row.source||'').toLowerCase();
var fallback=String(row&&row.fallback_source||'').toLowerCase();
var id=String(row&&row.id||'');
if(row&&row.raw_backup_only)return 'Airtable backup';
if(fallback==='airtable_forms'||id.indexOf('airtable:')===0)return 'Airtable backup';
if(source.includes('sms'))return 'Website SMS opt-in';
if(source.includes('contact'))return 'Website contact form';
if(source.includes('reservation')||source.includes('stripe')||source.includes('deposit'))return 'Website deposit';
if(source.includes('website')||source.includes('homepage')||source.includes('reserve')||source.includes('faq'))return 'Website';
return 'Website';
}

function customerListRead(row){
var source=customerSourceLabel(row);
var next=customerContactLabel(row&&row.contact_status,row&&row.status);
var follow=row&&row.next_follow_up_at?'Follow up '+date(row.next_follow_up_at):'No follow-up set';
var raw=customerIsRaw(row);
var badge=raw?'<span class="status blocked">Raw backup</span>':'<span class="status ready">Customer profile</span>';
return '<div class="crm-read">'+badge+'<strong>'+esc(source+' · '+next)+'</strong><span>'+esc(follow)+'</span></div>';
}

function customerNextRead(row){
var status=customerContactLabel(row&&row.contact_status,row&&row.status);
var follow=row&&row.next_follow_up_at?date(row.next_follow_up_at):'No follow-up';
var raw=customerIsRaw(row);
var source=customerSourceLabel(row);
var overdue=Number(row&&row.overdue_task_count||0);
var inbound=Number(row&&row.inbound_message_count||0);
var outstanding=Number(row&&row.outstanding_balance||0);
var label=raw?'Organize raw record':(overdue?'Clear overdue task':(String(row&&row.contact_status||'').toLowerCase()==='needs_reply'||inbound?'Reply now':(outstanding?'Review balance':(row&&row.next_follow_up_at?'Follow up':'Review profile'))));
var note=raw?'Sync into private CRM before heavy editing.':(source+' · '+follow);
return '<div class="next-read"><span>Action</span><strong>'+esc(label)+'</strong><small>'+esc(status+' · '+note)+'</small></div>';
}

function customerSignalPills(row){
var signals=[];
var inquiries=Number(row&&row.contact_message_count||row&&row.inquiry_count||0);
var tasks=Number(row&&row.open_task_count||0);
var overdue=Number(row&&row.overdue_task_count||0);
var inbound=Number(row&&row.inbound_message_count||0);
var reservations=Number(row&&row.reservation_count||0);
var outstanding=Number(row&&row.outstanding_balance||0);
var paid=Number(row&&row.paid_total||0);
if(inquiries)signals.push(['Website msg',inquiries,'']);
if(inbound)signals.push(['Inbound',inbound,'hot']);
if(tasks)signals.push(['Tasks',tasks,overdue?'hot':'']);
if(reservations)signals.push(['Orders',reservations,'']);
if(outstanding)signals.push(['Owed',money(outstanding),'money']);
if(paid)signals.push(['Paid',money(paid),'']);
if(row&&row.rollup_error)signals.push(['Rollups','unavailable','hot']);
if(!signals.length)signals.push(['Activity','quiet','']);
return '<div class="customer-card-signals">'+signals.slice(0,6).map(function(item){return '<span class="pill '+esc(item[2]||'')+'">'+esc(item[0])+' <strong>'+esc(item[1])+'</strong></span>'}).join('')+'</div>';
}

function customerIsRaw(row){
return !!(row&&row.raw_backup_only)||String(row&&row.id||'').indexOf('airtable:')===0||String(row&&row.fallback_source||'').toLowerCase()==='airtable_forms';
}

function customerQueueBucket(row){
var status=String(row&&row.contact_status||'').toLowerCase();
if(status==='needs_reply'||Number(row&&row.inbound_message_count||0)>0)return 'needs_reply';
if(row&&row.next_follow_up_at&&Date.parse(row.next_follow_up_at)<=Date.now())return 'follow_up';
if(Number(row&&row.outstanding_balance||0)>0)return 'owes_money';
if(customerIsRaw(row))return 'raw_backup';
return 'steady';
}

function customerQueueCounts(rows){
var counts={all:(rows||[]).length,needs_reply:0,follow_up:0,owes_money:0,raw_backup:0};
(rows||[]).forEach(function(row){
var bucket=customerQueueBucket(row);
if(counts[bucket]!==undefined)counts[bucket]+=1;
});
return counts;
}

function filteredCustomerRows(rows){
var filter=state.customerQueueFilter||'all';
if(filter==='all')return rows||[];
return (rows||[]).filter(function(row){return customerQueueBucket(row)===filter});
}

function renderCustomerCommandPanel(rows){
var counts=customerQueueCounts(rows);
var active=state.customerQueueFilter||'all';
var chips=[
['all','All profiles',counts.all],
['needs_reply','Needs reply',counts.needs_reply],
['follow_up','Follow-up due',counts.follow_up],
['owes_money','Owes money',counts.owes_money],
['raw_backup','Raw backup',counts.raw_backup]
];
return '<section class="customer-command-panel"><div class="customer-command-head"><div><h2>Customer command</h2></div><div class="customer-queue-chips">'+chips.map(function(item){return '<button class="customer-queue-chip '+(active===item[0]?'active':'')+'" data-customer-queue-filter="'+esc(item[0])+'">'+esc(item[1])+' <strong>'+esc(item[2])+'</strong></button>'}).join('')+'</div></div></section>';
}

function renderCustomerQueue(rows){
if(!rows||!rows.length)return '<div class="customer-list-empty"><strong>No customers match this queue.</strong><br><span>Switch back to All profiles, try a different search, or sync the raw backup if you expected new site activity.</span></div>';
return '<div class="customer-list">'+rows.map(customerQueueCard).join('')+'</div>';
}

function normalizedCustomerName(row){
return String(row&&row.full_name||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();
}

function duplicateNameGroups(rows){
var groups={};
(rows||[]).forEach(function(row){
var key=normalizedCustomerName(row);
if(!key)return;
groups[key]=groups[key]||[];
groups[key].push(row);
});
return Object.keys(groups).map(function(key){return groups[key]}).filter(function(group){return group.length>1});
}

function customerMergeOption(row){
var label=[row.full_name||'Unnamed customer',row.email,row.phone].filter(Boolean).join(' · ');
return '<option value="'+esc(row.id)+'">'+esc(label)+'</option>';
}

}

function inquiryListRead(row){

if(typeof metadata==='string'){
try{metadata=JSON.parse(metadata)}catch(err){metadata={}}
}
var signal=inquiryRelationship(row).title;
var type=formatStatus(row.inquiry_type||'inquiry');

return '<div class="crm-read">'+inquirySignal(row)+'<strong>'+esc(signal)+'</strong><span>'+esc(type+' · '+source)+'</span></div>';

function productValues(value){
if(!value)return [];
if(Array.isArray(value))return value.filter(Boolean);
try{
var parsed=JSON.parse(value);
if(Array.isArray(parsed))return parsed.filter(Boolean);
}catch(err){}
return String(value).split(/[,+]/).map(function(item){return item.trim()}).filter(Boolean);
}

function profileProducts(detail){
var seen={};
var products=[];
function add(value){productValues(value).forEach(function(item){var key=item.toLowerCase();if(!seen[key]){seen[key]=true;products.push(item)}})}
(detail.reservations||[]).forEach(function(row){add(row.product_selection||row.product)});
(detail.inquiries||[]).forEach(function(row){add(row.product_interest)});
return products;
}

function profileOutstanding(detail){
return (detail.reservations||[]).reduce(function(sum,row){
if(row.final_balance_payment_intent_id)return sum;
if(['Cancelled','Expired','Transferred'].includes(row.status))return sum;
return sum+Number(row.final_balance_total||row.final_balance_amount||0);
},0);
}

function contactOptions(value){
var options=[['not_contacted','Needs first touch'],['needs_reply','Needs reply'],['emailed','Emailed'],['texted','Texted'],['spoke_to_customer','Contacted'],['waiting_on_customer','Waiting on customer'],['closed','No follow-up']];
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===value?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');
}
function datetimeLocal(value){
if(!value)return '';
var d=new Date(value);
if(Number.isNaN(d.getTime()))return '';
return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
}

function customerLink(id,label){
if(!id)return esc(label||'');
return '<span class="link" data-open-customer="'+esc(id)+'">'+esc(label||'Open customer')+'</span>';
}

function openProfileButton(id,label,pane){
if(!id)return '<span class="muted">No linked profile</span>';
return '<button class="btn quiet small" data-open-customer="'+esc(id)+'" '+(pane?'data-open-customer-pane="'+esc(pane)+'"':'')+'>'+esc(label||'Open profile')+'</button>';
}

setTab('customers');
statusText.innerHTML='<span class="ok">Customer profile opened.</span>';
}

function bindCustomerOpeners(){
document.querySelectorAll('[data-open-customer]').forEach(function(el){el.addEventListener('click',function(event){event.preventDefault();event.stopPropagation();openCustomer(el.dataset.openCustomer,el.dataset.openCustomerPane||'')})});
document.querySelectorAll('[data-open-customer][role="button"]').forEach(function(el){el.addEventListener('keydown',function(event){if(event.key==='Enter'||event.key===' '){event.preventDefault();openCustomer(el.dataset.openCustomer,el.dataset.openCustomerPane||'')}})});
}

function reservationStatus(row){
if(row.final_balance_payment_intent_id)return 'Already charged';
if(row.final_balance_notice_sent_at)return 'Notice sent';
if(['Reserved','Confirmed'].includes(row.status))return 'Balance pending';
return row.status||'Reservation';
}

function reservationChargeId(row){
return row.airtable_reservation_id||row.airtable_record_id||row.reservation_record_id||'';
}

function profileReservationState(row){
var amount=Number(row.final_balance_total||row.final_balance_amount||0);
if(row.final_balance_payment_intent_id)return {className:'charged',label:'Final paid',note:'Remaining balance collected.'};
if(amount<=0)return {className:'ready',label:'No balance due',note:'No remaining balance is recorded.'};
if(row.blocked_reason)return {className:'blocked',label:'Needs payment link',note:'Send a Stripe payment link before collection.'};
if(!reservationChargeId(row)||!row.stripe_customer_id||!row.stripe_payment_method_id||!row.future_charge_authorized)return {className:'blocked',label:'Needs payment link',note:'Send a Stripe payment link before collection.'};
if(['Reserved','Confirmed'].includes(row.status)&&!row.final_balance_notice_sent_at)return {className:'waiting',label:'Balance pending',note:'Collect closer to shipment.'};
if(finalBalanceReady(row))return {className:'ready',label:'Ready for dry run',note:'Run dry run before charging.'};
if(row.final_balance_notice_sent_at)return {className:'waiting',label:'Waiting period',note:'Notice sent. Wait period must pass before charging.'};
return {className:'needs',label:'Review balance',note:'Check before collecting.'};
}

return table(['Product','Status','Balance','Stripe','Actions'],reservations.map(function(row){
var chargeId=reservationChargeId(row);
var state=profileReservationState(row);
var needsLink=state.className==='blocked';
var actions=chargeId?'<div class="actions">'+(needsLink?stripePaymentsLink('Open Stripe'):'')+'<button class="btn quiet" data-jump-tab="finals" data-focus-reservation="'+esc(chargeId)+'">Open balance</button>'+(state.className==='needs'?'<button class="btn quiet" data-final-action="notice" data-reservation-id="'+esc(chargeId)+'">Send notice</button>':'')+(state.className==='ready'?'<button class="btn quiet" data-final-action="dry_run" data-reservation-id="'+esc(chargeId)+'">Dry run</button><button class="btn" data-final-action="charge" data-reservation-id="'+esc(chargeId)+'">Charge</button>':'')+'</div>':'<div class="actions">'+stripePaymentsLink('Open Stripe')+'</div>';
return [
esc(row.product_selection||row.product||'Order')+'<br><span class="muted">'+esc(row.size||row.size_selection||'')+'</span>',
 '<span class="status '+esc(state.className)+'">'+esc(state.label)+'</span><br><span class="muted">'+esc(state.note)+'</span><br><span class="muted">'+esc(row.updated_at||row.created_at||'')+'</span>',
money(row.final_balance_total||row.final_balance_amount||0)+'<br><span class="muted">Deposit '+money(row.deposit_amount||0)+'</span>',
esc(row.stripe_customer_id||'')+'<br><span class="muted">'+(row.stripe_payment_method_id?'Saved payment method':'No saved payment method shown')+'</span>',
actions
] }),true);

function renderProfileInquiries(inquiries){

function inquiryStatusOptions(value){

var current=String(value||'new');
var known=options.some(function(option){return option[0]===current});
if(!known&&current)options.unshift([current,formatStatus(current)]);
return options.map(function(option){return '<option value="'+esc(option[0])+'" '+(option[0]===current?'selected':'')+'>'+esc(option[1])+'</option>'}).join('');

function timelineItems(detail){

}

(detail.inquiries||[]).forEach(function(row){items.push({type:'Lead',title:row.inquiry_type||'Website lead',body:row.message||row.product_interest||row.source_page,at:row.created_at})});
(detail.reservations||[]).forEach(function(row){items.push({type:'Order',title:row.product_selection||row.product||'Order',body:reservationStatus(row),at:row.updated_at||row.created_at})});
(detail.payments||[]).forEach(function(row){items.push({type:'Payment',title:(row.payment_type||'Payment')+' · '+money(row.amount),body:row.status||row.stripe_payment_intent_id,at:row.occurred_at||row.created_at})});
(detail.communications||[]).forEach(function(row){items.push({type:(row.channel||'Message')+' '+(row.direction||''),title:row.subject||row.body||'Message',body:row.status||'',at:row.created_at})});

function inquirySignal(row){

if(relationship.kind==='existing')return '<span class="status ready">Added to contact</span>';
if(relationship.kind==='linked')return '<span class="status ready">Linked profile</span>';
return '<span class="status blocked">Needs review</span>';

function inquiryMatchClass(row){
var relationship=inquiryRelationship(row);
if(relationship.kind==='new')return 'new';
if(relationship.kind==='review')return 'needs-review';
return '';
}

function inquirySource(row){
var raw=String(row.source||row.form_source||row.page||row.source_page||'Website').replace(/_/g,' ').trim();
if(!raw)return 'Website';
if(/airtable/i.test(raw))return 'Airtable raw backup';
if(/home|reserve|faq|contact|website|site/i.test(raw))return 'Website';
return titleCase(raw);
}

function inquiryRelationship(row){
var metadata=inquiryMetadata(row);
var customerId=row.customer_id||row.customers&&row.customers.id;
var raw=String(row.id||'').indexOf('airtable:')===0||row.raw_backup_only;
if(raw)return {kind:'review',title:'Raw backup',detail:'Sync to edit in CRM.'};
if(metadata.customer_match==='new_customer')return {kind:'new',title:'New customer',detail:'New profile created.'};
if(metadata.customer_match==='existing_customer')return {kind:'existing',title:'Added to contact',detail:'Matched to an existing profile.'};
if(customerId)return {kind:'linked',title:'Linked profile',detail:'On the customer timeline.'};
return {kind:'review',title:'Needs match',detail:'No confirmed customer yet.'};
}

function inquiryNextAction(row){
var relationship=inquiryRelationship(row);
var status=String(row.status||'new').toLowerCase();
var customerId=row.customer_id||row.customers&&row.customers.id;
if(relationship.kind==='review')return {title:'Match contact',detail:'Attach to the right profile.'};
if(status==='needs_reply'||status==='new')return {title:'Reply',detail:'Open the profile message pane.'};
if(status==='waiting_on_customer')return {title:'Waiting',detail:'Add a follow-up date if needed.'};
if(status==='closed')return {title:'Closed',detail:'Saved to timeline.'};
if(customerId)return {title:'Review profile',detail:'Open profile.'};
return {title:'Review',detail:'Decide next step.'};

function inquiryQueueBucket(row){

var status=String(row.status||'new').toLowerCase();
if(relationship.kind==='review')return 'needs_review';
if(status==='new'||status==='needs_reply'||status==='')return 'needs_reply';
if(relationship.kind==='new')return 'new_customer';

return 'steady';

function paymentAmounts(row){
var gross=Number(row.amount||0);
var rawFee=row.estimated_fee_amount!==null&&row.estimated_fee_amount!==undefined&&row.estimated_fee_amount!==''?row.estimated_fee_amount:row.fee_amount;
var fee=Number(rawFee||0);
var estimated=!!row.fee_is_estimated;
if(!fee&&gross>0){fee=stripeFeeEstimate(gross);estimated=true}
var net=row.estimated_net_amount===null||row.estimated_net_amount===undefined||row.estimated_net_amount===''?(row.net_amount===null||row.net_amount===undefined||row.net_amount===''?gross-fee:Number(row.net_amount||0)):Number(row.estimated_net_amount||0);
return {gross:gross,fee:fee,net:net,estimated:estimated};

function paymentStatusGroup(row){
var status=String(row.status||'').toLowerCase();
var type=String(row.payment_type||'').toLowerCase();
if(['failed','requires_payment_method','requires_action'].includes(status))return 'failed';
if(['pending','processing','requires_capture'].includes(status))return 'processing';
if(type.indexOf('final')!==-1)return 'finals';
if(type.indexOf('deposit')!==-1)return 'deposits';
return 'other';
}

async function syncStripePayment(){
var input=document.getElementById('stripePaymentIntentInput');
var type=document.getElementById('stripePaymentType');
var balance=document.getElementById('stripeFinalBalanceInput');
var paymentIntentId=input&&input.value.trim();
if(!paymentIntentId){statusText.innerHTML='<span class="error">Paste the Stripe payment intent ID from Stripe.</span>';return}
setBusy('Recovering Stripe payment...');
try{
var result=await post('/api/admin-sync-stripe-payment',{stripe_payment_intent_id:paymentIntentId,payment_type:type&&type.value||'deposit',final_balance_total:balance&&balance.value||''});
state.stripeRecoveryResult=result;
state.payments=(await endpoint('/api/admin-payments')).payments||[];
renderPayments();
statusText.innerHTML='<span class="ok">Stripe payment recovered into the CRM.</span>';
}catch(err){
state.stripeRecoveryResult={error:err.message||'Could not recover Stripe payment.',step:err.step||'',details:err.details||''};
renderPayments();
statusText.innerHTML='<span class="error">'+esc(err.message||'Could not recover Stripe payment.')+'</span>';
}
}

async function saveAutomation(key,id){

function accountingPaymentCard(row){

}

function titleCase(value){
return String(value||'').replace(/_/g,' ').replace(/\b\w/g,function(letter){return letter.toUpperCase()});
}

function parseMetadata(value){
if(!value)return {};
if(typeof value==='object'&&!Array.isArray(value))return value;
try{return JSON.parse(value)}catch(err){return {}}
}

function duplicateCandidateIds(row){
var meta=parseMetadata(row.metadata);
var ids=[];
if(meta.possible_duplicate_customer_ids&&Array.isArray(meta.possible_duplicate_customer_ids))ids=ids.concat(meta.possible_duplicate_customer_ids);
if(meta.source_customer_id)ids.push(meta.source_customer_id);
if(meta.target_customer_id)ids.push(meta.target_customer_id);
var current=row.customer_id||row.customers&&row.customers.id;
return Array.from(new Set(ids.filter(Boolean).filter(function(id){return id!==current})));
}

function duplicateCandidateRows(row){
var rows=Array.isArray(row.duplicate_candidates)?row.duplicate_candidates:[];
if(rows.length)return rows;
return duplicateCandidateIds(row).map(function(id){return {id:id}});
}

function duplicateReason(row,candidates){
var meta=parseMetadata(row.metadata);
var parts=[];
var details=String(row.details||'');
if(details)parts.push(details);
if(meta.match_reason)parts.push(meta.match_reason);
if(candidates.some(function(candidate){return candidate.full_name}))parts.push('The CRM has a possible profile match with a similar or matching full name.');
if(candidates.some(function(candidate){return candidate.email}))parts.push('At least one possible match has email context attached.');
if(candidates.some(function(candidate){return candidate.phone}))parts.push('At least one possible match has phone context attached.');
return Array.from(new Set(parts.filter(Boolean))).join(' ')||'The CRM found signals that may belong to one real customer. Review both profiles before merging.';
}

function duplicateConfidence(row,candidates){
var meta=parseMetadata(row.metadata);
if(meta.confidence)return String(meta.confidence);
if(candidates.some(function(candidate){return candidate.email&&candidate.phone}))return 'strong';
if(candidates.some(function(candidate){return candidate.email||candidate.phone||candidate.full_name}))return 'review';
return 'manual';
}

function duplicateCandidateCard(candidate,currentId,currentName){
var candidateName=candidate.full_name||candidate.email||candidate.phone||'Possible match';
var candidateContext=[candidate.email,candidate.phone,candidate.status&&formatStatus(candidate.status)].filter(Boolean).join(' · ')||'Customer details not loaded yet';
var keepCurrent='Keep '+firstWord(currentName||'current');
return '<div class="duplicate-match"><div class="duplicate-match-copy"><em>Possible same person</em><strong>'+esc(candidateName)+'</strong><span>'+esc(candidateContext)+'</span></div><div class="duplicate-match-actions">'+openProfileButton(candidate.id,'Open match')+'<button class="btn quiet small" data-merge-source="'+esc(candidate.id||'')+'" data-merge-target="'+esc(currentId||'')+'">'+esc(keepCurrent)+'</button><button class="btn quiet small" data-merge-source="'+esc(currentId||'')+'" data-merge-target="'+esc(candidate.id||'')+'">Keep match</button></div></div>';
}

function firstWord(value){
return String(value||'profile').trim().split(/\s+/)[0]||'profile';
}

function duplicateReviewCard(row,index){
var customerId=row.customer_id||row.customers&&row.customers.id||'';
var name=row.customers&&row.customers.full_name||row.customer_name||'Customer';
var email=row.customers&&row.customers.email||'';
var phone=row.customers&&row.customers.phone||'';
var candidates=duplicateCandidateRows(row);
var candidateCards=candidates.length?'<div class="duplicate-match-list">'+candidates.map(function(candidate){return duplicateCandidateCard(candidate,customerId,name)}).join('')+'</div>':'<div class="duplicate-candidates"><span class="candidate-pill">No candidate details attached yet</span></div>';
var context=[email,phone].filter(Boolean).join(' · ')||'Missing email or phone';
var reason=duplicateReason(row,candidates);
var confidence=duplicateConfidence(row,candidates);
return '<article class="duplicate-card" data-duplicate-card data-card-index="'+esc(index)+'">'+
'<header><div class="duplicate-current"><div><h3>'+customerLink(customerId,name)+'</h3><p>'+esc(context)+'</p></div><div class="duplicate-current-line"><span class="pill">Confidence <strong>'+esc(formatStatus(confidence))+'</strong></span><span class="pill">Matches <strong>'+esc(candidates.length)+'</strong></span></div><div class="duplicate-reason"><strong>Why this is here</strong>'+esc(reason)+'</div></div><div class="actions">'+openProfileButton(customerId,'Open profile')+'</div></header>'+
candidateCards+
'<div class="meta"><span class="pill">Detected <strong>'+esc(date(row.occurred_at))+'</strong></span><span class="pill">Founder review <strong>required</strong></span></div>'+
'</article>';
}

btn.addEventListener('click',async function(){await mergeCustomerProfiles(btn.dataset.mergeSource,btn.dataset.mergeTarget)});
});

async function mergeCustomerProfiles(source,target){
if(!source||!target){statusText.innerHTML='<span class="error">Choose both a source customer and target customer before merging.</span>';return}
if(source===target){statusText.innerHTML='<span class="error">Source and target are the same. Pick the profile you want to keep as the target.</span>';return}
if(!confirm('Merge this customer profile into the target profile? The source profile will be archived and all connected CRM history will move to the target.'))return;
setBusy('Merging customer profiles...');
try{
var result=await post('/api/admin-merge-customer',{source_customer_id:source,target_customer_id:target});
await showMergedCustomer(result&&result.merged_into_customer_id||target,'Customer profiles merged into the kept profile.');
}catch(err){statusText.innerHTML='<span class="error">'+esc(err.message||'Could not merge customers.')+'</span>'}
}

async function sendNotices(){
var rows=state.reservations.filter(function(row){return state.selected.has(row.id)&&row.notice_required});
if(!rows.length){statusText.innerHTML='<span class="error">Pick at least one customer who needs a balance email.</span>';return}
setBusy('Sending balance emails...');
var sent=0,failed=[];
var results=[];
for(var i=0;i<rows.length;i++){try{var notice=await post('/api/send-final-balance-notice',{reservation_record_id:rows[i].id});sent++;results.push({reservation_record_id:rows[i].id,status:notice.already_sent?'already_sent':'sent',amount:notice.amount||rows[i].final_balance_total||0,reason:notice.already_sent?'Notice was already sent.':''})}catch(err){failed.push(rows[i].id+': '+err.message);results.push({reservation_record_id:rows[i].id,status:'failed',amount:rows[i].final_balance_total||0,reason:err.message||'Could not send notice.'})}}
state.noticeResults={summary:{sent:sent,failed:failed.length},results:results};
await loadCurrent();
statusText.innerHTML=failed.length?'<span class="error">Sent '+sent+', failed '+failed.length+'.</span>':'<span class="ok">Sent '+sent+' balance email(s).</span>';
}
async function runBatch(dryRun){
if(state.batchBusy){statusText.innerHTML='<span class="muted">Batch request already running.</span>';return}
var ids=Array.from(state.selected);
if(!ids.length){statusText.innerHTML='<span class="error">Pick at least one balance first.</span>';return}
if(ids.length>100){statusText.innerHTML='<span class="error">Batch limit is 100 balances. Pick fewer records and try again.</span>';return}
if(!dryRun){
var readyRows=state.reservations.filter(function(row){return state.selected.has(row.id)&&row.charge_eligible&&!row.already_charged});
var readyCount=readyRows.length;
var readyAmount=readyRows.reduce(function(sum,row){return sum+Number(row.final_balance_total||0)},0);
if(!readyCount){statusText.innerHTML='<span class="error">None of the picked balances are ready to charge. Run a dry run or pick ready balances first.</span>';return}
var safety=state.finalBalanceSafety||{};
var message='Collect '+money(readyAmount)+' from '+readyCount+' ready customer(s)?\n\nAnything missing card approval, balance email, or the 24-hour wait will be skipped. Stripe mode: '+(safety.stripe_mode||'unknown')+'.';
if(!window.confirm(message)){statusText.innerHTML='<span class="muted">Batch charge cancelled.</span>';return}
}
state.batchBusy=true;
renderFinals();
setBusy(dryRun?'Running dry run...':'Collecting selected ready balances...');
try{
var data=await post('/api/batch-final-balance',{reservation_record_ids:ids,dry_run:dryRun});
state.batchResults=data;
await loadCurrent();
var s=data.summary||{};
statusText.innerHTML='<span class="'+(s.failed?'error':'ok')+'">'+(dryRun?'Dry run':'Batch')+': charged '+(s.charged||0)+', skipped '+(s.skipped||0)+', already '+(s.already_charged||0)+', failed '+(s.failed||0)+'.</span>';
}catch(err){
statusText.innerHTML='<span class="error">'+esc(err.message||'Batch request failed.')+'</span>';
}finally{
state.batchBusy=false;
renderFinals();
}
}
async function runAutoFinalBalance(dryRun){
if(state.batchBusy){statusText.innerHTML='<span class="muted">Final-balance automation is already running.</span>';return}
var readyRows=state.reservations.filter(function(row){return row.charge_eligible&&!row.already_charged});
var readyAmount=readyRows.reduce(function(sum,row){return sum+Number(row.final_balance_total||0)},0);
if(!dryRun){
if(!readyRows.length){statusText.innerHTML='<span class="error">No emailed balances are ready to charge yet.</span>';return}
var safety=state.finalBalanceSafety||{};
var message='Collect all ready balances now?\\n\\nCustomers: '+readyRows.length+'\\nEstimated total: '+money(readyAmount)+'\\nStripe mode: '+(safety.stripe_mode||'unknown')+'\\nWait: '+(safety.notice_hours||24)+'h\\n\\nAnything missing approval will be skipped.';
if(!window.confirm(message)){statusText.innerHTML='<span class="muted">Automatic charge cancelled.</span>';return}
}
state.batchBusy=true;
renderFinals();
setBusy(dryRun?'Checking emailed-and-ready final balances...':'Charging emailed-and-ready final balances...');
try{
var data=await post('/api/auto-final-balance',{dry_run:dryRun,limit:100});
state.batchResults=data;
await loadCurrent();
var s=data.summary||{};
statusText.innerHTML='<span class="'+(s.failed?'error':'ok')+'">'+(dryRun?'Check':'Auto batch')+': charged '+(s.charged||0)+', skipped '+(s.skipped||0)+', already '+(s.already_charged||0)+', failed '+(s.failed||0)+'.</span>';
}catch(err){
statusText.innerHTML='<span class="error">'+esc(err.message||'Automatic final-balance batch failed.')+'</span>';
}finally{
state.batchBusy=false;
renderFinals();
}
}
function batchResultReport(){
var data=state.batchResults;
if(!data||!Array.isArray(data.results)||!data.results.length)return '';
var s=data.summary||{};
var email=data.owner_summary_email||{};
var emailStatus=email.skipped?'Skipped for dry run':(email.sent?'Sent':'Failed');
var emailClass=email.error?'error':'muted';
return '<section class="panel"><div class="bar"><div><div class="section-title">'+(data.dry_run?'Dry run results':'Batch charge results')+'</div><div class="meta"><span class="pill">Charged <strong>'+(s.charged||0)+'</strong></span><span class="pill">Skipped <strong>'+(s.skipped||0)+'</strong></span><span class="pill">Already charged <strong>'+(s.already_charged||0)+'</strong></span><span class="pill">Failed <strong>'+(s.failed||0)+'</strong></span><span class="pill">Owner email <strong>'+esc(emailStatus)+'</strong></span></div></div></div>'+
(email.error?'<p class="'+emailClass+'">Owner summary email failed: '+esc(email.error)+'</p>':'')+
table(['Order','Status','Code','Amount','Stripe status','Payment intent','Reason'],data.results.map(function(row){return [row.reservation_record_id,row.status,row.reason_code||'',money(row.amount||0),row.stripe_status||'',row.payment_intent_id||'',row.reason||'']}))+'</section>';
}
function noticeResultReport(){
var data=state.noticeResults;
if(!data||!Array.isArray(data.results)||!data.results.length)return '';
var s=data.summary||{};
return '<section class="panel"><div class="bar"><div><div class="section-title">Notice send results</div><div class="meta"><span class="pill">Sent <strong>'+(s.sent||0)+'</strong></span><span class="pill">Failed <strong>'+(s.failed||0)+'</strong></span></div></div></div>'+
table(['Order','Status','Final balance','Reason'],data.results.map(function(row){return [row.reservation_record_id,row.status,money(row.amount||0),row.reason||'']}))+'</section>';
}
function finalBalanceSafetyPanel(){
var s=state.finalBalanceSafety;
if(!s)return '';
var locked=s.stripe_mode==='live'&&!s.allow_live_final_charges;
return '<section class="panel finals-safety"><div class="bar"><div><div class="section-title">Collection lock</div><div class="meta">'+
'<span class="pill">Stripe mode <strong>'+esc(s.stripe_mode||'missing')+'</strong></span>'+
'<span class="pill">Live final charges <strong>'+esc(s.allow_live_final_charges?'enabled':'locked')+'</strong></span>'+
'<span class="pill">Notice wait <strong>'+esc(s.notice_hours||24)+'h</strong></span>'+
'<span class="pill">Webhook secret <strong>'+esc(s.stripe_webhook_secret_configured?'set':'missing')+'</strong></span>'+
'</div></div></div>'+
(locked?'<p class="error">Live collection is locked. Emails and dry runs still work.</p>':'<p class="muted">Live collection is enabled. Missing approval still stays blocked.</p>')+
'<details class="crm-drawer"><summary>Launch safety</summary><div class="notice">Test one Stripe order before collecting from real customers. Run a dry run first.</div></details>'+
'</section>';
}
function exportAccountingCsv(){
var rows=(state.accounting&&state.accounting.payments||[]).map(function(row){var fee=Number(row.estimated_fee_amount||row.fee_amount||0);var net=row.estimated_net_amount===null||row.estimated_net_amount===undefined||row.estimated_net_amount===''?(row.net_amount===null||row.net_amount===undefined||row.net_amount===''?Number(row.amount||0)-fee:Number(row.net_amount||0)):Number(row.estimated_net_amount||0);return [row.occurred_at,row.customers&&row.customers.full_name||'',row.payment_type,row.amount,fee,net,row.fee_is_estimated?'estimated':'actual',row.status,row.stripe_payment_intent_id]});
exportCsv('yogacloak-accounting.csv',['date','customer','type','gross_amount','stripe_fee','net_amount','fee_source','status','stripe_id'],rows);
}
function exportCsv(filename,headers,rows){
var csv=[headers].concat(rows).map(function(row){return row.map(function(cell){return '"'+String(cell||'').replace(/"/g,'""')+'"'}).join(',')}).join('\n');
var blob=new Blob([csv],{type:'text/csv'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

applyRoleUi();
if(directFilePreview){
renderDirectFileNotice();
}else{
loadCurrent();
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub · yogacloak</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1E2320;--ink-2:#252b27;--panel:#151618;--panel2:#1a1d1b;--bone:#fbf8f0;--sage:#7C8C82;--clay:#9A8E86;--fog:#C4C9C5;--gold:#d8c7a2;--rose:#d4948d;--blue:#9aadb9;--line:rgba(251,248,240,.09);--muted:rgba(251,248,240,.58);--soft:rgba(251,248,240,.06);--cream:251,248,240;--phi:1.618;--page-max:min(1880px,calc(100vw - 72px));--read-max:1000px;--side-max:618px;--space-1:5px;--space-2:8px;--space-3:13px;--space-4:21px;--space-5:34px;--space-6:55px;--space-7:89px;--gutter:clamp(21px,2.4vw,44px);--radius-sm:5px;--radius:8px;--radius-lg:13px;--main-col:minmax(0,1.618fr);--side-col:minmax(360px,1fr);--shadow:0 34px 90px -48px rgba(0,0,0,.72)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--ink);color:var(--bone);font-family:Helvetica,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;padding:0;overflow-x:hidden}
a{color:inherit}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.45}
.shell{max-width:var(--page-max);margin:0 auto;padding:var(--space-5) var(--gutter) var(--space-6)}
.top{display:block;max-width:var(--page-max);margin:var(--space-5) auto var(--space-4)}
.hero{padding:0 0 10px;background:transparent;border:0;box-shadow:none}
.ops-panel,.panel{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;box-shadow:var(--shadow)}
.ops-panel{padding:20px}
.ops-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.utility-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.utility-btn{background:transparent;color:rgba(var(--cream),.54);border:1px solid rgba(var(--cream),.12);border-radius:999px;padding:8px 11px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;transition:color .18s ease,border-color .18s ease,background .18s ease}
.utility-btn:hover{color:var(--bone);border-color:rgba(var(--cream),.28);background:rgba(var(--cream),.04)}
.corner-actions{position:absolute;right:22px;top:18px;z-index:20;display:flex;align-items:center;gap:8px;background:rgba(21,22,24,.72);border:1px solid rgba(var(--cream),.09);border-radius:999px;padding:7px;backdrop-filter:blur(18px);box-shadow:0 20px 50px -34px rgba(0,0,0,.8)}
.corner-status{max-width:220px;color:rgba(var(--cream),.5);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 7px}
.profile-menu-wrap{position:relative}
.profile-trigger{display:inline-flex;align-items:center;gap:9px;background:var(--bone);color:var(--ink);border-radius:999px;padding:9px 12px 9px 10px;font-weight:800;font-size:12px;box-shadow:0 12px 34px -24px rgba(251,248,240,.9)}
.avatar-dot{width:24px;height:24px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:var(--ink);color:var(--bone);font-size:11px;font-weight:800}
.profile-caret{font-size:11px;opacity:.7}
.profile-menu{position:absolute;right:0;top:calc(100% + 10px);width:240px;background:#151618;border:1px solid rgba(var(--cream),.12);border-radius:8px;box-shadow:0 28px 70px -36px rgba(0,0,0,.92);padding:8px}
.profile-menu-header{padding:10px 11px 12px;border-bottom:1px solid rgba(var(--cream),.08);margin-bottom:6px}
.profile-menu-header strong{display:block;font-size:14px;color:var(--bone)}
.profile-menu-header span{display:block;margin-top:3px;font-size:11px;color:rgba(var(--cream),.5)}
.profile-menu button{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;background:transparent;color:rgba(var(--cream),.74);border-radius:7px;padding:10px 11px;font-size:12px;font-weight:700;box-shadow:none}
.profile-menu button:hover{background:rgba(var(--cream),.055);color:var(--bone);transform:none}
.profile-menu button.danger{color:#d4948d}
.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.hub-state{border-top:1px solid rgba(var(--cream),.07);margin-top:14px;padding-top:12px;display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:rgba(var(--cream),.48);line-height:1.45}
.wordmark{font-size:36px;letter-spacing:-.035em;text-decoration:none;display:inline-flex;align-items:center;gap:0}.wordmark strong{font-weight:800}.wordmark span{font-weight:400}
.eyebrow{display:block;margin:12px 0 8px;font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:rgba(var(--cream),.43);font-weight:800}
h1{font-family:'Hanken Grotesk',sans-serif;font-size:clamp(42px,5.8vw,76px);font-weight:500;letter-spacing:-.04em;line-height:1.02;max-width:820px}
h1 em{font-style:italic;font-weight:300;color:rgba(var(--cream),.66)}
.command-title{font-family:'Hanken Grotesk',Helvetica,Arial,sans-serif;font-size:clamp(42px,5.1vw,76px);font-weight:300;letter-spacing:-.052em;line-height:.98;color:rgba(251,248,240,.72);max-width:none;margin-top:12px;text-transform:lowercase}
.command-title .command-word{font-style:italic;color:rgba(251,248,240,.62)}
.command-title .center-word{font-style:normal;color:rgba(251,248,240,.88)}
.sub{font-family:'Hanken Grotesk',sans-serif;color:rgba(var(--cream),.58);font-size:14px;line-height:1.55;margin-top:12px;max-width:720px;font-style:italic;font-weight:300}
.panel{padding:var(--space-4);margin-bottom:var(--space-4)}
.login{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
label{display:flex;flex-direction:column;gap:7px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.46);font-weight:700}
input,select,textarea{width:100%;background:rgba(0,0,0,.18);border:1px solid rgba(var(--cream),.14);color:var(--bone);border-radius:8px;padding:12px 13px;outline:none;transition:border-color .16s ease,background .16s ease}
input:focus,select:focus,textarea:focus{border-color:rgba(215,184,114,.58);background:rgba(0,0,0,.25)}
textarea{min-height:92px;resize:vertical;line-height:1.45}
select option{background:#151719;color:var(--bone)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--bone);color:var(--ink);border-radius:999px;padding:12px 17px;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 10px 24px rgba(0,0,0,.18);transition:transform .16s ease,border-color .16s ease,background .16s ease}
.btn:hover{transform:translateY(-1px)}
.btn.quiet{background:rgba(var(--cream),.035);color:rgba(var(--cream),.76);border:1px solid rgba(var(--cream),.16);box-shadow:none}
.btn.warn{background:#d4948d;color:#1e2320}
.tabs{display:flex;gap:var(--space-2);overflow:auto;max-width:var(--page-max);padding:var(--space-3) 0;margin:0 auto var(--space-4);background:transparent;border-top:1px solid rgba(var(--cream),.06);border-bottom:1px solid rgba(var(--cream),.08);border-radius:0;z-index:3}
.tab{background:transparent;color:rgba(var(--cream),.58);border:1px solid transparent;border-radius:999px;padding:10px 13px;font-size:12px;font-weight:700;white-space:nowrap}
.tab:hover{color:var(--bone);background:rgba(var(--cream),.045)}
.tab.active{background:var(--bone);color:var(--ink);box-shadow:0 10px 30px -18px rgba(0,0,0,.62)}
.view{max-width:var(--page-max);margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:#151618;border:1px solid rgba(var(--cream),.08);border-radius:8px;padding:18px;min-height:108px;box-shadow:0 20px 60px -42px rgba(0,0,0,.8)}
.card:nth-child(3n+1){border-top-color:rgba(148,161,135,.52)}
.card:nth-child(3n+2){border-top-color:rgba(215,184,114,.48)}
.card:nth-child(3n+3){border-top-color:rgba(145,169,189,.42)}
.card span{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:700}
.card strong{display:block;font-family:'Hanken Grotesk',sans-serif;font-size:36px;font-weight:500;letter-spacing:-.035em;margin-top:12px}
.card small{display:block;margin-top:8px;color:rgba(var(--cream),.42);line-height:1.35}
.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:4px 0 14px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:10px}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(var(--cream),.12);border-radius:999px;padding:7px 10px;font-size:11px;color:rgba(var(--cream),.66);background:rgba(var(--cream),.035)}
.pill strong{color:var(--bone)}
.table-wrap{overflow:auto;border-radius:8px;border:1px solid rgba(var(--cream),.08);background:#111314}
table{width:100%;border-collapse:collapse;min-width:960px}
th,td{text-align:left;border-bottom:1px solid rgba(var(--cream),.07);padding:14px 14px;font-size:12px;vertical-align:top}
th{font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.44);font-weight:700;background:rgba(var(--cream),.035);position:sticky;top:0}
td{color:rgba(var(--cream),.72);line-height:1.4}
tbody tr{transition:background .14s ease}
tbody tr:hover{background:rgba(var(--cream),.025)}
tr:last-child td{border-bottom:0}
.crm-read{display:grid;gap:5px;min-width:210px}
.crm-read strong{display:block;color:rgba(var(--cream),.82);font-size:12px;line-height:1.25}
.crm-read span{display:block;color:rgba(var(--cream),.48);font-size:11px;line-height:1.35}
.crm-read .status{width:max-content;margin-bottom:2px}
.next-read{display:grid;gap:6px;border:1px solid rgba(var(--cream),.07);border-radius:8px;background:rgba(var(--cream),.025);padding:10px}
.next-read span{display:block;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800;margin:0}
.next-read strong{display:block;color:var(--bone);font-size:13px;line-height:1.25}
.next-read small{display:block;color:rgba(var(--cream),.48);font-size:11px;line-height:1.35}
.customer-list{display:grid;gap:10px}
.customer-card-row{display:grid;grid-template-columns:minmax(230px,1fr) minmax(280px,1.05fr) minmax(250px,.85fr) minmax(230px,.78fr) auto;gap:14px;align-items:center;border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#111314;padding:14px;transition:background .16s ease,border-color .16s ease,transform .16s ease}
.customer-card-row:hover{background:rgba(var(--cream),.035);border-color:rgba(var(--cream),.16);transform:translateY(-1px)}
.customer-card-main strong{display:block;font-size:16px;line-height:1.25;color:var(--bone)}
.customer-card-main span,.customer-card-meta span,.customer-card-contact span{display:block;margin-top:4px;color:rgba(var(--cream),.48);font-size:12px;line-height:1.35}
.customer-card-contact strong,.customer-card-meta strong{display:block;color:rgba(var(--cream),.72);font-size:12px;line-height:1.35;font-weight:700}
.customer-card-meta{display:grid;gap:5px}
.customer-card-signals{display:flex;gap:6px;flex-wrap:wrap}
.customer-card-signals .pill{font-size:10px;padding:6px 8px;background:rgba(var(--cream),.026)}
.customer-card-signals .pill.hot{border-color:rgba(212,148,141,.28);color:#d4948d}
.customer-card-signals .pill.money{border-color:rgba(219,186,123,.24);color:#dbba7b}
.customer-card-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px}
.customer-list-empty{border:1px dashed rgba(var(--cream),.12);border-radius:8px;background:rgba(var(--cream),.018);padding:34px;text-align:center;color:rgba(var(--cream),.48)}
.customer-filter-panel{display:grid;grid-template-columns:minmax(180px,.5fr) minmax(260px,1fr) auto auto;gap:10px;align-items:center;margin-bottom:14px}
.customer-command-panel{border:1px solid rgba(var(--cream),.09);border-radius:8px;background:#151618;padding:16px;margin-bottom:14px;display:grid;gap:12px}
.customer-command-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.customer-command-head h2{font-size:24px;font-weight:500;letter-spacing:-.025em}
.customer-command-head p{margin-top:5px;color:rgba(var(--cream),.48);font-size:12px;line-height:1.45}
.customer-queue-chips{display:flex;gap:8px;flex-wrap:wrap}
.customer-queue-chip{border:1px solid rgba(var(--cream),.1);border-radius:999px;background:rgba(var(--cream),.03);color:rgba(var(--cream),.62);padding:9px 12px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:7px}
.customer-queue-chip:hover{background:rgba(var(--cream),.055);color:var(--bone);transform:none}
.customer-queue-chip.active{background:var(--bone);color:var(--ink);border-color:var(--bone)}
.customer-queue-chip strong{font-size:12px}
.task-command{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.44fr);gap:14px;align-items:stretch;margin-bottom:14px}
.task-command-main{border:1px solid rgba(var(--cream),.09);border-radius:8px;background:linear-gradient(135deg,rgba(var(--cream),.055),rgba(var(--cream),.018));padding:18px;box-shadow:var(--shadow)}
.task-command-main h2{font-size:30px;font-weight:500;letter-spacing:-.03em}
.task-command-main p{margin-top:7px;color:rgba(var(--cream),.52);font-size:13px;line-height:1.5}
.task-stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px}
.task-stat{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:rgba(0,0,0,.18);padding:12px;min-height:86px}
.task-stat span{display:block;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.task-stat strong{display:block;margin-top:8px;font-family:'Hanken Grotesk',sans-serif;font-size:27px;font-weight:500}
.task-stat small{display:block;margin-top:6px;color:rgba(var(--cream),.42);font-size:11px;line-height:1.35}
.task-command-side{border:1px solid rgba(var(--cream),.09);border-radius:8px;background:#151618;padding:16px;display:grid;align-content:space-between;gap:14px}
.task-command-side strong{display:block;color:var(--bone);font-size:15px;line-height:1.3}
.task-command-side p{margin-top:6px;color:rgba(var(--cream),.5);font-size:12px;line-height:1.45}
.task-filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.task-lanes{display:grid;gap:10px}
.task-lane{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#111314;overflow:hidden}
.task-lane[open]{padding-bottom:10px}
.task-lane-head{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;padding:14px 16px;cursor:pointer;list-style:none}
.task-lane-head::-webkit-details-marker{display:none}
.task-lane-head:after{content:'+';width:28px;height:28px;border:1px solid rgba(var(--cream),.13);border-radius:999px;display:grid;place-items:center;color:rgba(var(--cream),.58);font-size:16px}
.task-lane[open] .task-lane-head:after{content:'-'}
.task-lane-title{display:grid;gap:4px;min-width:0}
.task-lane-title strong{color:var(--bone);font-size:17px;line-height:1.2}
.task-lane-title span{color:rgba(var(--cream),.48);font-size:12px;line-height:1.35}
.task-lane-count{justify-self:end;margin-right:40px}
.task-lane-body{display:grid;gap:10px;padding:0 14px}
.task-lane-empty{padding:0 16px 14px;color:rgba(var(--cream),.4);font-size:13px}
.task-card{display:grid;grid-template-columns:minmax(0,1fr) minmax(190px,.32fr);gap:12px;align-items:start;border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#111314;padding:13px;min-height:112px;cursor:pointer;transition:background .16s ease,border-color .16s ease,transform .16s ease}
.task-card:hover{background:rgba(var(--cream),.035);border-color:rgba(var(--cream),.16);transform:translateY(-1px)}
.task-card.hot{border-color:rgba(212,148,141,.24);background:linear-gradient(135deg,rgba(212,148,141,.085),rgba(var(--cream),.02))}
.task-card.waiting{border-color:rgba(219,186,123,.18)}
.task-card-main{display:grid;gap:7px;min-width:0}
.task-card-title{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.task-card-title strong{font-size:15px;line-height:1.25;color:var(--bone)}
.task-card-main p{color:rgba(var(--cream),.5);font-size:12px;line-height:1.4}
.task-card-context{border-left:2px solid rgba(var(--cream),.12);padding-left:9px}
.task-card-meta{display:flex;gap:6px;flex-wrap:wrap}
.task-card-owner{border:1px solid rgba(var(--cream),.07);border-radius:8px;background:rgba(var(--cream),.025);padding:10px;color:rgba(var(--cream),.52);font-size:11px;line-height:1.35}
.task-card-owner span{display:block;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800;margin-bottom:4px}
.task-card-owner strong{display:block;color:var(--bone);font-size:13px;margin-bottom:3px}
.task-card-owner small{display:block;color:rgba(var(--cream),.52);font-size:11px;line-height:1.35}
.task-card-actions{display:grid;gap:7px;justify-items:stretch}
.task-card-actions .btn{width:100%}
.task-composer-panel{margin-bottom:14px}
.task-composer-panel summary{cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;list-style:none}
.task-composer-panel summary::-webkit-details-marker{display:none}
.task-composer-panel summary:after{content:'+';width:28px;height:28px;border:1px solid rgba(var(--cream),.13);border-radius:999px;display:inline-flex;align-items:center;justify-content:center;color:rgba(var(--cream),.62);font-size:18px}
.task-composer-panel[open] summary:after{content:'-'}
.task-composer-panel .record-grid{margin-top:14px}
.inquiry-queue{display:grid;gap:10px}
.inquiry-card{display:grid;grid-template-columns:minmax(260px,.72fr) minmax(360px,1.12fr) minmax(300px,.58fr);gap:12px;align-items:start;border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#111314;padding:12px;transition:background .16s ease,border-color .16s ease,transform .16s ease;cursor:pointer}
.inquiry-card:hover{background:rgba(var(--cream),.035);border-color:rgba(var(--cream),.16);transform:translateY(-1px)}
.inquiry-card.new{border-color:rgba(219,186,123,.22)}
.inquiry-card.needs-review{border-color:rgba(212,148,141,.24);background:linear-gradient(135deg,rgba(212,148,141,.075),rgba(var(--cream),.02))}
.inquiry-card-main{display:grid;gap:9px;min-width:0;align-content:start}
.inquiry-card-side{display:grid;gap:8px;align-content:start;border-left:1px solid rgba(var(--cream),.07);padding-left:12px;height:100%}
.inquiry-card-head{display:grid;gap:8px;align-content:start}
.inquiry-person strong,.inquiry-message strong,.inquiry-meta strong{display:block;color:var(--bone);font-size:15px;line-height:1.25}
.inquiry-person strong{font-size:17px;letter-spacing:-.01em}
.inquiry-person span,.inquiry-message span,.inquiry-meta span{display:block;margin-top:5px;color:rgba(var(--cream),.48);font-size:12px;line-height:1.4}
.inquiry-message{border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.024);padding:12px;min-width:0}
.inquiry-message p{margin-top:7px;color:rgba(var(--cream),.7);font-size:14px;line-height:1.5;max-width:880px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.inquiry-quick-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

.reservation-raw-body{padding:0 16px 16px}
.muted{color:rgba(var(--cream),.42)}
.ok{color:#a9b997}.error{color:var(--rose)}.money{color:var(--gold)}.link{color:#d7e1cd;text-decoration:none;border-bottom:1px solid rgba(215,225,205,.38);cursor:pointer;font-weight:700}

.finals-page{max-width:1680px;margin:0 auto;display:grid;gap:16px}
.finals-hero{display:grid;gap:18px;margin-bottom:0;padding:22px;background:linear-gradient(135deg,rgba(var(--cream),.055),rgba(0,0,0,.2));border-color:rgba(var(--cream),.12)}
.finals-command-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}

.finals-command-title{font-size:42px;font-weight:500;letter-spacing:-.04em;line-height:1.02}
.finals-command-title span{font-style:italic;color:rgba(var(--cream),.68)}
.finals-command-grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(430px,.72fr);gap:14px;align-items:stretch}
.finals-command-card{border:1px solid rgba(var(--cream),.09);border-radius:8px;background:#111314;padding:18px;display:grid;gap:16px;min-width:0}

.finals-money-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.finals-money-row div{border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.024);padding:14px}

.finals-money-row strong{display:block;margin-top:7px;font-family:'Hanken Grotesk',sans-serif;font-size:31px;font-weight:500;letter-spacing:-.025em}
.finals-next-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:0}
.finals-next-item{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:start;border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.022);padding:11px;min-width:0}
.finals-next-number{width:26px;height:26px;border-radius:999px;display:grid;place-items:center;background:rgba(var(--cream),.86);color:var(--ink);font-weight:800;font-size:11px}
.finals-next-item strong{display:block;color:var(--bone);font-size:14px;line-height:1.25}
.finals-next-item span{display:block;margin-top:3px;color:rgba(var(--cream),.48);font-size:12px;line-height:1.35}
.finals-next-item small{display:block;margin-top:8px;color:rgba(var(--cream),.62);font-size:13px;line-height:1.25}
.finals-money-note{border:1px solid rgba(219,186,123,.16);border-radius:8px;background:rgba(219,186,123,.055);padding:13px;color:rgba(var(--cream),.62);font-size:12px;line-height:1.45}
.finals-money-note strong{display:block;color:var(--bone);font-size:14px;margin-bottom:4px}
.finals-summary{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:8px}
.finals-stat{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:rgba(0,0,0,.18);padding:14px;min-height:92px}
.finals-stat span{display:block;font-size:8.5px;letter-spacing:.17em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.finals-stat strong{display:block;margin-top:8px;font-family:'Hanken Grotesk',sans-serif;font-size:26px;font-weight:500;letter-spacing:0}

.finals-toolbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.finals-action-step{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:rgba(0,0,0,.16);padding:14px;display:grid;grid-template-columns:minmax(0,1fr);gap:12px;align-items:start}
.finals-action-step strong{display:block;margin-top:7px;font-size:15px;color:var(--bone);letter-spacing:-.01em}

.finals-action-step .actions{justify-content:flex-start;gap:7px}
.finals-route-panel{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.finals-route{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:rgba(var(--cream),.022);padding:14px;min-height:118px}
.finals-route.batch{border-color:rgba(154,170,136,.22);background:linear-gradient(135deg,rgba(154,170,136,.08),rgba(var(--cream),.018))}
.finals-route.manual{border-color:rgba(212,148,141,.22);background:linear-gradient(135deg,rgba(212,148,141,.08),rgba(var(--cream),.018))}
.finals-route span{display:block;font-size:8.5px;letter-spacing:.17em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.finals-route strong{display:block;margin-top:8px;font-size:22px;font-weight:500;color:var(--bone);letter-spacing:-.025em}
.finals-route p{margin-top:7px!important;font-size:12px!important;color:rgba(var(--cream),.5)!important}
.finals-decision{display:grid;grid-template-columns:160px minmax(0,1fr) minmax(210px,.36fr);gap:12px;align-items:stretch}

.final-decision-money span{display:block;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.final-decision-money strong{display:block;margin-top:8px;font-family:'Hanken Grotesk',sans-serif;font-size:40px;font-weight:500;letter-spacing:-.04em;line-height:.96;color:var(--bone)}
.final-decision-money small{display:block;margin-top:8px;color:rgba(var(--cream),.48);font-size:12px;line-height:1.35}
.final-decision-copy{border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.022);padding:14px;display:grid;gap:10px}
.final-decision-copy strong{display:block;font-size:18px;color:var(--bone);line-height:1.25}
.final-decision-copy span{display:block;color:rgba(var(--cream),.54);font-size:12px;line-height:1.45}
.final-decision-copy .final-warning{margin-top:0}
.final-decision-actions{display:grid;gap:8px;align-content:center;justify-items:stretch}
.final-decision-actions .btn{width:100%;justify-content:center}
.finals-workflow{display:grid;gap:14px;align-items:start}
.finals-primary-lanes{display:grid;gap:12px}
.finals-reference-lanes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.finals-lane{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:0;box-shadow:var(--shadow);overflow:hidden}
.finals-lane.needs{border-color:rgba(219,186,123,.18)}

.finals-lane.blocked{border-color:rgba(212,148,141,.18)}
.finals-lane[open]{padding-bottom:16px}
.finals-lane-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:22px 24px;cursor:pointer;list-style:none}

.finals-lane-head:after{content:'+';width:28px;height:28px;border:1px solid rgba(var(--cream),.13);border-radius:999px;display:inline-flex;align-items:center;justify-content:center;color:rgba(var(--cream),.62);font-size:18px;line-height:1;flex:0 0 auto;margin-top:2px}

.finals-lane-count{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.finals-lane h3{font-size:28px;font-weight:500;letter-spacing:-.03em}

.finals-records{display:grid;gap:14px;padding:0 24px}
.final-card{display:grid;gap:14px;border:1px solid rgba(var(--cream),.09);border-radius:8px;background:linear-gradient(135deg,rgba(var(--cream),.04),rgba(0,0,0,.16));padding:18px}

.final-person,.final-money,.final-context{min-width:0}

.final-record-tags{display:flex;gap:7px;flex-wrap:wrap}

.final-record-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}

.final-money strong{display:block;font-family:'Hanken Grotesk',sans-serif;font-size:52px;font-weight:500;letter-spacing:-.045em;color:var(--bone);line-height:.94}

.final-money .fee-note{color:rgba(var(--cream),.44)}
.final-money .net-note{color:#9aaa88}
.final-next-box{border:1px solid rgba(219,186,123,.18);border-radius:8px;background:rgba(219,186,123,.058);padding:15px;display:grid;gap:8px}
.final-next-box strong{font-size:18px;line-height:1.25;color:var(--bone)}

.final-next-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.final-card-body{display:grid;grid-template-columns:minmax(0,1fr) minmax(250px,.55fr);gap:10px;margin-top:10px}

.final-card-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;align-items:center;min-width:210px}

.final-context-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}
.final-context-grid div{border:1px solid rgba(var(--cream),.07);border-radius:8px;background:rgba(0,0,0,.15);padding:9px}

.final-warning{border:1px solid rgba(212,148,141,.18);border-radius:8px;background:rgba(212,148,141,.07);padding:9px 10px;color:#d4948d!important}
.final-card code{font-size:10px;color:rgba(var(--cream),.42);word-break:break-all}

.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}

.setup-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}

.setup-card p{color:rgba(var(--cream),.5);font-size:12px;line-height:1.45}
.health{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:700;border:1px solid rgba(var(--cream),.12);color:rgba(var(--cream),.72)}

.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(500px,620px);gap:16px}

.crm-tools{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}

.automation-plus{flex:0 0 36px;min-width:36px;height:36px;border-radius:999px;padding:0;font-size:20px;line-height:1}
.automation-settings-layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:14px;align-items:start}
.automation-list{display:grid;gap:8px}
.automation-list button{width:100%;text-align:left;display:block;background:rgba(var(--cream),.035);border:1px solid rgba(var(--cream),.08);border-radius:8px;color:rgba(var(--cream),.68);padding:13px;box-shadow:none}
.automation-list button.active{background:var(--bone);color:var(--ink);border-color:var(--bone)}
.automation-list strong{display:block;font-size:13px;color:inherit}
.automation-list span{display:block;margin-top:4px;font-size:11px;color:inherit;opacity:.7;line-height:1.35}
.automation-board{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px}
.automation-card{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:18px;box-shadow:0 20px 60px -42px rgba(0,0,0,.8)}
.automation-card header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.automation-card h3{font-size:18px;font-weight:600;letter-spacing:-.02em;line-height:1.15}
.automation-card p{color:rgba(var(--cream),.5);font-size:12px;line-height:1.45;margin-top:6px}
.automation-card label{margin-top:10px}
.automation-card textarea{min-height:128px}
.automation-flow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:12px 0}
.automation-flow div{border:1px solid rgba(var(--cream),.1);border-radius:8px;padding:10px;background:rgba(var(--cream),.035)}
.automation-flow span{display:block;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.automation-flow strong{display:block;margin-top:6px;font-size:14px;line-height:1.18}
.toggle-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0}
.toggle-row input[type=checkbox]{width:auto;accent-color:#d8c7a2}
.check-row{display:flex;flex-direction:row;align-items:center;gap:9px;margin-top:10px;font-size:11px;letter-spacing:0;text-transform:none;color:rgba(30,35,32,.66)}
.check-row input[type=checkbox]{width:auto;accent-color:var(--sage)}
.field-help{display:block;margin-top:6px;font-size:11px;letter-spacing:0;text-transform:none;color:rgba(30,35,32,.5);font-weight:400;line-height:1.35}
.today-command{max-width:1480px;margin:0 auto 14px;display:grid;gap:14px}
.today-briefing{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,420px);gap:14px;align-items:stretch}
.today-start{border:1px solid rgba(var(--cream),.1);border-radius:8px;background:linear-gradient(135deg,rgba(var(--cream),.055),rgba(0,0,0,.18));padding:20px;box-shadow:var(--shadow);display:grid;align-content:space-between;gap:16px;min-height:190px}
.today-start.hot{border-color:rgba(212,148,141,.26);background:linear-gradient(135deg,rgba(212,148,141,.105),rgba(0,0,0,.2))}
.today-start span{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--cream),.44);font-weight:800}
.today-start h2{margin-top:10px;font-size:34px;font-weight:500;letter-spacing:-.035em;line-height:1.04}
.today-start p{margin-top:9px;color:rgba(var(--cream),.55);font-size:14px;line-height:1.5;max-width:640px}
.today-start .actions{justify-content:flex-start}
.today-brief-side{display:grid;grid-template-columns:1fr;gap:10px}
.brief-card{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#151618;padding:15px;display:grid;gap:8px;min-height:0;text-align:left}
.brief-card.hot{border-color:rgba(212,148,141,.22);background:linear-gradient(135deg,rgba(212,148,141,.08),rgba(var(--cream),.02))}
.brief-card span{display:block;font-size:8.5px;letter-spacing:.17em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.brief-card strong{display:block;font-size:22px;font-weight:500;letter-spacing:-.02em;color:var(--bone)}
.brief-card small{display:block;color:rgba(var(--cream),.48);font-size:12px;line-height:1.35}
.signal-drawer{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#151618;overflow:hidden}
.signal-drawer summary{cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;font-weight:800;list-style:none;color:rgba(var(--cream),.72)}
.signal-drawer summary::-webkit-details-marker{display:none}
.signal-drawer summary:after{content:'+';width:26px;height:26px;border:1px solid rgba(var(--cream),.13);border-radius:999px;display:inline-flex;align-items:center;justify-content:center;color:rgba(var(--cream),.58);font-size:16px}
.signal-drawer[open] summary:after{content:'-'}
.signal-drawer-body{padding:0 16px 16px}
.today-signal-strip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.today-signal{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#151618;padding:13px;min-height:94px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;text-align:left;transition:background .16s ease,border-color .16s ease,transform .16s ease}
.today-signal:hover{transform:translateY(-1px);border-color:rgba(var(--cream),.18);background:rgba(var(--cream),.04)}
.today-signal.hot{border-color:rgba(212,148,141,.25);background:linear-gradient(145deg,rgba(212,148,141,.11),rgba(var(--cream),.025))}
.today-signal.ready{border-color:rgba(154,170,136,.22)}
.today-signal span{display:block;font-size:8.5px;letter-spacing:.17em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.today-signal strong{display:block;margin-top:8px;font-family:'Hanken Grotesk',sans-serif;font-size:30px;font-weight:500;letter-spacing:-.02em;color:var(--bone)}
.today-signal small{display:block;margin-top:7px;color:rgba(var(--cream),.46);font-size:12px;line-height:1.35}
.hub-panel{margin-bottom:0;padding:15px;background:rgba(21,22,24,.82)}
.hub-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.hub-toolbar .muted{max-width:560px}
.hub-lenses{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.lens-btn{border:1px solid rgba(var(--cream),.12);border-radius:999px;background:rgba(var(--cream),.035);color:rgba(var(--cream),.62);padding:10px 13px;font-size:10px;letter-spacing:.11em;text-transform:uppercase;font-weight:800;box-shadow:none}
.lens-btn:hover{transform:translateY(-1px);border-color:rgba(var(--cream),.22);background:rgba(var(--cream),.07)}
.lens-btn.active{background:var(--bone);color:var(--ink);border-color:var(--bone);box-shadow:0 18px 45px -34px rgba(251,248,240,.8)}
.hub-card-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}
.hub-card-grid .card{min-height:88px;display:flex;flex-direction:column;justify-content:space-between;padding:13px}
.hub-card-grid .card.jump{cursor:pointer;transition:background .16s ease,border-color .16s ease,transform .16s ease}
.hub-card-grid .card.jump:hover{transform:translateY(-2px);border-color:rgba(var(--cream),.2);background:rgba(var(--cream),.05)}
.hub-card-grid .card strong{font-size:26px;letter-spacing:0;margin-top:8px}
.hub-card-grid .card small{color:rgba(var(--cream),.48);font-size:11px;line-height:1.3;margin-top:6px}
.hub-card-grid .card.is-hot{border-color:rgba(212,148,141,.28);background:linear-gradient(145deg,rgba(212,148,141,.12),rgba(var(--cream),.03))}
.today-workspace{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(360px,.72fr);gap:14px;align-items:start;justify-content:center;max-width:1480px;margin:0 auto}
.priority-panel{margin:0;background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:18px;box-shadow:var(--shadow)}
.priority-panel.hot{border-color:rgba(212,148,141,.2);background:linear-gradient(135deg,rgba(212,148,141,.075),rgba(0,0,0,.16))}
.priority-headline{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:end;margin-bottom:14px}
.priority-headline h2{font-size:30px;font-weight:500;letter-spacing:-.03em}
.priority-headline p{margin-top:6px;color:rgba(var(--cream),.52);font-size:13px;line-height:1.45}
.priority-headline .pill{align-self:start}
.priority-list{display:grid;gap:9px}
.priority-row{display:grid;grid-template-columns:150px minmax(0,1fr) auto;gap:12px;align-items:center;border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.026);padding:12px}
.priority-row.hot{border-color:rgba(212,148,141,.24);background:linear-gradient(135deg,rgba(212,148,141,.09),rgba(var(--cream),.024))}
.priority-kind{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.45);font-weight:800}
.priority-copy strong{display:block;font-size:15px;color:var(--bone);line-height:1.25}
.priority-copy span{display:block;margin-top:4px;color:rgba(var(--cream),.5);font-size:12px;line-height:1.4}
.priority-empty-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.priority-kind{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--cream),.48);font-weight:800}
.priority-copy strong{display:block;font-size:14px;line-height:1.25;color:var(--bone)}
.priority-copy span{display:block;margin-top:4px;font-size:12px;line-height:1.35;color:rgba(var(--cream),.5)}
.work-panel{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:18px;min-height:250px;box-shadow:var(--shadow)}
.work-panel.hero-panel{min-height:340px}
.work-panel header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.work-panel h2{font-size:26px;font-weight:500;letter-spacing:-.025em}
.work-list{display:grid;gap:9px}
.work-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.026);padding:12px}
.work-row.clickable{cursor:pointer;transition:background .16s ease,border-color .16s ease,transform .16s ease}
.work-row.clickable:hover{transform:translateY(-1px);background:rgba(var(--cream),.045);border-color:rgba(var(--cream),.15)}
.work-row strong{display:block;font-size:14px;color:var(--bone);line-height:1.25}
.work-row span{display:block;font-size:12px;color:rgba(var(--cream),.5);line-height:1.35;margin-top:4px}
.message-row{border-left:2px solid rgba(154,170,136,.7)}
.message-row.inbound{border-left-color:rgba(215,184,114,.75);background:rgba(215,184,114,.055)}
.today-side{display:grid;gap:14px}
.today-flow{display:grid;gap:10px}
.today-flow-row{display:grid;grid-template-columns:130px minmax(0,1fr) auto;gap:12px;align-items:center;border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.026);padding:12px;transition:background .16s ease,border-color .16s ease,transform .16s ease}
.today-flow-row:hover{transform:translateY(-1px);background:rgba(var(--cream),.045);border-color:rgba(var(--cream),.15)}
.today-flow-row.hot{border-color:rgba(212,148,141,.24);background:linear-gradient(135deg,rgba(212,148,141,.085),rgba(var(--cream),.02))}
.today-flow-row.money{border-color:rgba(219,186,123,.2)}
.today-flow-kind{display:grid;gap:5px}
.today-flow-kind span{display:block;font-size:8.5px;letter-spacing:.17em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.today-flow-kind strong{display:block;color:var(--bone);font-size:13px;line-height:1.22}
.today-flow-copy{min-width:0}
.today-flow-copy strong{display:block;color:var(--bone);font-size:15px;line-height:1.25}
.today-flow-copy span{display:block;margin-top:4px;color:rgba(var(--cream),.5);font-size:12px;line-height:1.4}
.today-flow-route{display:inline-flex!important;align-items:center;width:max-content;max-width:100%;margin-top:7px!important;border:1px solid rgba(var(--cream),.08);border-radius:999px;background:rgba(var(--cream),.026);padding:5px 8px;color:rgba(var(--cream),.56)!important;font-size:10px!important;font-weight:800;letter-spacing:.03em;text-transform:uppercase}
.today-flow-actions{display:flex;gap:7px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.today-empty{border:1px dashed rgba(var(--cream),.11);border-radius:8px;background:rgba(var(--cream),.018);padding:34px;text-align:center;color:rgba(var(--cream),.48)}
.today-work-groups{display:grid;gap:10px}
.today-work-group{border:1px solid rgba(var(--cream),.08);border-radius:8px;background:#111314;overflow:hidden}
.today-work-group[open]{padding-bottom:10px}
.today-work-group-head{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:13px 14px;cursor:pointer;list-style:none}
.today-work-group-head::-webkit-details-marker{display:none}
.today-work-group-head:after{content:'+';width:26px;height:26px;border:1px solid rgba(var(--cream),.13);border-radius:999px;display:grid;place-items:center;color:rgba(var(--cream),.58);font-size:15px}
.today-work-group[open] .today-work-group-head:after{content:'-'}
.today-work-group-title{display:grid;gap:4px;min-width:0}
.today-work-group-title strong{display:block;color:var(--bone);font-size:16px;line-height:1.22}
.today-work-group-title span{display:block;color:rgba(var(--cream),.46);font-size:12px;line-height:1.35}
.today-work-group-count{justify-self:end;margin-right:36px}
.today-work-group-body{display:grid;gap:8px;padding:0 12px}
.today-work-group-empty{padding:0 14px 12px;color:rgba(var(--cream),.38);font-size:13px}
.hub-work-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px}
.duplicate-command{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(340px,.58fr);gap:14px;align-items:stretch}
.duplicate-stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
.duplicate-stat{border:1px solid rgba(var(--cream),.09);border-radius:8px;background:rgba(var(--cream),.03);padding:14px}
.duplicate-stat span{display:block;font-size:8.5px;letter-spacing:.17em;text-transform:uppercase;color:rgba(var(--cream),.42);font-weight:800}
.duplicate-stat strong{display:block;margin-top:8px;font-size:28px;font-weight:500;letter-spacing:-.025em}
.duplicate-rules{display:grid;gap:9px;margin-top:12px}
.duplicate-rule{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:start;border:1px solid rgba(var(--cream),.075);border-radius:8px;background:rgba(var(--cream),.024);padding:11px}
.duplicate-rule span{width:24px;height:24px;border-radius:999px;display:grid;place-items:center;background:rgba(var(--cream),.86);color:var(--ink);font-size:11px;font-weight:800}
.duplicate-rule strong{display:block;color:var(--bone);font-size:13px;line-height:1.25}
.duplicate-rule small{display:block;margin-top:3px;color:rgba(var(--cream),.48);font-size:11px;line-height:1.35}
.duplicate-board{display:grid;gap:12px}
.duplicate-card{background:#151618;border:1px solid rgba(var(--cream),.09);border-radius:8px;padding:16px;box-shadow:var(--shadow)}
.duplicate-card header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start;margin-bottom:12px}
.duplicate-card h3{font-size:20px;font-weight:500;letter-spacing:-.025em;line-height:1.12}
.duplicate-card p{font-size:12px;line-height:1.45;color:rgba(var(--cream),.54);margin-top:5px}
.duplicate-current{display:grid;gap:8px}
.duplicate-current-line{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.duplicate-reason{border:1px solid rgba(219,186,123,.16);border-radius:8px;background:rgba(219,186,123,.052);padding:11px;margin-top:10px;color:rgba(var(--cream),.66);font-size:12px;line-height:1.45}
.duplicate-reason strong{display:block;color:var(--bone);font-size:13px;margin-bottom:3px}
.duplicate-candidates{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.candidate-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(var(--cream),.12);border-radius:999px;background:rgba(var(--cream),.035);color:rgba(var(--cream),.68);font-size:11px;padding:7px 10px}
.candidate-pill code{font-size:10px;color:rgba(var(--cream),.52)}
.duplicate-match-list{display:grid;gap:10px;margin-top:12px}
.duplicate-match{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;border:1px solid rgba(var(--cream),.08);border-radius:8px;background:rgba(var(--cream),.026);padding:12px}
.duplicate-match strong{display:block;color:var(--bone);font-size:14px;line-height:1.25}
.duplicate-match span{display:block;margin-top:4px;color:rgba(var(--cream),.5);font-size:12px;line-height:1.35}
.duplicate-match-copy{display:grid;gap:4px}
.duplicate-match-copy em{font-style:normal;color:#dbba7b;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:800}
.duplicate-match-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.merge-drawer{border:1px solid rgba(var(--cream),.09);border-radius:8px;background:rgba(var(--cream),.026);margin-top:12px;overflow:hidden}
.merge-drawer summary{cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;list-style:none;font-weight:800;color:rgba(var(--cream),.78)}
.merge-drawer summary::-webkit-details-marker{display:none}
.merge-drawer summary:after{content:'+';width:24px;height:24px;border:1px solid rgba(var(--cream),.13);border-radius:999px;display:inline-flex;align-items:center;justify-content:center;color:rgba(var(--cream),.58);font-size:16px}
.merge-drawer[open] summary:after{content:'-'}
.merge-body{padding:0 14px 14px}
.merge-body .record-grid{margin-top:10px}
.manual-merge{background:rgba(var(--cream),.026)}
.automation-card .meta{margin-top:12px}
.automation-log-body{white-space:pre-wrap;max-width:420px}
.id-line{display:block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;color:rgba(30,35,32,.52);word-break:break-all;margin-top:4px}
.record-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.record-grid label:first-child,.record-grid label:last-child{grid-column:1/-1}
.customer-picker{position:relative;grid-column:1/-1}
.typeahead-results{position:absolute;left:0;right:0;top:100%;z-index:8;margin-top:6px;background:#101211;border:1px solid rgba(var(--cream),.14);border-radius:8px;box-shadow:0 24px 60px -36px rgba(0,0,0,.92);overflow:hidden}
.typeahead-option{width:100%;display:flex;justify-content:space-between;gap:12px;text-align:left;background:transparent;color:rgba(var(--cream),.78);border-bottom:1px solid rgba(var(--cream),.07);border-radius:0;padding:12px 13px;box-shadow:none}
.typeahead-option:hover{background:rgba(var(--cream),.055);transform:none}
.typeahead-option:last-child{border-bottom:0}
.typeahead-option strong{display:block;color:var(--bone);font-size:13px}
.typeahead-option span{display:block;color:rgba(var(--cream),.52);font-size:11px;line-height:1.35;margin-top:3px}
.typeahead-option em{font-style:normal;color:rgba(var(--cream),.42);font-size:10px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.selected-customer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px;border:1px solid rgba(154,170,136,.3);border-radius:8px;background:rgba(154,170,136,.09);padding:10px 11px;color:rgba(var(--cream),.78);font-size:12px;letter-spacing:0;text-transform:none}
.selected-customer strong{color:var(--bone)}
.selected-customer button{background:transparent;color:rgba(var(--cream),.6);border:1px solid rgba(var(--cream),.14);border-radius:999px;padding:5px 8px;font-size:10px}
.detail .typeahead-results{background:#fffaf0;border-color:rgba(30,35,32,.14);box-shadow:0 26px 60px -38px rgba(30,35,32,.55)}
.detail .typeahead-option{color:rgba(30,35,32,.72);border-bottom-color:rgba(30,35,32,.08)}
.detail .typeahead-option:hover{background:rgba(30,35,32,.045)}
.detail .typeahead-option strong{color:var(--ink)}
.detail .typeahead-option span{color:rgba(30,35,32,.52)}
.detail .typeahead-option em{color:rgba(30,35,32,.42)}
.detail .selected-customer{background:rgba(124,140,130,.1);border-color:rgba(124,140,130,.26);color:rgba(30,35,32,.72)}
.detail .selected-customer strong{color:var(--ink)}
.detail .selected-customer button{color:rgba(30,35,32,.62);border-color:rgba(30,35,32,.16)}
.record-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px}
.record-actions .muted{font-size:12px;line-height:1.35}
.detail .table-wrap{margin-top:8px}
.detail table{min-width:620px}

/* 2026 command surface: fewer nested boxes, clearer work paths, same data underneath. */
body{background:linear-gradient(180deg,#1c231f 0%,#18201c 42%,#202820 100%)}
.shell{padding-top:var(--space-6)}
.tabs{position:sticky;top:var(--space-3);width:max-content;max-width:100%;margin:var(--space-4) auto var(--space-6);padding:var(--space-2);background:rgba(17,19,20,.72);border:1px solid rgba(var(--cream),.07);border-radius:999px;backdrop-filter:blur(18px);box-shadow:0 21px 55px -42px rgba(0,0,0,.9)}

/* Wide work surfaces: use the page like a CRM, not a narrow report. */
.shell{width:100%;max-width:var(--page-max);padding:clamp(22px,2.2vw,38px) var(--gutter) var(--space-7)}
.top{width:100%;max-width:var(--page-max);margin:clamp(24px,3vw,48px) auto var(--space-4)}

.wordmark{grid-column:1;font-size:clamp(30px,2.1vw,38px)}

.finals-decision{grid-template-columns:minmax(150px,.42fr) minmax(0,1.618fr) minmax(220px,.7fr);gap:var(--space-3)}
.final-decision-copy,.final-decision-money,.final-next-box{background:rgba(var(--cream),.018)}
.final-decision-actions{align-content:start;padding-top:2px}

/* Calm CRM header: compact brand, centered work surface, less poster energy. */
.top{max-width:var(--read-max);margin:clamp(26px,3.2vw,48px) auto var(--space-4)}
.hero{display:block;max-width:var(--read-max);padding-bottom:0}
.wordmark{font-size:clamp(28px,2vw,36px)}
.eyebrow{margin-top:10px}
.command-title{margin:clamp(26px,3vw,44px) 0 0;font-size:clamp(42px,4.4vw,68px);line-height:1;letter-spacing:-.048em}
.sub{margin-top:12px;max-width:640px;font-size:14px;line-height:1.5;color:rgba(var(--cream),.58)}
.tabs{margin:var(--space-4) auto var(--space-5)}
.today-start,.work-panel,.panel,.finals-command-card,.customer-command-panel,.customer-card-row{box-shadow:0 24px 70px -54px rgba(0,0,0,.86)}

.today-start h2{font-size:clamp(30px,3vw,48px)}
.today-start p,.muted,.card small,.brief-card small{color:rgba(var(--cream),.5)}

@media(max-width:900px){.finals-command-head{display:block}.finals-command-grid,.finals-money-row,.finals-summary,.finals-toolbar,.finals-action-step,.finals-workflow,.final-card,.final-card-top,.final-action-row,.final-context-grid,.finals-route-panel,.finals-decision,.payment-summary,.payment-card,.reservation-ops,.reservation-summary,.reservation-card{grid-template-columns:1fr}.finals-toolbar{max-width:none}.finals-action-step .actions,.final-card-actions,.final-action-box,.final-action-box .actions{justify-content:flex-start;justify-items:start}.final-decision-actions{justify-items:start}.final-decision-actions .btn{width:auto}.final-money{border-left:0;border-top:1px solid rgba(var(--cream),.08);padding-left:0;padding-top:14px}.inquiry-card-side{border-left:0;border-top:1px solid rgba(var(--cream),.07);padding-left:0;padding-top:12px}.payment-actions,.reservation-actions{justify-content:flex-start}}
@media(max-width:1100px){.customer-card-row,.customer-filter-panel,.task-command,.task-board,.inquiry-card,.comms-command,.comms-layout,.message-card,.payment-command{grid-template-columns:1fr}.customer-card-actions,.task-filters,.task-card-actions,.inquiry-actions,.message-actions{justify-content:flex-start}.inquiry-card-side{border-left:0;border-top:1px solid rgba(var(--cream),.07);padding-left:0;padding-top:12px}}
@media(max-width:620px){.shell{padding:16px}.grid,.quick-actions,.profile-overview,.profile-hubs,.profile-columns,.record-grid,.automation-board,.automation-studio,.automation-builder-grid,.automation-settings-layout,.hub-card-grid,.today-briefing,.today-brief-side,.today-signal-strip,.today-command,.today-workspace,.customer-workspace-head,.customer-brain-grid,.customer-focus-grid,.customer-pane-grid,.customer-work-strip,.customer-activity-grid,.customer-operating-grid,.customer-message-workspace,.profile-inquiry-card,.priority-headline,.priority-row,.duplicate-command,.duplicate-stat-grid,.duplicate-hub-grid,.customer-command-grid,.customer-command-hero,.customer-command-signal,.relationship-mini,.payment-money,.reservation-money,.comms-stats,.task-stat-grid,.customer-task-mini{grid-template-columns:1fr}.record-grid label:first-child,.record-grid label:last-child{grid-column:auto}h1{font-size:38px}.command-title{font-size:42px}.tabs{padding-left:0;padding-right:0}.customer-status-stack{justify-content:flex-start}}

<body>
<div class="corner-actions" aria-label="Admin controls">
<span id="statusText" class="corner-status">Ready.</span>
<div class="profile-menu-wrap">
<button class="profile-trigger" id="profileMenuBtn" aria-haspopup="true" aria-expanded="false"><span class="avatar-dot" id="profileInitial">B</span><span id="profileMenuLabel">Profile</span><span class="profile-caret">v</span></button>
<div class="profile-menu hide" id="profileMenu" role="menu">
<div class="profile-menu-header"><strong id="profileMenuName">Brooke</strong><span id="profileMenuRole">Founder</span></div>
<button id="profileRefresh" role="menuitem">Refresh live <span>Now</span></button>
<button id="profileAutomations" data-tab="automations" role="menuitem">Automations <span>Rules</span></button>
<button id="profileSettings" role="menuitem">Settings <span>Hub</span></button>
<button id="profileChange" role="menuitem">Change profile <span>Switch</span></button>
<button class="danger" id="profileLogout" role="menuitem">Log out <span>Exit</span></button>
</div>
</div>
</div>
<span id="storageText" class="sr-only"></span>
<span id="currentTabLabel" class="sr-only">Today</span>
<span id="sessionUserLabel" class="sr-only">Private</span>
<main id="main-content" class="shell">
<div class="top">
<div class="hero">
<a href="/" class="wordmark"><span>yoga</span><strong>cloak</strong></a>
<span class="eyebrow">Private admin hub</span>
<h1 class="command-title"><span id="heroRoleLabel" class="command-word">command</span> <span class="center-word">center</span></h1>
<p class="sub">Client profiles, messages, tasks, reservations and money tools - all in one place.</p>
</div>
</div>

<nav class="tabs" aria-label="Admin sections">
<button class="tab active" data-tab="today">Today</button>
<button class="tab" data-tab="tasks">To-Do</button>
<button class="tab" data-tab="customers">Customers</button>
<button class="tab" data-tab="inquiries">Leads</button>
<button class="tab" data-tab="reservations">Orders</button>
<button class="tab" data-tab="communications">Messaging</button>
<button class="tab" data-tab="accounting">Accounting</button>
</nav>

<section id="today" class="view"></section>
<section id="tasks" class="view hide"></section>
<section id="customers" class="view hide"></section>
<section id="inquiries" class="view hide"></section>
<section id="reservations" class="view hide"></section>
<section id="payments" class="view hide"></section>
<section id="communications" class="view hide"></section>
<section id="automations" class="view hide"></section>
<section id="finals" class="view hide"></section>
<section id="accounting" class="view hide"></section>
<section id="duplicates" class="view hide"></section>
<section id="settings" class="view hide"></section>
</main>

<script>
var statusText=document.getElementById('statusText');
var storageText=document.getElementById('storageText');
var currentTabLabel=document.getElementById('currentTabLabel');
var csrfToken='__ADMIN_CSRF_TOKEN__';
var adminUserRaw='__ADMIN_USER_JSON__';
var adminUser=adminUserRaw.indexOf('__ADMIN_USER_JSON__')===0?{name:'Preview',role:'founder',email:''}:JSON.parse(adminUserRaw);
if(!adminUser||typeof adminUser!=='object'||Array.isArray(adminUser)){adminUser={name:'Preview',role:'founder',email:''}}
var directFilePreview=location.protocol==='file:'||csrfToken==='__ADMIN_CSRF_TOKEN__';
var activeTab='today';
var state={dashboard:null,tasks:null,taskFilter:'active',customers:[],customerDetail:null,customerProfilePane:'work',customerMessageDraft:null,customerQueueFilter:'all',inquiryQueueFilter:'all',inquiries:[],reservations:[],payments:[],paymentFilter:'all',communications:null,automations:null,activeAutomationKey:null,accounting:null,duplicates:[],selected:new Set(),batchResults:null,noticeResults:null,rawSyncResults:null,finalBalanceSafety:null,finalBalanceSummary:null,finalBalanceMeta:null,batchBusy:false,focusReservation:''};
var STRIPE_PAYMENTS_URL='https://dashboard.stripe.com/acct_1ThK1eKcKQy9WmP6/payments';
var taskCustomerSearchTimer=null;
var ownerOnlyTabs=new Set(['reservations','payments','finals','accounting']);
var founderOnlyTabs=new Set(['automations','duplicates','settings']);
function isFounder(){return adminUser&&adminUser.role==='founder'}
function isOwner(){return adminUser&&['founder','owner'].includes(adminUser.role)}
function canOpenTab(tab){if(isFounder())return true;if(founderOnlyTabs.has(tab))return false;return isOwner()||!ownerOnlyTabs.has(tab)}
function roleLabel(role){
return ({founder:'Founder admin',owner:'Owner / Operator',manager:'Manager',staff:'Staff'}[String(role||'staff').toLowerCase()]||formatStatus(role||'staff'));
}
function applyRoleUi(){
var label=(adminUser.name||'Team')+' · '+roleLabel(adminUser.role||'staff');
document.getElementById('sessionUserLabel').textContent=label;
document.getElementById('heroRoleLabel').textContent='command';
document.getElementById('profileMenuLabel').textContent=adminUser.name||'Profile';
document.getElementById('profileMenuName').textContent=adminUser.name||'Team';
document.getElementById('profileMenuRole').textContent=roleLabel(adminUser.role||'staff');
document.getElementById('profileInitial').textContent=String(adminUser.name||'Y').trim().slice(0,1).toUpperCase()||'Y';
document.getElementById('profileAutomations').classList.toggle('hide',!canOpenTab('automations'));
document.getElementById('profileSettings').classList.toggle('hide',!canOpenTab('settings'));
document.querySelectorAll('.tab').forEach(function(btn){
var locked=!canOpenTab(btn.dataset.tab);
btn.classList.toggle('hide',locked);
btn.setAttribute('aria-hidden',locked?'true':'false');
});
}
function closeProfileMenu(){
document.getElementById('profileMenu').classList.add('hide');
document.getElementById('profileMenuBtn').setAttribute('aria-expanded','false');
}
function toggleProfileMenu(){
var menu=document.getElementById('profileMenu');
var open=menu.classList.contains('hide');
menu.classList.toggle('hide',!open);
document.getElementById('profileMenuBtn').setAttribute('aria-expanded',open?'true':'false');
}
async function endAdminSession(){
try{
await post('/api/admin-logout',{});
}catch(err){
statusText.innerHTML='<span class="error">'+esc(err.message||'Could not end session.')+'</span>';
return;
}
location.href='/yogacloak-admin.html';
}
document.getElementById('profileMenuBtn').addEventListener('click',function(event){event.stopPropagation();toggleProfileMenu()});
document.getElementById('profileRefresh').addEventListener('click',function(){closeProfileMenu();loadCurrent()});
document.getElementById('profileAutomations').addEventListener('click',function(){closeProfileMenu();setTab('automations')});
document.getElementById('profileSettings').addEventListener('click',function(){closeProfileMenu();setTab('settings')});
document.getElementById('profileChange').addEventListener('click',endAdminSession);
document.getElementById('profileLogout').addEventListener('click',endAdminSession);
document.addEventListener('click',function(event){if(!event.target.closest('.profile-menu-wrap'))closeProfileMenu()});
document.querySelectorAll('.tab').forEach(function(btn){btn.addEventListener('click',function(){setTab(btn.dataset.tab)})});

function esc(value){return String(value||'').replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]})}
function money(value){var n=Number(value||0);return '$'+(Math.abs(n-Math.round(n))>.004?n.toFixed(2):n.toFixed(0))}
function stripeFeeEstimate(value){var n=Number(value||0);return n>0?Math.round((n*.029+.30)*100)/100:0}
function stripePaymentsLink(label,className){return '<a class="'+esc(className||'btn quiet small')+'" href="'+esc(STRIPE_PAYMENTS_URL)+'" target="_blank" rel="noopener">'+esc(label||'Open Stripe')+'</a>'}
function date(value){return value?String(value).slice(0,10):''}
function endpoint(path){return fetch(path,{credentials:'same-origin'}).then(async function(res){var data=await res.json().catch(function(){return {}});if(res.status===401){location.reload();throw new Error('Admin session expired.')}if(!res.ok)throw new Error(data.error||'Could not load');return data})}
function post(path,body){return fetch(path,{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','x-csrf-token':csrfToken},body:JSON.stringify(body)}).then(async function(res){var data=await res.json().catch(function(){return {}});if(res.status===401){location.reload();throw new Error('Admin session expired.')}if(!res.ok&&res.status!==207){var err=new Error(data.error||'Request failed');err.step=data.step||'';err.details=data.details||'';throw err}return data})}
function setBusy(text){statusText.textContent=text}
function readyClass(group){if(group==='Ready to Charge')return 'ready';if(group==='Needs Notice')return 'needs';if(group==='Waiting Period')return 'waiting';if(group==='Already Charged')return 'charged';return 'blocked'}
function tabLabel(tab){return ({today:'Today',tasks:'To-Do',customers:'Customers',inquiries:'Leads',reservations:'Orders',payments:'Accounting: payments',communications:'Messaging',automations:'Automations',finals:'Accounting: final balances',accounting:'Accounting',duplicates:'Customer duplicates',settings:'Settings'}[tab]||tab)}
function health(value){return value?'<span class="health good">On</span>':'<span class="health bad">Missing</span>'}
function ownerOnlyNotice(tab){return '<section class="panel"><div class="notice warn"><strong>'+esc(founderOnlyTabs.has(tab)?'Founder admin area.':'Owner / Operator area.')+'</strong><br>'+esc(tabLabel(tab))+' includes '+esc(founderOnlyTabs.has(tab)?'settings, security, automations, duplicate cleanup, merges, archive/delete, or other structural controls.':'money, orders, accounting, or final-balance controls.')+' Owner / Operator profiles can work customers, leads, To-Do items, notes, messages, orders, payments, final balances, and accounting. Founder admin keeps final system authority.</div></section>'}
function renderHeroStatus(){
currentTabLabel.textContent=tabLabel(activeTab);
}

function commandCenterSettingsPanel(){
var d=state.dashboard||{};
var s=d.security_status||{};
var summary=d.summary||{};
var warnings=[];
if(d.database_error)warnings.push(d.database_error);
if(s.admin_session_secret_configured===false)warnings.push('Add ADMIN_SESSION_SECRET so admin sessions stay secure across deploys.');
if(s.supabase_configured===false)warnings.push('Airtable raw fallback is active. Connect the private CRM database when you want database-first tracking.');
if(s.stripe_mode==='live'&&!s.allow_live_final_charges)warnings.push('Stripe is live, but final-balance batch charging is locked.');
if(s.stripe_mode==='missing')warnings.push('Add Stripe keys before payment testing.');
var ready=Number(summary.ready_to_charge||0);
var needs=Number(summary.needs_notice||0);
var rawBackup=Number(summary.raw_backup_customers||0)+Number(summary.raw_backup_inquiries||0);
var className=warnings.length?'notice warn':'notice good';
var message=warnings.length?warnings[0]:'Private CRM database is connected and admin access is working.';
return '<section class="panel"><div class="section-title">Command center</div><div class="'+esc(className)+'"><strong>'+esc(message)+'</strong><div class="meta"><span class="pill">Pending balances <strong>'+esc(needs)+'</strong></span><span class="pill">Ready to charge <strong>'+esc(ready)+'</strong></span><span class="pill">Raw-only records <strong>'+esc(rawBackup)+'</strong></span><span class="pill">Stripe <strong>'+esc(s.stripe_mode||'unknown')+'</strong></span><span class="pill">Raw backup <strong>Airtable</strong></span><span class="pill">Current tab <strong>'+esc(tabLabel(activeTab))+'</strong></span><span class="pill">Session <strong>'+esc((adminUser.name||'Team')+' · '+roleLabel(adminUser.role||'staff'))+'</strong></span></div></div></section>';
}

function setTab(tab){
if(!canOpenTab(tab)){statusText.innerHTML='<span class="error">Owner access required for '+esc(tabLabel(tab))+'.</span>';return}
activeTab=tab;
currentTabLabel.textContent=tabLabel(tab);
document.querySelectorAll('.tab').forEach(function(btn){btn.classList.toggle('active',btn.dataset.tab===tab)});
document.querySelectorAll('.view').forEach(function(view){view.classList.toggle('hide',view.id!==tab)});
render();
loadCurrent();
}

async function loadCurrent(){
try{
if(directFilePreview){renderDirectFileNotice();return}
if(!canOpenTab(activeTab)){document.getElementById(activeTab).innerHTML=ownerOnlyNotice(activeTab);return}
if(activeTab==='today'){setBusy('Loading dashboard...');state.dashboard=await endpoint('/api/admin-dashboard')}
if(activeTab==='tasks'){setBusy('Loading tasks...');state.tasks=await endpoint('/api/admin-tasks?status='+encodeURIComponent(state.taskFilter||'active'))}
if(activeTab==='customers'){setBusy('Loading customers...');state.customers=(await endpoint('/api/admin-customers')).customers||[];if(canOpenTab('duplicates')){try{state.duplicates=(await endpoint('/api/admin-duplicates')).duplicates||[]}catch(err){state.duplicates=[]}}}
if(activeTab==='inquiries'){setBusy('Loading leads...');state.inquiries=(await endpoint('/api/admin-inquiries')).inquiries||[]}
if(activeTab==='reservations'){setBusy('Loading orders...');var reservationData=await endpoint('/api/admin-reservations');state.reservations=reservationData.reservations||[];state.finalBalanceSafety=reservationData.final_balance_safety||null;state.finalBalanceSummary=reservationData.final_balance_summary||null;state.finalBalanceMeta={records_available:reservationData.records_available||0,records_returned:reservationData.records_returned||0,record_limit:reservationData.record_limit||0,has_more:!!reservationData.has_more}}
if(activeTab==='payments'){setBusy('Loading payments...');state.payments=(await endpoint('/api/admin-payments')).payments||[]}
if(activeTab==='communications'){setBusy('Loading communications...');state.communications=await endpoint('/api/admin-communications')}
if(activeTab==='automations'){setBusy('Loading automations...');state.automations=await endpoint('/api/admin-automations')}
if(activeTab==='finals'){setBusy('Loading final balances...');var finalData=await endpoint('/api/admin-reservations');state.reservations=finalData.reservations||[];state.finalBalanceSafety=finalData.final_balance_safety||null;state.finalBalanceSummary=finalData.final_balance_summary||null;state.finalBalanceMeta={records_available:finalData.records_available||0,records_returned:finalData.records_returned||0,record_limit:finalData.record_limit||0,has_more:!!finalData.has_more};state.selected.clear()}
if(activeTab==='accounting'){setBusy('Loading accounting...');state.accounting=await endpoint('/api/admin-accounting');state.payments=(await endpoint('/api/admin-payments')).payments||[];var accountingFinalData=await endpoint('/api/admin-reservations');state.reservations=accountingFinalData.reservations||[];state.finalBalanceSafety=accountingFinalData.final_balance_safety||null;state.finalBalanceSummary=accountingFinalData.final_balance_summary||null;state.finalBalanceMeta={records_available:accountingFinalData.records_available||0,records_returned:accountingFinalData.records_returned||0,record_limit:accountingFinalData.record_limit||0,has_more:!!accountingFinalData.has_more}}
if(activeTab==='duplicates'){setBusy('Loading duplicates...');state.duplicates=(await endpoint('/api/admin-duplicates')).duplicates||[]}
if(activeTab==='settings'){state.dashboard=state.dashboard||await endpoint('/api/admin-dashboard')}
statusText.innerHTML='<span class="ok">Loaded '+activeTab+'.</span>';
if(state.dashboard&&state.dashboard.admin_user){adminUser=state.dashboard.admin_user;applyRoleUi()}
storageText.textContent=state.dashboard&&state.dashboard.database_error?'Private CRM needs database setup. Airtable raw fallback is still available.':(state.dashboard&&state.dashboard.database_enabled===false?'Airtable raw fallback active. Private CRM database not connected yet.':'Private CRM database connected. Airtable remains the raw backup.');
renderHeroStatus();
render();
}catch(err){statusText.innerHTML='<span class="error">'+esc(err.message)+'</span>';render()}
}

function renderDirectFileNotice(){
activeTab='today';
currentTabLabel.textContent='Disconnected preview';
document.querySelectorAll('.tab').forEach(function(btn){btn.classList.toggle('active',btn.dataset.tab==='today')});
document.querySelectorAll('.view').forEach(function(view){view.classList.toggle('hide',view.id!=='today')});
statusText.innerHTML='<span class="error">This is the raw local file preview, not the live CRM.</span>';
storageText.textContent='Open the deployed private admin page so the hub can use its secure session and live APIs.';
document.getElementById('today').innerHTML='<section class="panel"><div class="section-title">Open the real admin hub</div><div class="notice warn"><strong>This local file will always look incomplete.</strong><br>The CRM only works through the protected server page. Use the deployed private admin URL when you want live customers, leads, payments, and final-balance tools.</div><div class="meta"><span class="pill">Admin session <strong>not connected</strong></span><span class="pill">CRM APIs <strong>not connected</strong></span><span class="pill">Stripe tools <strong>not connected</strong></span><span class="pill">Airtable sync <strong>not connected</strong></span></div><div class="actions" style="margin-top:16px"><a class="btn" href="https://www.yogacloak.com/yogacloak-admin.html">Open live admin hub</a><a class="btn quiet" href="https://www.yogacloak.com/api/admin-page">Open protected admin route</a></div></section>';
}

function render(){({today:renderToday,tasks:renderTasks,customers:renderCustomers,inquiries:renderInquiries,reservations:renderReservations,payments:renderPayments,communications:renderCommunications,automations:renderAutomations,finals:renderFinals,accounting:renderAccounting,duplicates:renderDuplicates,settings:renderSettings}[activeTab]||renderToday)()}

function renderCards(summary){
var items=[
['Customers',summary.customers],['New leads',summary.new_inquiries],['Pending balances',summary.needs_notice],['Ready to charge',summary.ready_to_charge],
['Not contacted',summary.not_contacted],['Follow-ups due',summary.follow_ups_due],['Raw backup',Number(summary.raw_backup_customers||0)+Number(summary.raw_backup_inquiries||0)],['Failed payments',summary.failed_payments]
];
return '<div class="grid">'+items.map(function(item){return '<div class="card"><span>'+esc(item[0])+'</span><strong>'+esc(item[1]===undefined?0:item[1])+'</strong></div>'}).join('')+'</div>';
}

function renderAccountingCards(t){
var items=[
['Unpaid orders',t.unpaid_reservations||0],
['Pending balances',money(t.pending_balances||t.outstanding_balances||0)],
['Failed payments',t.failed_payments||0],
['Unfulfilled orders',t.unfulfilled||0],

function firstDashboardTask(data,types){
var wanted=new Set(types);
return (data.tasks||[]).find(function(row){return wanted.has(String(row.type||'').toLowerCase())});
}

function isSmsOptInOnlyTask(row){
var text=[row.type,row.title,row.detail,row.description].map(function(value){return String(value||'').toLowerCase()}).join(' ');
return text.indexOf('sms opt')!==-1||text.indexOf('text opt')!==-1;
}

function isRoutineBalanceNoticeTask(row){
var text=[row.type,row.title,row.detail,row.description].map(function(value){return String(value||'').toLowerCase()}).join(' ');
if(row.owner_task_id)return false;
if(text.indexOf('failed')!==-1||text.indexOf('ready to charge')!==-1||text.indexOf('dry run')!==-1)return false;
return text.indexOf('final-balance notice')!==-1||
text.indexOf('final balance notice')!==-1||
text.indexOf('balance notice')!==-1||
text.indexOf('needs notice')!==-1||
String(row.type||'').toLowerCase()==='notice'||
String(row.type||'').toLowerCase()==='final_balance';
}

function shouldShowTodayTask(row){
var type=String(row.type||'').toLowerCase();
if(row.owner_task_id)return true;
if(isRoutineBalanceNoticeTask(row))return false;
if(type==='contact'&&isSmsOptInOnlyTask(row))return false;
return true;
}

function todayVisibleTasks(tasks){
return (tasks||[]).filter(shouldShowTodayTask);
}

function customerFirstPriority(kind,title,detail,row,tab,pane,hot){

}

function collectPriorityItems(data){
var summary=data.summary||{};
var items=[];
function add(kind,title,detail,tab,hot,row,pane){
items.push(customerFirstPriority(kind,title,detail,row||{},tab, pane||'work', hot));
}
var taskData={tasks:todayVisibleTasks(data.tasks||[])};
var overdue=firstDashboardTask(taskData,['general','customer_reply','inquiry_followup','payment','operations','accounting','payroll','inventory','owner_task']);
var follow=firstDashboardTask(taskData,['follow_up']);
var inquiry=firstDashboardTask(taskData,['inquiry']);
var charge=firstDashboardTask(taskData,['charge']);
var failed=firstDashboardTask(taskData,['payment']);
var message=(data.message_preview||[]).find(function(row){return row.customer_id||row.customers&&row.customers.id});
if(overdue&&Number(summary.tasks_overdue||0)>0)add('To-Do',summary.tasks_overdue+' overdue task(s)',overdue.detail||'Overdue','tasks',true,overdue,'work');
if(follow&&Number(summary.follow_ups_due||0)>0)add('Follow-up',follow.detail?'Follow up with '+follow.detail:summary.follow_ups_due+' due',follow.created_at?'Due '+date(follow.created_at):'Due','tasks',true,follow,'work');
if(Number(summary.new_inquiries||0)>0)add('Lead',inquiry&&inquiry.detail?'New lead from '+inquiry.detail:summary.new_inquiries+' new '+(Number(summary.new_inquiries||0)===1?'lead':'leads'),inquiry&&inquiry.title?inquiry.title:'New website lead','inquiries',true,inquiry,'messages');
if(message){var messageCustomer=message.customer_id||message.customers&&message.customers.id;items.push({kind:'Messages',title:'New '+String(message.channel||'message').toUpperCase()+' from '+(message.customers&&message.customers.full_name||'customer'),detail:message.subject||message.body||'Reply',tab:'communications',hot:true,customer_id:messageCustomer,profile_pane:'messages'});}
if(Number(summary.ready_to_charge||0)>0)add('Money',charge&&charge.detail?'Dry run final balance for '+charge.detail:summary.ready_to_charge+' ready for dry run','Final balance','finals',true,charge,'sales');
if(Number(summary.failed_payments||0)>0)add('Risk',failed&&failed.detail?failed.detail:summary.failed_payments+' failed payment(s)','Payment cleanup','payments',true,failed,'sales');
return items;
}

function renderTodayTasks(tasks){

if(!rows.length)return '<div class="today-empty">No active To-Do items.</div>';
var lanes=[
{key:'first',title:'Do first',rows:[]},
{key:'customer',title:'Customer work',rows:[]},
{key:'money',title:'Money',rows:[]},
{key:'cleanup',title:'Cleanup',rows:[]}
];
rows.forEach(function(row){
var type=String(row.type||'').toLowerCase();
if(row.owner_task_id&&['urgent','high'].includes(String(row.task_priority||'').toLowerCase()))lanes[0].rows.push(row);
else if(['charge','payment','follow_up'].includes(type))lanes[0].rows.push(row);
else if(['notice','final_balance'].includes(type))lanes[2].rows.push(row);
else if(['inquiry','contact','customer_reply','inquiry_followup'].includes(type))lanes[1].rows.push(row);
else if(['raw_backup','duplicate','operations','accounting','payroll','inventory'].includes(type))lanes[3].rows.push(row);
else lanes[1].rows.push(row);
});

if(!lanes.length)return '<div class="today-empty">No active To-Do items.</div>';

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yogacloak — reserve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1F2421; --sage:#7C8C82; --clay:#9A8E86;
    --fog:#C4C9C5; --bone:#ECEAE3;
  }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  html { font-family:'Hanken Grotesk',sans-serif; -webkit-font-smoothing:antialiased; }
  body {
    background:var(--ink); color:var(--bone);
    min-height:100svh; overflow-x:hidden;
  }

  .glow-1 { position:fixed; top:-150px; right:-110px; width:540px; height:540px; background:radial-gradient(circle,rgba(124,140,130,0.2),transparent 64%); pointer-events:none; z-index:0; }
  .glow-2 { position:fixed; bottom:-190px; left:-120px; width:480px; height:480px; background:radial-gradient(circle,rgba(154,142,134,0.1),transparent 66%); pointer-events:none; z-index:0; }

  .wrap {
    position:relative; z-index:1;
    max-width:560px;
    margin:0 auto;
    padding:48px 32px 80px;
  }

  /* nav */
  .nav {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:64px;
  }
  .wordmark { font-size:15px; font-weight:300; letter-spacing:-.02em; text-transform:lowercase; color:var(--bone); }
  .wordmark span { font-weight:800; }
  .back {
    font-size:9px; letter-spacing:.26em; text-transform:uppercase;
    color:rgba(124,140,130,0.45); text-decoration:none;
    transition:color .18s;
  }
  .back:hover { color:var(--sage); }

  /* headline */
  .hed {
    font-size:clamp(38px,9vw,52px); font-weight:800;
    letter-spacing:-.04em; text-transform:lowercase;
    color:var(--bone); line-height:.9;
    margin-bottom:48px;
  }

  /* section label */
  .lbl {
    font-size:9px; letter-spacing:.4em; text-transform:uppercase;
    color:rgba(124,140,130,0.45); margin-bottom:16px;
  }

  /* item pick */
  .items { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }

  .item {
    display:flex; flex-direction:column; justify-content:space-between;
    padding:20px 20px 18px;
    border:1px solid rgba(236,234,227,0.09);
    border-radius:20px;
    cursor:pointer;
    transition:border-color .18s, background .18s;
    user-select:none;
    min-height:130px;
  }
  .item:hover:not(.sold-out) { border-color:rgba(124,140,130,0.3); }
  .item.on { border-color:var(--sage); background:rgba(124,140,130,0.06); }
  .item.sold-out { opacity:.25; cursor:not-allowed; }

  .item-left {}
  .item-name { font-size:20px; font-weight:800; text-transform:lowercase; letter-spacing:-.02em; color:var(--bone); }
  .item-sub { font-size:11px; color:rgba(154,142,134,0.5); margin-top:3px; }
  .item-left-count { font-size:9px; color:rgba(124,140,130,0.5); margin-top:6px; }

  .item-right { margin-top:auto; padding-top:16px; }
  .item-price { font-size:20px; font-weight:300; color:var(--bone); }
  .item-dep { font-size:10px; color:rgba(124,140,130,0.5); margin-top:2px; }

  /* size — spans full width below both cards */
  .size-section {
    display:none; margin-bottom:10px;
    padding:18px 20px;
    border:1px solid rgba(236,234,227,0.08);
    border-radius:20px;
    grid-column:1/-1;
  }
  .size-section.show { display:block; }

  /* size */
  .size-section {
    display:none; margin-bottom:10px;
    padding:18px 22px;
    border:1px solid rgba(236,234,227,0.08);
    border-radius:20px;
  }
  .size-section.show { display:block; }
  .size-lbl { font-size:9px; letter-spacing:.4em; text-transform:uppercase; color:rgba(124,140,130,0.45); margin-bottom:12px; }
  .size-btns { display:flex; gap:8px; }
  .size-btn {
    flex:1; font-family:'Hanken Grotesk',sans-serif;
    font-size:13px; font-weight:600; letter-spacing:-.01em;
    color:rgba(196,201,197,0.4); background:transparent;
    border:1px solid rgba(236,234,227,0.1);
    border-radius:100px; padding:12px 0; cursor:pointer;
    transition:border-color .18s, color .18s, background .18s;
  }
  .size-btn:hover { border-color:rgba(124,140,130,0.4); color:var(--bone); }
  .size-btn.on { border-color:var(--sage); color:var(--bone); background:rgba(124,140,130,0.1); }

  /* divider */
  .div { height:1px; background:rgba(236,234,227,0.07); margin:32px 0; display:none; }
  .div.show { display:block; }
  .form-section { display:none; }
  .form-section.show { display:block; }

  /* fields */
  .fields { display:flex; flex-direction:column; gap:8px; margin-bottom:28px; }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-size:8px; letter-spacing:.36em; text-transform:uppercase; color:rgba(124,140,130,0.45); }
  .field input {
    background:transparent; border:none;
    border-bottom:1px solid rgba(236,234,227,0.1);
    padding:10px 0; font-family:'Hanken Grotesk',sans-serif;
    font-size:15px; color:var(--bone); outline:none;
    transition:border-color .18s;
  }
  .field input::placeholder { color:rgba(196,201,197,0.18); }
  .field input:focus { border-color:rgba(124,140,130,0.4); }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  /* deposit */
  .dep {
    display:none; justify-content:space-between; align-items:baseline;
    margin-bottom:24px;
    padding-bottom:24px;
    border-bottom:1px solid rgba(236,234,227,0.07);
  }
  .dep-label { font-size:9px; letter-spacing:.36em; text-transform:uppercase; color:rgba(124,140,130,0.4); }
  .dep-sub { font-size:10px; color:rgba(124,140,130,0.3); margin-top:3px; }
  .dep-amount { font-size:38px; font-weight:800; letter-spacing:-.05em; color:var(--bone); }

  /* error */
  .err { font-size:11px; color:#a06860; display:none; margin-bottom:14px; line-height:1.6; }

  /* cta */
  .cta {
    width:100%; background:var(--bone); color:var(--ink);
    font-family:'Hanken Grotesk',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:.24em; text-transform:uppercase;
    border:none; border-radius:100px; padding:18px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
    transition:background .18s;
  }
  .cta:hover:not(:disabled) { background:var(--fog); }
  .cta:disabled { opacity:.3; cursor:not-allowed; }
  .fine { font-size:9px; color:rgba(124,140,130,0.25); text-align:center; margin-top:14px; letter-spacing:.02em; }

  .spin { width:11px; height:11px; border:1.5px solid rgba(31,36,33,0.2); border-top-color:var(--ink); border-radius:50%; animation:spin .7s linear infinite; display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media(max-width:400px){
    .wrap { padding:36px 24px 64px; }
    .field-row { grid-template-columns:1fr; }
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="wrap">

  <nav class="nav">
    <div class="wordmark">yoga<span>cloak</span></div>
    <a href="yogacloak-index.html" class="back">← back</a>
  </nav>

  <h1 class="hed">what are you<br>taking home?</h1>

  <div class="lbl">Pick yours</div>

  <div class="items">
    <div class="item" id="item-cloak" onclick="pick('cloak')">
      <div class="item-left">
        <div class="item-name">the cloak</div>
        <div class="item-sub">for the drive home</div>
        <div class="item-left-count" id="left-cloak">100 of 100 left</div>
      </div>
      <div class="item-right">
        <div class="item-price">$98</div>
        <div class="item-dep">$20 to reserve</div>
      </div>
    </div>

    <div class="item" id="item-wrap" onclick="pick('wrap')">
      <div class="item-left">
        <div class="item-name">the wrap</div>
        <div class="item-sub">for the walk home</div>
        <div class="item-left-count" id="left-wrap">100 of 100 left</div>
      </div>
      <div class="item-right">
        <div class="item-price">$68</div>
        <div class="item-dep">$15 to reserve</div>
      </div>
    </div>

    <div class="size-section" id="size-section">
      <div class="size-lbl">Size</div>
      <div class="size-btns">
        <button class="size-btn" data-size="XS-M" onclick="pickSize('XS-M');event.stopPropagation()">XS – M</button>
        <button class="size-btn" data-size="L-XL" onclick="pickSize('L-XL');event.stopPropagation()">L – XL</button>
      </div>
    </div>
  </div>

  <div class="div" id="div"></div>

  <div class="form-section" id="form-section">
    <div class="lbl">Your info</div>
    <div class="fields">
      <div class="field-row">
        <div class="field"><label>First name</label><input id="fn" type="text" placeholder="Ava" autocomplete="given-name"></div>
        <div class="field"><label>Last name</label><input id="ln" type="text" placeholder="Chen" autocomplete="family-name"></div>
      </div>
      <div class="field"><label>Email</label><input id="em" type="email" placeholder="ava@example.com" autocomplete="email"></div>
      <div class="field"><label>Phone</label><input id="ph" type="tel" placeholder="+1 (555) 000-0000" autocomplete="tel"></div>
    </div>

    <div class="dep" id="dep">
      <div>
        <div class="dep-label">Deposit today</div>
        <div class="dep-sub">credited to your order</div>
      </div>
      <div class="dep-amount" id="dep-amt">$0</div>
    </div>

    <div class="err" id="err"></div>

    <button class="cta" id="cta" onclick="submit()">
      <span id="cta-lbl">Pay deposit &amp; reserve</span>
      <div class="spin" id="spin"></div>
    </button>
    <p class="fine">Non-refundable · transferable · one of each max</p>
  </div>

</div>

<script>
const API = "https://yogacloak-reserve.vercel.app";
let sel = { cloak:false, wrap:false, size:null };

(async () => {
  try {
    const r = await fetch(API + "/api/availability");
    if (!r.ok) return;
    const d = await r.json();
    if (d.cloak != null) {
      document.getElementById("left-cloak").textContent = `${d.cloak} of 100 left`;
      if (d.cloak <= 0) soldOut("cloak");
    }
    if (d.wrap != null) {
      document.getElementById("left-wrap").textContent = `${d.wrap} of 100 left`;
      if (d.wrap <= 0) soldOut("wrap");
    }
  } catch {}
})();

function soldOut(w) {
  const el = document.getElementById(`item-${w}`);
  el.classList.add("sold-out"); el.onclick = null;
  document.getElementById(`left-${w}`).textContent = "sold out";
}

function pick(w) {
  const el = document.getElementById(`item-${w}`);
  if (el.classList.contains("sold-out")) return;
  sel[w] = !sel[w];
  el.classList.toggle("on", sel[w]);
  if (w === "cloak") {
    const ss = document.getElementById("size-section");
    ss.classList.toggle("show", sel.cloak);
    if (!sel.cloak) { sel.size = null; document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("on")); }
  }
  refreshDep();
}

function pickSize(sz) {
  sel.size = sz;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.toggle("on", b.dataset.size === sz));
}

function refreshDep() {
  const show = sel.cloak || sel.wrap;
  document.getElementById("dep").style.display = show ? "flex" : "none";
  document.getElementById("div").classList.toggle("show", show);
  document.getElementById("form-section").classList.toggle("show", show);
  let t = 0; if (sel.cloak) t += 20; if (sel.wrap) t += 15;
  document.getElementById("dep-amt").textContent = `$${t}`;
  if (show) setTimeout(() => document.getElementById("form-section").scrollIntoView({behavior:"smooth", block:"start"}), 50);
}

function g(id) { return document.getElementById(id).value.trim(); }

async function submit() {
  const e = document.getElementById("err"); e.style.display = "none";
  if (!sel.cloak && !sel.wrap) return err("Choose the cloak, the wrap, or both.");
  if (sel.cloak && !sel.size) return err("Pick a size for the cloak.");
  if (!g("fn") || !g("ln")) return err("Enter your full name.");
  if (!g("em") || !g("em").includes("@")) return err("Enter a valid email.");
  if (!g("ph")) return err("Enter your phone number.");
  loading(true);
  const product = sel.cloak && sel.wrap ? "both" : sel.cloak ? "cloak" : "wrap";
  try {
    const r = await fetch(API + "/api/reserve", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ product, size:sel.size, firstName:g("fn"), lastName:g("ln"), email:g("em"), phone:g("ph") })
    });
    const d = await r.json();
    if (!r.ok) { loading(false); return err(d.error || "Something went wrong."); }
    window.location.href = d.url;
  } catch { loading(false); err("Network error. Try again."); }
}

function err(msg) { const e = document.getElementById("err"); e.textContent = msg; e.style.display = "block"; }
function loading(on) {
  document.getElementById("cta").disabled = on;
  document.getElementById("cta-lbl").textContent = on ? "Redirecting…" : "Pay deposit & reserve";
  document.getElementById("spin").style.display = on ? "block" : "none";
}
</script>
</body>
</html>
